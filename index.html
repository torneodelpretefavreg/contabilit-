<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contabilità Personale · Partita Doppia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>

  :root {
    --bg: #f3f6fb;
    --panel: #ffffff;
    --panel-2: #f6f9fd;
    --ink: #16223d;
    --ink-2: #45506a;
    --ink-3: #8791a6;
    --rule: #e3e9f2;
    --rule-2: #cdd6e5;
    --accent: #1f4f8f;       /* blu sobrio */
    --accent-soft: #e6edf8;
    --accent-ink: #16335f;
    --gold: #c08a3e;
    --danger: #c0433f;
    --danger-soft: #fbecec;
    --success: #2f7d4f;
    --warn: #c08020;
    --shadow-sm: 0 1px 2px rgba(20,30,60,0.05), 0 0 0 1px rgba(20,30,60,0.05);
    --shadow-md: 0 4px 16px rgba(20,30,60,0.08), 0 0 0 1px rgba(20,30,60,0.05);
    --shadow-lg: 0 20px 50px rgba(20,30,60,0.15);
    --radius: 6px;
    --radius-lg: 10px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .serif { font-family: 'Fraunces', Georgia, serif; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

  button { font-family: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; font-size: inherit; }

  /* === LAYOUT === */
  .app { min-height: 100vh; display: flex; flex-direction: column; }

  .topbar {
    background: var(--ink);
    color: #f0eee7;
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 24px;
    border-bottom: 1px solid #000;
  }
  .topbar h1 {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 500;
    margin: 0;
    letter-spacing: -0.01em;
    flex: 1;
  }
  .topbar h1 .sub {
    color: #a8a59a;
    margin-left: 12px;
    font-size: 13px;
    font-style: italic;
  }
  .topbar .badge {
    background: #2d2d2d;
    border: 1px solid #3a3a3a;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #c9c7be;
  }
  .topbar select {
    background: #2d2d2d;
    color: #f0eee7;
    border: 1px solid #3a3a3a;
    padding: 5px 10px;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
  }
  .topbar select:hover { border-color: #555; }
  .topbar button.icon-btn {
    background: transparent;
    color: #c9c7be;
    border: 1px solid #3a3a3a;
    padding: 5px 10px;
    border-radius: 4px;
    font-size: 12px;
  }
  .topbar button.icon-btn:hover { background: #2d2d2d; }

  .layout {
    display: flex;
    flex: 1;
    min-height: 0;
  }
  .sidebar {
    width: 220px;
    background: var(--panel);
    border-right: 1px solid var(--rule);
    padding: 24px 12px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .sidebar .section-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-3);
    margin: 18px 14px 6px;
    font-weight: 600;
  }
  .sidebar .section-label:first-child { margin-top: 0; }
  .navlink {
    background: transparent;
    border: none;
    text-align: left;
    padding: 8px 14px;
    border-radius: 4px;
    color: var(--ink-2);
    font-size: 13.5px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: background 0.12s;
  }
  .navlink:hover { background: var(--bg); color: var(--ink); }
  .navlink.active {
    background: var(--ink);
    color: #f0eee7;
  }
  .navlink .ico {
    font-size: 14px;
    width: 16px;
    text-align: center;
    opacity: 0.7;
  }
  .navlink.active .ico { opacity: 1; }

  .main {
    flex: 1;
    min-width: 0;
    padding: 32px 36px;
    overflow-y: auto;
  }

  .page-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 24px;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--rule);
  }
  .page-head h2 {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    font-weight: 500;
    margin: 0;
    letter-spacing: -0.02em;
  }
  .page-head .sub {
    color: var(--ink-3);
    font-size: 13px;
  }

  /* === BUTTONS === */
  .btn {
    background: var(--ink);
    color: #f0eee7;
    border: 1px solid var(--ink);
    padding: 8px 16px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 500;
    transition: all 0.12s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn:hover { background: #000; }
  .btn.ghost {
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--rule-2);
  }
  .btn.ghost:hover { background: var(--bg); border-color: var(--ink-3); }
  .btn.accent {
    background: var(--accent);
    border-color: var(--accent);
  }
  .btn.accent:hover { background: var(--accent-ink); }
  .btn.danger {
    background: transparent;
    color: var(--danger);
    border: 1px solid var(--rule-2);
  }
  .btn.danger:hover { background: var(--danger-soft); border-color: var(--danger); }
  .btn.sm { padding: 5px 10px; font-size: 12px; }

  /* === CARDS === */
  .card {
    background: var(--panel);
    border: 1px solid var(--rule);
    border-radius: var(--radius-lg);
    padding: 20px;
  }
  .card.flat { box-shadow: var(--shadow-sm); }
  .card .card-title {
    font-family: 'Fraunces', serif;
    font-size: 16px;
    font-weight: 500;
    margin: 0 0 14px;
  }

  /* === KPI === */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }
  .kpi {
    background: var(--panel);
    border: 1px solid var(--rule);
    border-radius: var(--radius-lg);
    padding: 18px 20px;
    position: relative;
    overflow: hidden;
  }
  .kpi.accent { background: var(--ink); color: #f0eee7; border-color: var(--ink); }
  .kpi .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-3);
    margin-bottom: 8px;
    font-weight: 600;
  }
  .kpi.accent .label { color: #a8a59a; }
  .kpi .value {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    font-weight: 500;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  .kpi .value.neg { color: var(--danger); }
  .kpi .hint {
    margin-top: 4px;
    font-size: 11.5px;
    color: var(--ink-3);
  }

  /* === TABLE === */
  .tbl-wrap {
    background: var(--panel);
    border: 1px solid var(--rule);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  table.tbl {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  table.tbl th {
    text-align: left;
    padding: 11px 14px;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-3);
    font-weight: 600;
    background: var(--panel-2);
    border-bottom: 1px solid var(--rule);
    position: sticky;
    top: 0;
  }
  table.tbl td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--rule);
    vertical-align: top;
  }
  table.tbl tr:last-child td { border-bottom: none; }
  table.tbl tr:hover td { background: var(--panel-2); }
  table.tbl td.num, table.tbl th.num { text-align: right; font-variant-numeric: tabular-nums; font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 12.5px; }
  table.tbl td.neg { color: var(--danger); }
  table.tbl td.pos { color: var(--success); }
  table.tbl .pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 500;
    background: var(--bg);
    border: 1px solid var(--rule);
    color: var(--ink-2);
  }
  table.tbl .pill.entrata { background: var(--accent-soft); border-color: #c8d8ce; color: var(--accent-ink); }
  table.tbl .pill.uscita { background: var(--danger-soft); border-color: #f1d6d6; color: var(--danger); }
  table.tbl .pill.giroconto { background: #f4ebd7; border-color: #e6d5a8; color: #7a5a1d; }

  .empty-state {
    padding: 40px;
    text-align: center;
    color: var(--ink-3);
    font-style: italic;
  }

  /* === FORM === */
  .form-grid {
    display: grid;
    gap: 14px;
  }
  .form-row {
    display: grid;
    grid-template-columns: 180px 1fr;
    align-items: center;
    gap: 16px;
  }
  .form-row label {
    font-size: 12.5px;
    color: var(--ink-2);
    font-weight: 500;
  }
  .form-row .req { color: var(--danger); }
  input[type=text], input[type=number], input[type=date], input[type=password], select, textarea {
    width: 100%;
    padding: 8px 11px;
    border: 1px solid var(--rule-2);
    border-radius: var(--radius);
    background: var(--panel);
    color: var(--ink);
    transition: border 0.12s;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  textarea { resize: vertical; min-height: 60px; }

  .tipo-switch {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0;
    border: 1px solid var(--rule-2);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .tipo-switch button {
    background: var(--panel);
    color: var(--ink-2);
    border: none;
    border-right: 1px solid var(--rule);
    padding: 10px 12px;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.12s;
  }
  .tipo-switch button:last-child { border-right: none; }
  .tipo-switch button:hover { background: var(--bg); }
  .tipo-switch button.active.entrata { background: var(--accent); color: #fff; }
  .tipo-switch button.active.uscita { background: var(--danger); color: #fff; }
  .tipo-switch button.active.giroconto { background: var(--gold); color: #fff; }

  /* === FILTERS === */
  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 16px;
    align-items: center;
  }
  .filters input, .filters select {
    padding: 6px 10px;
    font-size: 12.5px;
    max-width: 200px;
  }
  .filters .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-3);
    font-weight: 600;
  }

  /* === LOGIN === */
  .login-shell {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(at 20% 30%, var(--accent-soft) 0px, transparent 50%),
      radial-gradient(at 80% 70%, #f4ebd7 0px, transparent 50%),
      var(--bg);
    padding: 24px;
  }
  .login-card {
    background: var(--panel);
    border: 1px solid var(--rule);
    border-radius: 14px;
    padding: 40px 44px;
    max-width: 420px;
    width: 100%;
    box-shadow: var(--shadow-lg);
  }
  .login-card .logo {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 500;
    margin: 0 0 4px;
    letter-spacing: -0.01em;
  }
  .login-card .tag {
    color: var(--ink-3);
    font-size: 12.5px;
    margin-bottom: 28px;
    font-style: italic;
  }
  .login-card .field { margin-bottom: 14px; }
  .login-card .field label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-3);
    margin-bottom: 5px;
    font-weight: 600;
  }
  .login-card .err {
    color: var(--danger);
    background: var(--danger-soft);
    padding: 8px 12px;
    border-radius: var(--radius);
    font-size: 12.5px;
    margin-bottom: 12px;
  }
  .login-card .btn { width: 100%; justify-content: center; padding: 11px; }

  /* === MODAL === */
  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(20,20,20,0.4);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .modal {
    background: var(--panel);
    border-radius: var(--radius-lg);
    max-width: 640px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
  }
  .modal-head {
    padding: 18px 24px;
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-head h3 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    margin: 0;
    font-size: 18px;
  }
  .modal-body { padding: 22px 24px; }
  .modal-foot {
    padding: 14px 24px;
    border-top: 1px solid var(--rule);
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }

  /* === TOAST === */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    padding: 12px 18px;
    background: var(--ink);
    color: #f0eee7;
    border-radius: var(--radius);
    font-size: 13px;
    box-shadow: var(--shadow-lg);
    z-index: 200;
    animation: slideUp 0.2s ease-out;
  }
  .toast.success { background: var(--accent); }
  .toast.error { background: var(--danger); }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* === LIQUIDITY BARS === */
  .liq-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 14px;
  }
  .liq-card {
    background: var(--panel);
    border: 1px solid var(--rule);
    border-radius: var(--radius-lg);
    padding: 18px 20px;
  }
  .liq-card .head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }
  .liq-card .name {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-3);
    font-weight: 600;
  }
  .liq-card .saldo {
    font-family: 'Fraunces', serif;
    font-size: 24px;
    font-weight: 500;
    letter-spacing: -0.02em;
  }
  .liq-card .saldo.neg { color: var(--danger); }
  .liq-card .delta {
    font-size: 11px;
    color: var(--ink-3);
    margin-top: 4px;
    font-variant-numeric: tabular-nums;
  }
  .liq-card .delta .pos { color: var(--success); }
  .liq-card .delta .neg { color: var(--danger); }

  /* === SCROLLBARS === */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--rule-2); border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-3); }

  /* === MOBILE: bottone menu hamburger === */
  .menu-btn {
    display: none;
    background: transparent;
    color: #f0eee7;
    border: 1px solid #3a3a3a;
    width: 36px;
    height: 36px;
    border-radius: 6px;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    padding: 0;
  }
  .menu-btn:hover { background: #2d2d2d; }
  .sidebar-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(20,20,20,0.4);
    z-index: 90;
    animation: fadeIn 0.15s ease-out;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* === RESPONSIVE: mobile === */
  @media (max-width: 768px) {
    body { font-size: 14px; }

    .topbar {
      padding: 10px 14px;
      gap: 10px;
      flex-wrap: nowrap;
    }
    .topbar h1 {
      font-size: 15px;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .topbar h1 .sub { display: none; }
    .topbar .badge { display: none; }
    .topbar select {
      font-size: 13px;
      padding: 6px 8px;
      max-width: 110px;
    }
    .topbar button.icon-btn {
      font-size: 11px;
      padding: 5px 8px;
    }
    .topbar .desktop-only { display: none; }
    .menu-btn { display: inline-flex; }

    /* Sidebar diventa drawer */
    .layout { flex-direction: column; }
    .sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 75%;
      max-width: 280px;
      z-index: 100;
      flex-direction: column;
      flex-wrap: nowrap;
      padding: 20px 14px;
      overflow-y: auto;
      transform: translateX(-100%);
      transition: transform 0.22s ease-out;
      box-shadow: 0 0 30px rgba(0,0,0,0.15);
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar.open ~ .sidebar-backdrop { display: block; }
    .sidebar .section-label { display: block; margin-top: 14px; }
    .sidebar .section-label:first-child { margin-top: 0; }
    .navlink {
      padding: 10px 14px;
      font-size: 14px;
    }

    /* Main */
    .main {
      padding: 14px;
      width: 100%;
    }

    /* Page head */
    .page-head {
      flex-direction: column;
      align-items: stretch;
      gap: 12px;
      margin-bottom: 18px;
    }
    .page-head h2 { font-size: 22px; }
    .page-head .sub { font-size: 12px; }

    /* KPI grid: 2 colonne su mobile */
    .kpi-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }
    .kpi {
      padding: 12px 14px;
    }
    .kpi .label { font-size: 9.5px; margin-bottom: 4px; }
    .kpi .value { font-size: 20px; }
    .kpi .hint { font-size: 10.5px; }

    /* Liquidità grid: 2 colonne */
    .liq-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .liq-card { padding: 12px 14px; }
    .liq-card .saldo { font-size: 18px; }
    .liq-card .name { font-size: 10px; }
    .liq-card .delta { font-size: 10px; }

    /* Form: una colonna, label sopra */
    .form-row {
      grid-template-columns: 1fr;
      gap: 6px;
    }
    .form-row label { font-size: 12px; font-weight: 600; color: var(--ink); }
    input, select, textarea {
      font-size: 16px !important;  /* iOS no-zoom su focus */
      padding: 10px 12px;
    }

    /* Tipo switch */
    .tipo-switch button { font-size: 12px; padding: 9px 6px; }

    /* Filtri: full-width stack */
    .filters {
      gap: 8px;
    }
    .filters input, .filters select {
      max-width: none;
      width: 100%;
      font-size: 13.5px !important;
    }
    .filters .label { width: 100%; margin-bottom: -4px; }

    /* Tabelle: scroll fluido, font più compatto */
    .tbl-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border-radius: 8px;
    }
    table.tbl { font-size: 12px; min-width: 600px; }
    table.tbl th { padding: 8px 10px; font-size: 9.5px; }
    table.tbl td { padding: 8px 10px; }
    table.tbl td.num, table.tbl th.num { font-size: 11.5px; }

    /* Modal: quasi fullscreen su mobile */

let LIQ_CODES, contoByCode, codeByName;
function rebuildContiBase(){
  LIQ_CODES = CONTI.filter(c => c.categoria === 'DISP. LIQUIDE').map(c => c.codice);
  contoByCode = {}; CONTI.forEach(c => { contoByCode[c.codice] = c; });
  codeByName = {}; CONTI.forEach(c => { codeByName[c.nome.toUpperCase().replace(/\./g,' ').replace(/\s+/g,' ').trim()] = c.codice; });
}

function rebuildContiDerivati(){

  try{ rebuildLiqAlias(); }catch(e){}
}
function applyConti(list){ CONTI = list; rebuildContiDerivati(); }

/* ---- categorie rendiconto ---- */
function nk(s){ return String(s||'').toUpperCase().replace(/\./g,' ').replace(/-/g,' ').replace(/\s+/g,' ').trim(); }
function defaultCatOf(s){
  const nonliq=(s.righe||[]).filter(r=>!LIQ_CODES.includes(r.c));
  if(s.tipo==='giroconto') return 'Giroconto';
  if(nonliq.length===1) return contoByCode[nonliq[0].c]?.nome||'';
  return '';
}
function catOf(s){ return (s.cat!=null && s.cat!=='') ? s.cat : defaultCatOf(s); }

/* ---- tipo di operazione di una categoria (ricavo / costo / investimento) ----
   dedotto dal conto collegato: prima la mappatura dell'import, poi il conto omonimo */
let MAPPA_CAT = {};
function setMappaCat(m){ MAPPA_CAT = m || {}; }
function catTipoOf(nome){
  const k = nk(nome);
  let cod = MAPPA_CAT[k];
  if(cod==null) cod = codeByName[String(nome||'').toUpperCase().replace(/\./g,' ').replace(/\s+/g,' ').trim()];
  const c = (cod!=null) ? contoByCode[cod] : null;
  if(!c) return '';
  if(c.categoria==='RICAVI') return 'ricavo';
  if(c.categoria==='COSTI') return 'costo';
  if(c.categoria==='RICAVI/COSTI') return 'ricavo/costo';
  if(/^IMM\./.test(c.categoria)) return 'investimento';
  return '';
}
const TIPO_ORD = {'ricavo':0,'ricavo/costo':1,'costo':2,'investimento':3,'':9};
const SEZ_ORD = [{k:'entrata',l:'Entrate'},{k:'uscita',l:'Uscite'},{k:'investimento',l:'Investimenti'},{k:'interno',l:'Interne (fuori flusso)'}];

/* Selettore categoria: raggruppato per sezione (entrate/uscite/…) e,
   dentro ogni gruppo, ordinato per tipo di operazione (ricavi prima dei costi) */
function CatSelect({value, onChange, categorie, sezioni, style}){
  const list = (categorie||[]).filter(c=>!sezioni || sezioni.includes(c.sezione));
  const gruppi = SEZ_ORD.map(g=>({
    ...g,
    items: list.filter(c=>c.sezione===g.k)
      .map(c=>({...c, tipo:catTipoOf(c.nome)}))
      .sort((a,b)=>(TIPO_ORD[a.tipo]-TIPO_ORD[b.tipo]) || a.nome.localeCompare(b.nome,'it'))
  })).filter(g=>g.items.length);
  const orfane = list.filter(c=>!SEZ_ORD.some(g=>g.k===c.sezione)).sort((a,b)=>a.nome.localeCompare(b.nome,'it'));
  return (
    <select value={value} onChange={e=>onChange(e.target.value)} style={style}>
      <option value="">— nessuna —</option>
      {gruppi.map(g=>(
        <optgroup key={g.k} label={g.l}>
          {g.items.map(c=><option key={c.nome} value={c.nome}>{c.nome}{c.tipo?' · '+c.tipo:''}</option>)}
        </optgroup>
      ))}
      {orfane.length>0 && <optgroup label="Altre">{orfane.map(c=><option key={c.nome} value={c.nome}>{c.nome}</option>)}</optgroup>}
    </select>
  );
}

    else if(c.categoria==='COSTI' && !c.nome.toUpperCase().startsWith('AMMORTAMENTO')) sez='uscita';
    else if(c.categoria==='IMM. FINANZIARIE') sez='investimento';
    if(sez && !seen.has(c.nome)){ seen.add(c.nome); out.push({nome:c.nome,sezione:sez}); }
  });
  out.push({nome:'Giroconto',sezione:'interno'});
  return out;
}
const SEZIONI = [{v:'entrata',l:'Entrata'},{v:'uscita',l:'Uscita'},{v:'investimento',l:'Investimento'},{v:'interno',l:'Interno (escluso dal flusso)'}];

const MESI_ORD = ['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];

/* ---------- utils ---------- */
const eur = n => (n==null||isNaN(n)) ? '—' : new Intl.NumberFormat('it-IT',{style:'currency',currency:'EUR'}).format(n);
const num2 = n => (n==null||isNaN(n)) ? '0,00' : new Intl.NumberFormat('it-IT',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n);
const r2 = n => Math.round((n+Number.EPSILON)*100)/100;
const todayISO = () => new Date().toISOString().slice(0,10);
const fmtDate = iso => { if(!iso) return ''; const [y,m,d]=iso.split('-'); return `${d}/${m}/${y}`; };
const uid = () => 'm'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const meseOf = iso => iso ? MESI_ORD[parseInt(iso.slice(5,7),10)-1] : '';

/* ============================================================
   CALCOLI CONTABILI
   ============================================================ */
function calcSaldi(scritture){
  // saldo per conto: {dare, avere, saldo=dare-avere}
  const m = {};
  CONTI.forEach(c=>{ m[c.codice]={dare:0,avere:0}; });
  scritture.forEach(s=> s.righe.forEach(r=>{
    if(!m[r.c]) m[r.c]={dare:0,avere:0};
    m[r.c].dare += (r.d||0); m[r.c].avere += (r.a||0);
  }));
  Object.keys(m).forEach(k=>{ m[k].dare=r2(m[k].dare); m[k].avere=r2(m[k].avere); m[k].saldo=r2(m[k].dare-m[k].avere); });
  return m;
}
/* Rettifiche al saldo reale (allineamento movimenti storici incompleti).
   Cassa: i movimenti importati gennaio-maggio davano 119,50 ma la cassa effettiva è 0. */
const RETTIFICHE_REALI = { 3: -119.50 };

function saldoRealeConto(cod, scritture){
  const ini = SALDI_INIZIALI[cod] || 0;
  let e=0,u=0;
  MOVIMENTI.forEach(mv=>{ if(mv.cod===cod){ if(mv.tipo==='E') e+=mv.imp; else u+=mv.imp; } });
  let manuali=0;
  (scritture||[]).forEach(s=>{ if(s.origine==='manuale') s.righe.forEach(r=>{ if(r.c===cod) manuali += (r.d||0)-(r.a||0); }); });
  return r2(ini + e - u + manuali + (RETTIFICHE_REALI[cod]||0));
}

function DrillCassa({cod, scritture, onClose}){
  const c=contoByCode[cod];
  const lines=[];
  (scritture||[]).forEach(s=> s.righe.forEach(r=>{ if(r.c===cod) lines.push({id:s.id,data:s.data,descr:s.descr,d:r.d||0,a:r.a||0,tipo:s.tipo}); }));
  lines.sort((a,b)=>(a.data||'').localeCompare(b.data||''));
  let run=0; lines.forEach(l=>{ run=r2(run+l.d-l.a); l.saldo=run; });
  const view=[...lines].reverse();
  const entrate=r2(lines.reduce((s,l)=>s+l.d,0)), uscite=r2(lines.reduce((s,l)=>s+l.a,0));
  return (
    <div className="modal-bg" onClick={e=>{if(e.target.className==='modal-bg')onClose();}}>
      <div className="modal" style={{maxWidth:680}}>
        <div className="modal-head">
          <h3>{c.nome} — movimenti</h3>
          <button className="btn ghost sm" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body" style={{paddingTop:0}}>
          <div style={{display:'flex',gap:18,margin:'4px 0 14px',fontSize:13,color:'var(--ink-2)'}}>
            <span>Entrate <b className="pos">{num2(entrate)}</b></span>
            <span>Uscite <b className="neg">{num2(uscite)}</b></span>
            <span style={{marginLeft:'auto'}}>Saldo contabile <b>{eur(run)}</b></span>
          </div>
          <div className="tbl-wrap">
            <table className="tbl">
              <thead><tr><th style={{width:84}}>Data</th><th>Descrizione</th><th className="num">Importo</th><th className="num">Saldo</th></tr></thead>
              <tbody>
                {view.length===0 && <tr><td colSpan="4" className="empty-state">Nessun movimento</td></tr>}
                {view.map((l,i)=>(
                  <tr key={l.id+'_'+i}>
                    <td style={{whiteSpace:'nowrap'}}>{fmtDate(l.data)}</td>
                    <td>{l.descr}{l.tipo==='giroconto'&&<span className="pill giroconto" style={{marginLeft:6}}>giroconto</span>}</td>
                    <td className={'num '+(l.d>0?'pos':'neg')}>{l.d>0?'+':'−'}{num2(l.d>0?l.d:l.a)}</td>
                    <td className={'num '+(l.saldo<0?'neg':'')}>{num2(l.saldo)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  );
}

/* Pop-up movimenti di una riga del Rendiconto (categoria + sezione) */
function DrillRendiconto({sezKey, sezLabel, catNome, scritture, categorie, onClose}){
  const catSez={}; (categorie||[]).forEach(c=>{ catSez[nk(c.nome)]=c.sezione; });
  const liq=LIQ_CODES; const isOpening=s=>/apertur/i.test(s.descr||'');
  const lines=[];
  (scritture||[]).forEach(s=>{
    if(isOpening(s)||s.tipo==='giroconto') return;
    const liqLines=(s.righe||[]).filter(r=>liq.includes(r.c));
    if(liqLines.length===0) return;
    const cat=catOf(s); const sez=catSez[nk(cat)]||null;
    if(sez==='interno') return;
    const dIn=r2(liqLines.reduce((x,r)=>x+(r.d||0),0));
    const aOut=r2(liqLines.reduce((x,r)=>x+(r.a||0),0));
    const amount=Math.abs(r2(dIn-aOut)); if(amount<=0) return;
    const inflow=dIn>=aOut;
    const section = sez==='investimento'?'investimento':(sez==='entrata'?'entrata':(sez==='uscita'?'uscita':(inflow?'entrata':'uscita')));
    const cn=cat||'(senza categoria)';
    if(section!==sezKey || cn!==catNome) return;
    lines.push({id:s.id,data:s.data,descr:s.descr,amount});
  });
  lines.sort((a,b)=>(a.data||'').localeCompare(b.data||''));
  const tot=r2(lines.reduce((s,l)=>s+l.amount,0));
  const entrata = sezKey==='entrata';
  const view=[...lines].reverse();
  return (
    <div className="modal-bg" onClick={e=>{if(e.target.className==='modal-bg')onClose();}}>
      <div className="modal" style={{maxWidth:680}}>
        <div className="modal-head">
          <h3>{catNome} — movimenti</h3>
          <button className="btn ghost sm" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body" style={{paddingTop:0}}>
          <div style={{display:'flex',gap:18,margin:'4px 0 14px',fontSize:13,color:'var(--ink-2)'}}>
            <span>{sezLabel}</span>
            <span style={{marginLeft:'auto'}}>Totale <b className={entrata?'pos':'neg'}>{entrata?'+':'−'}{num2(tot)}</b></span>
          </div>
          <div className="tbl-wrap">
            <table className="tbl">
              <thead><tr><th style={{width:84}}>Data</th><th>Descrizione</th><th className="num">Importo</th></tr></thead>
              <tbody>
                {view.length===0 && <tr><td colSpan="3" className="empty-state">Nessun movimento</td></tr>}
                {view.map((l,i)=>(
                  <tr key={(l.id||'x')+'_'+i}>
                    <td style={{whiteSpace:'nowrap'}}>{fmtDate(l.data)}</td>
                    <td>{l.descr}</td>
                    <td className={'num '+(entrata?'pos':'neg')}>{entrata?'+':'−'}{num2(l.amount)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  );
}

function PageDashboard({scritture, saldi, goto}){
  const [drill,setDrill]=useState(null);
  const liq = LIQ_CODES.map(cod=>{
    const c = contoByCode[cod];
    const contabile = saldi[cod] ? saldi[cod].saldo : 0;
    const reale = saldoRealeConto(cod, scritture);
    return {cod, nome:c.nome, contabile, reale, diff:r2(reale-contabile)};
  });
  const totLiqContabile = r2(liq.reduce((s,x)=>s+x.contabile,0));
  const totLiqReale = r2(liq.reduce((s,x)=>s+x.reale,0));
  const disallineato = liq.some(x=>Math.abs(x.diff)>0.01);

  // sintesi patrimoniale / economica
  const sumCat = (cats, side) => r2(CONTI.filter(c=>cats.includes(c.categoria)).reduce((s,c)=>{
    const v=saldi[c.codice]||{dare:0,avere:0};
    return s + (side==='saldo'? (v.dare-v.avere) : side==='avere'?(v.avere-v.dare):(v.dare-v.avere));
  },0));
  const immMat = sumCat(['IMM. MATERIALI'],'saldo');
  const immFin = sumCat(['IMM. FINANZIARIE'],'saldo');
  const fondi = -sumCat(['RETTIFICA ATTIVO'],'saldo'); // saldo avere => negativo, lo rendo positivo
  const ricavi = r2(CONTI.filter(c=>c.categoria==='RICAVI').reduce((s,c)=>{const v=saldi[c.codice]||{dare:0,avere:0};return s+(v.avere-v.dare);},0));
  const costi = r2(CONTI.filter(c=>c.categoria==='COSTI').reduce((s,c)=>{const v=saldi[c.codice]||{dare:0,avere:0};return s+(v.dare-v.avere);},0));
  const risultato = r2(ricavi-costi);
  const pn = r2(CONTI.filter(c=>c.categoria==='PATRIMONIO NETTO').reduce((s,c)=>{const v=saldi[c.codice]||{dare:0,avere:0};return s+(v.avere-v.dare);},0));

  // flusso mensile (da movimenti reali)
  const mesiUsati = MESI_ORD.filter(m=>MOVIMENTI.some(x=>x.mese===m));
  const flusso = mesiUsati.map(m=>{
    const e=r2(MOVIMENTI.filter(x=>x.mese===m&&x.tipo==='E').reduce((s,x)=>s+x.imp,0));
    const u=r2(MOVIMENTI.filter(x=>x.mese===m&&x.tipo==='U').reduce((s,x)=>s+x.imp,0));
    return {m,e,u,delta:r2(e-u)};
  });
  const chartRef = useRef(null);
  useEffect(()=>{
    if(!chartRef.current || !window.Chart) return;
    const ctx = chartRef.current.getContext('2d');
    const ch = new Chart(ctx,{type:'bar',data:{labels:flusso.map(f=>f.m),datasets:[
      {label:'Entrate',data:flusso.map(f=>f.e),backgroundColor:'#1f4f8f'},
      {label:'Uscite',data:flusso.map(f=>f.u),backgroundColor:'#b54343'},
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'}},scales:{y:{ticks:{callback:v=>num2(v)}}}}});
    return ()=>ch.destroy();
  },[scritture]);

  return (
    <div>
      <PageHead title="Dashboard" sub="Disponibilità reali e sintesi di bilancio">
        <button className="btn accent" onClick={()=>goto('nuova')}>+ Nuova scrittura</button>
      </PageHead>

      {disallineato &&
        <div className="card" style={{borderColor:'#e6d5a8',background:'#fbf6e8',marginBottom:20,cursor:'pointer'}} onClick={()=>goto('movimenti')}>
          <strong style={{color:'#7a5a1d'}}>⚠ Disallineamento contabilità ↔ movimenti reali.</strong>
          <span style={{color:'var(--ink-2)',marginLeft:8}}>I saldi di libro giornale non coincidono con i movimenti di cassa. Vai a “Movimenti & Riconciliazione” per il dettaglio.</span>
        </div>}

      <div className="kpi-grid">
        <Kpi accent label="Disponibilità liquide (reali)" value={eur(totLiqReale)} hint={`Saldo contabile: ${eur(totLiqContabile)}`}/>
        <Kpi label="Immobilizzazioni nette" value={eur(r2(immMat+immFin-fondi))} hint={`Materiali ${eur(immMat)} · Finanziarie ${eur(immFin)} · F.do ${eur(fondi)}`}/>
        <Kpi label="Patrimonio netto" value={eur(pn)}/>
        <Kpi label="Risultato d'esercizio" value={eur(risultato)} neg={risultato<0} hint={`Ricavi ${eur(ricavi)} · Costi ${eur(costi)}`}/>
      </div>

      <div className="card-title serif" style={{fontSize:16,margin:'4px 0 12px'}}>Disponibilità per conto</div>
      <div className="liq-grid" style={{marginBottom:28}}>
        {liq.map(x=>(
          <div className="liq-card" key={x.cod} onClick={()=>setDrill(x.cod)} style={{cursor:'pointer'}} title="Vedi tutti i movimenti">
            <div className="head">
              <span className="name">{x.nome}</span>
              <span style={{fontSize:11,color:'var(--ink-3)'}}>dettaglio →</span>
            </div>
            <div className={'saldo'+(x.reale<0?' neg':'')}>{eur(x.reale)}</div>
            <div className="delta">
              contabile {eur(x.contabile)} · diff <span className={Math.abs(x.diff)<0.01?'':(x.diff<0?'neg':'pos')}>{x.diff>0?'+':''}{num2(x.diff)} €</span>
            </div>
          </div>
        ))}
      </div>

      {drill!=null && <DrillCassa cod={drill} scritture={scritture} onClose={()=>setDrill(null)}/>}


      <div className="card flat">
        <div className="card-title">Flusso di cassa mensile (movimenti reali)</div>
        <div style={{height:260}}><canvas ref={chartRef}></canvas></div>
      </div>
    </div>
  );
}

function ContoSelect({value,onChange,filter}){
  const list = filter ? CONTI.filter(filter) : CONTI;
  const order=[]; const groups={};
  list.forEach(c=>{ if(!groups[c.categoria]){ groups[c.categoria]=[]; order.push(c.categoria); } groups[c.categoria].push(c); });
  return (
    <select value={value} onChange={e=>onChange(e.target.value?parseInt(e.target.value):'')}>
      <option value="">— seleziona conto —</option>
      {order.map(cat=>(
        <optgroup key={cat} label={cat}>
          {groups[cat].map(c=><option key={c.codice} value={c.codice}>{c.codice} · {c.nome}</option>)}
        </optgroup>
      ))}
    </select>
  );
}

function PageNuova({onAdd, toast, categorie}){
  const [mode,setMode] = useState('liquidita'); // liquidita | contabile
  const [data,setData] = useState(todayISO());
  const [descr,setDescr] = useState('');
  const [cat,setCat] = useState('');
  // modalità liquidità: verso = E entrata | U uscita | G giroconto
  const [verso,setVerso] = useState('U');
  const [contoLiq,setContoLiq] = useState(1);     // conto liquidità (E/U) o conto DA (G)
  const [contoLiqA,setContoLiqA] = useState(3);   // conto AL (solo giroconto)
  const [contropartita,setContropartita] = useState('');
  const [importo,setImporto] = useState('');
  // modalità contabile libera
  const [righe,setRighe] = useState([{c:'',d:'',a:''},{c:'',d:'',a:''}]);

  const setRiga=(i,k,v)=>setRighe(rs=>rs.map((r,j)=>j===i?{...r,[k]:v}:r));
  const addRiga=()=>setRighe(rs=>[...rs,{c:'',d:'',a:''}]);
  const delRiga=i=>setRighe(rs=>rs.filter((_,j)=>j!==i));

  const totD = mode==='contabile' ? r2(righe.reduce((s,r)=>s+(parseFloat(r.d)||0),0)) : 0;
  const totA = mode==='contabile' ? r2(righe.reduce((s,r)=>s+(parseFloat(r.a)||0),0)) : 0;
  const quadra = Math.abs(totD-totA)<0.005 && totD>0;

  function submit(){
    if(!data){ toast('Inserisci la data','error'); return; }
    let nuove=[], tipo=mode;
    if(mode==='liquidita'){
      const imp = parseFloat(importo);
      if(!imp||imp<=0){ toast('Importo non valido','error'); return; }
      if(verso==='G'){
        if(contoLiq===contoLiqA){ toast('I due conti devono essere diversi','error'); return; }
        nuove=[{c:contoLiqA,d:imp,a:0},{c:contoLiq,d:0,a:imp}]; tipo='giroconto';
      } else {
        if(!contropartita){ toast('Seleziona la contropartita','error'); return; }
        if(verso==='E') nuove=[{c:contoLiq,d:imp,a:0},{c:contropartita,d:0,a:imp}];
        else            nuove=[{c:contropartita,d:imp,a:0},{c:contoLiq,d:0,a:imp}];
      }
    } else {
      if(!quadra){ toast('La scrittura non quadra (Dare ≠ Avere)','error'); return; }
      nuove = righe.filter(r=>r.c&&((parseFloat(r.d)||0)>0||(parseFloat(r.a)||0)>0))
                   .map(r=>({c:parseInt(r.c),d:r2(parseFloat(r.d)||0),a:r2(parseFloat(r.a)||0)}));
      if(nuove.length<2){ toast('Servono almeno due righe valide','error'); return; }
    }
    const defDescr = verso==='G' ? `Giroconto ${contoByCode[contoLiq].nome} → ${contoByCode[contoLiqA].nome}` : '(senza descrizione)';
    const catFin = mode==='liquidita' ? (verso==='G' ? 'Giroconto' : cat) : '';
    onAdd({id:uid(),data,descr:descr||defDescr,righe:nuove,origine:'manuale',tipo,cat:catFin});
    toast(verso==='G'?'Giroconto registrato':'Scrittura registrata','success');
    setDescr(''); setImporto(''); setContropartita(''); setCat('');
    setRighe([{c:'',d:'',a:''},{c:'',d:'',a:''}]);
  }

  return (
    <div>
      <PageHead title="Nuova scrittura" sub="Registrazione in partita doppia"/>
      <div className="card" style={{maxWidth:760}}>
        <div className="tipo-switch" style={{gridTemplateColumns:'1fr 1fr',marginBottom:20}}>
          <button className={mode==='liquidita'?'active entrata':''} onClick={()=>setMode('liquidita')}>Con liquidità</button>
          <button className={mode==='contabile'?'active giroconto':''} onClick={()=>setMode('contabile')}>Contabile (libera)</button>
        </div>

        <div className="form-grid">
          {mode==='liquidita' && <>
            <div className="form-row"><label>Tipo movimento</label>
              <div className="tipo-switch" style={{gridTemplateColumns:'1fr 1fr 1fr'}}>
                <button className={verso==='E'?'active entrata':''} onClick={()=>setVerso('E')}>Entrata</button>
                <button className={verso==='U'?'active uscita':''} onClick={()=>setVerso('U')}>Uscita</button>
                <button className={verso==='G'?'active giroconto':''} onClick={()=>setVerso('G')}>Giroconto</button>
              </div>
            </div>
          </>}

          <div className="form-row"><label>Data <span className="req">*</span></label><input type="date" value={data} onChange={e=>setData(e.target.value)}/></div>
          <div className="form-row"><label>Descrizione</label><input type="text" value={descr} onChange={e=>setDescr(e.target.value)} placeholder="Es. Stipendio, spesa supermercato…"/></div>

          {mode==='liquidita' && verso!=='G' && <>
            <div className="form-row"><label>Conto liquidità <span className="req">*</span></label>
              <ContoSelect value={contoLiq} onChange={setContoLiq} filter={c=>c.categoria==='DISP. LIQUIDE'}/>
            </div>
            <div className="form-row"><label>Contropartita <span className="req">*</span></label>
              <ContoSelect value={contropartita} onChange={setContropartita} filter={c=>c.categoria!=='DISP. LIQUIDE'}/>
            </div>
            <div className="form-row"><label>Importo <span className="req">*</span></label><input type="number" step="0.01" value={importo} onChange={e=>setImporto(e.target.value)} placeholder="0,00"/></div>
            <div className="form-row"><label>Categoria rendiconto</label>
              <CatSelect value={cat} onChange={setCat} categorie={categorie} sezioni={verso==='E'?['entrata']:['uscita','investimento']}/>
            </div>
            <div style={{background:'var(--panel-2)',borderRadius:6,padding:'12px 14px',fontSize:12.5,color:'var(--ink-2)'}}>
              {verso==='E'
                ? <>Dare <b>{contoByCode[contoLiq]?.nome}</b> · Avere <b>{contropartita?contoByCode[contropartita]?.nome:'…'}</b></>
                : <>Dare <b>{contropartita?contoByCode[contropartita]?.nome:'…'}</b> · Avere <b>{contoByCode[contoLiq]?.nome}</b></>}
            </div>
          </>}

          {mode==='liquidita' && verso==='G' && <>
            <div className="form-row"><label>Dal conto <span className="req">*</span></label>
              <ContoSelect value={contoLiq} onChange={setContoLiq} filter={c=>c.categoria==='DISP. LIQUIDE'}/>
            </div>
            <div className="form-row"><label>Al conto <span className="req">*</span></label>
              <ContoSelect value={contoLiqA} onChange={setContoLiqA} filter={c=>c.categoria==='DISP. LIQUIDE'}/>
            </div>
            <div className="form-row"><label>Importo <span className="req">*</span></label><input type="number" step="0.01" value={importo} onChange={e=>setImporto(e.target.value)} placeholder="0,00"/></div>
            <div style={{background:'var(--panel-2)',borderRadius:6,padding:'12px 14px',fontSize:12.5,color:'var(--ink-2)'}}>
              Dare <b>{contoByCode[contoLiqA]?.nome}</b> · Avere <b>{contoByCode[contoLiq]?.nome}</b>
            </div>
          </>}

          {mode==='contabile' && <>
            <div className="tbl-wrap">
              <table className="tbl">
                <thead><tr><th>Conto</th><th className="num">Dare</th><th className="num">Avere</th><th></th></tr></thead>
                <tbody>
                  {righe.map((r,i)=>(
                    <tr key={i}>
                      <td><ContoSelect value={r.c} onChange={v=>setRiga(i,'c',v)}/></td>
                      <td className="num"><input type="number" step="0.01" value={r.d} onChange={e=>setRiga(i,'d',e.target.value)} style={{textAlign:'right'}}/></td>
                      <td className="num"><input type="number" step="0.01" value={r.a} onChange={e=>setRiga(i,'a',e.target.value)} style={{textAlign:'right'}}/></td>
                      <td><button className="btn ghost sm" onClick={()=>delRiga(i)} disabled={righe.length<=2}>✕</button></td>
                    </tr>
                  ))}
                </tbody>
                <tfoot><tr>
                  <td style={{fontWeight:600}}>Totali</td>
                  <td className="num" style={{fontWeight:600}}>{num2(totD)}</td>
                  <td className="num" style={{fontWeight:600}}>{num2(totA)}</td>
                  <td className="num" style={{color:quadra?'var(--success)':'var(--danger)',fontWeight:600}}>{quadra?'✓':'≠'}</td>
                </tr></tfoot>
              </table>
            </div>
            <button className="btn ghost sm" onClick={addRiga} style={{alignSelf:'flex-start'}}>+ Aggiungi riga</button>
          </>}

          <div style={{display:'flex',justifyContent:'flex-end',gap:8,marginTop:8}}>
            <button className="btn accent" onClick={submit}>{verso==='G'&&mode==='liquidita'?'Registra giroconto':'Registra scrittura'}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   PAGINA: MOVIMENTI  (riepilogo di TUTTI i movimenti)
   ============================================================ */
function PageMovimenti({scritture, saldi}){
  const [tab,setTab] = useState('tutti'); // tutti | cassa | riconc
  const [fConto,setFConto] = useState('');
  const [fTipo,setFTipo] = useState('');
  const [q,setQ] = useState('');
  const [fMese,setFMese] = useState('');
  const [fContoCassa,setFContoCassa] = useState('');

  // --- TUTTI I MOVIMENTI: una riga per ogni movimento di conto del libro giornale ---
  const tutte = useMemo(()=>{
    const out=[];
    scritture.forEach(s=> s.righe.forEach((r,i)=>{
      out.push({key:s.id+'_'+i, data:s.data, descr:s.descr, tipo:s.tipo, origine:s.origine, c:r.c, d:r.d||0, a:r.a||0});
    }));
    return out.sort((x,y)=> (y.data||'').localeCompare(x.data||''));
  },[scritture]);
  const contiUsati = useMemo(()=>{ const set=new Set(); tutte.forEach(m=>set.add(m.c)); return [...set].sort((a,b)=>a-b); },[tutte]);
  const movFilt = tutte.filter(m=>(!fConto||String(m.c)===fConto)&&(!fTipo||m.tipo===fTipo)
      &&(!q || (m.descr||'').toLowerCase().includes(q.toLowerCase()) || (contoByCode[m.c]?.nome||'').toLowerCase().includes(q.toLowerCase())));
  const totD=r2(movFilt.reduce((s,m)=>s+m.d,0)), totA=r2(movFilt.reduce((s,m)=>s+m.a,0));

  // --- CASSA (movimenti reali importati) ---
  const cassaFilt = MOVIMENTI.filter(m=>(!fMese||m.mese===fMese)&&(!fContoCassa||String(m.cod)===fContoCassa))
    .sort((a,b)=>MESI_ORD.indexOf(a.mese)-MESI_ORD.indexOf(b.mese));
  const cassaE=r2(cassaFilt.filter(m=>m.tipo==='E').reduce((s,m)=>s+m.imp,0));
  const cassaU=r2(cassaFilt.filter(m=>m.tipo==='U').reduce((s,m)=>s+m.imp,0));

  // --- RICONCILIAZIONE ---
  const ric = LIQ_CODES.map(cod=>{
    const c=contoByCode[cod];
    const contabile = saldi[cod]?saldi[cod].saldo:0;
    const ini = SALDI_INIZIALI[cod]||0;
    const e = r2(MOVIMENTI.filter(m=>m.cod===cod&&m.tipo==='E').reduce((s,m)=>s+m.imp,0));
    const u = r2(MOVIMENTI.filter(m=>m.cod===cod&&m.tipo==='U').reduce((s,m)=>s+m.imp,0));
    const reale = saldoRealeConto(cod, scritture);
    return {cod,nome:c.nome,contabile,ini,e,u,reale,diff:r2(reale-contabile)};
  });
  const totDiff = r2(ric.reduce((s,x)=>s+x.diff,0));
  const tipoLabel = t => t==='giroconto'?'giroconto':t==='liquidita'?'liquidità':t==='contabile'?'contabile':t;

  return (
    <div>
      <PageHead title="Movimenti" sub="Riepilogo di tutti i movimenti registrati"/>
      <div className="tipo-switch" style={{gridTemplateColumns:'1fr 1fr 1fr',maxWidth:560,marginBottom:22}}>
        <button className={tab==='tutti'?'active entrata':''} onClick={()=>setTab('tutti')}>Tutti i movimenti</button>
        <button className={tab==='cassa'?'active entrata':''} onClick={()=>setTab('cassa')}>Cassa (importati)</button>
        <button className={tab==='riconc'?'active entrata':''} onClick={()=>setTab('riconc')}>Riconciliazione</button>
      </div>

      {tab==='tutti' && <>
        <div className="filters">
          <span className="label">Conto</span>
          <select value={fConto} onChange={e=>setFConto(e.target.value)}><option value="">Tutti</option>{contiUsati.map(c=><option key={c} value={c}>{contoByCode[c]?.nome||('#'+c)}</option>)}</select>
          <span className="label">Tipo</span>
          <select value={fTipo} onChange={e=>setFTipo(e.target.value)}><option value="">Tutti</option><option value="liquidita">Liquidità</option><option value="giroconto">Giroconto</option><option value="contabile">Contabile</option></select>
          <input type="text" placeholder="Cerca descrizione/conto…" value={q} onChange={e=>setQ(e.target.value)}/>
          <span style={{marginLeft:'auto',fontSize:12,color:'var(--ink-3)'}}>{movFilt.length} movimenti</span>
        </div>
        <div className="tbl-wrap">
          <table className="tbl">
            <thead><tr><th>Data</th><th>Descrizione</th><th>Conto</th><th>Tipo</th><th className="num">Dare</th><th className="num">Avere</th></tr></thead>
            <tbody>
              {movFilt.length===0 && <tr><td colSpan="6" className="empty-state">Nessun movimento</td></tr>}
              {movFilt.map(m=>(
                <tr key={m.key}>
                  <td style={{whiteSpace:'nowrap'}}>{fmtDate(m.data)}</td>
                  <td>{m.descr}</td>
                  <td>{contoByCode[m.c]?.nome||('#'+m.c)}</td>
                  <td><span className={'pill '+(m.tipo==='giroconto'?'giroconto':'')}>{tipoLabel(m.tipo)}</span></td>
                  <td className="num">{m.d>0?num2(m.d):''}</td>
                  <td className="num">{m.a>0?num2(m.a):''}</td>
                </tr>
              ))}
            </tbody>
            <tfoot><tr><td colSpan="4" style={{fontWeight:600}}>Totali</td><td className="num" style={{fontWeight:600}}>{num2(totD)}</td><td className="num" style={{fontWeight:600}}>{num2(totA)}</td></tr></tfoot>
          </table>
        </div>
      </>}

      {tab==='cassa' && <>
        <div className="filters">
          <span className="label">Mese</span>
          <select value={fMese} onChange={e=>setFMese(e.target.value)}><option value="">Tutti</option>{MESI_ORD.filter(m=>MOVIMENTI.some(x=>x.mese===m)).map(m=><option key={m}>{m}</option>)}</select>
          <span className="label">Conto</span>
          <select value={fContoCassa} onChange={e=>setFContoCassa(e.target.value)}><option value="">Tutti</option>{LIQ_CODES.map(c=><option key={c} value={c}>{contoByCode[c].nome}</option>)}</select>
          <span style={{marginLeft:'auto',fontSize:12,color:'var(--ink-3)'}}>+{num2(cassaE)} · −{num2(cassaU)}</span>
        </div>
        <div className="tbl-wrap">
          <table className="tbl">
            <thead><tr><th>Mese</th><th>Conto</th><th>Causale</th><th>Categoria</th><th>Metodo</th><th className="num">Importo</th></tr></thead>
            <tbody>
              {cassaFilt.map((m,i)=>(
                <tr key={i}><td>{m.mese}</td><td>{m.conto}</td><td>{m.motivo}</td><td>{m.cat}</td><td>{m.metodo}</td>
                  <td className={'num '+(m.tipo==='E'?'pos':'neg')}>{m.tipo==='E'?'+':'−'}{num2(m.imp)}</td></tr>
              ))}
            </tbody>
          </table>
        </div>
        <div style={{fontSize:12,color:'var(--ink-3)',marginTop:8,fontStyle:'italic'}}>Movimenti reali importati dagli sheet Entrate/Uscite. Servono da riscontro per la riconciliazione.</div>
      </>}

      {tab==='riconc' && <>
        {Math.abs(totDiff)<0.01
          ? <div className="card" style={{borderColor:'#c8d8ce',background:'var(--accent-soft)',marginBottom:18,color:'var(--accent-ink)'}}><b>✓ Contabilità e movimenti reali allineati.</b></div>
          : <div className="card" style={{borderColor:'#e6d5a8',background:'#fbf6e8',marginBottom:18,color:'#7a5a1d'}}><b>⚠ Differenza complessiva {num2(totDiff)} €</b> tra saldo reale (movimenti) e saldo contabile (giornale).</div>}
        <div className="tbl-wrap">
          <table className="tbl">
            <thead><tr><th>Conto</th><th className="num">Saldo iniziale</th><th className="num">Entrate</th><th className="num">Uscite</th><th className="num">Saldo reale</th><th className="num">Saldo contabile</th><th className="num">Differenza</th></tr></thead>
            <tbody>
              {ric.map(x=>(
                <tr key={x.cod}>
                  <td><b>{x.nome}</b></td>
                  <td className="num">{num2(x.ini)}</td><td className="num pos">{num2(x.e)}</td><td className="num neg">{num2(x.u)}</td>
                  <td className="num">{num2(x.reale)}</td><td className="num">{num2(x.contabile)}</td>
                  <td className={'num '+(Math.abs(x.diff)<0.01?'':(x.diff<0?'neg':'pos'))}>{x.diff>0?'+':''}{num2(x.diff)}</td>
                </tr>
              ))}
            </tbody>
            <tfoot><tr><td style={{fontWeight:600}}>Totale</td><td colSpan="5"></td><td className="num" style={{fontWeight:600,color:Math.abs(totDiff)<0.01?'var(--success)':'var(--warn)'}}>{num2(totDiff)}</td></tr></tfoot>
          </table>
        </div>
      </>}
    </div>
  );
}

/* ---- editor scrittura (modifica/elimina) ---- */
function ScritturaEditor({scrittura,onSave,onDelete,onClose,toast,categorie}){
  const [data,setData]=useState(scrittura.data||todayISO());
  const [descr,setDescr]=useState(scrittura.descr||'');
  const [cat,setCat]=useState(scrittura.cat!=null?scrittura.cat:(catOf(scrittura)||''));
  const [righe,setRighe]=useState(scrittura.righe.map(r=>({c:r.c||'',d:r.d||'',a:r.a||''})));
  const setRiga=(i,k,v)=>setRighe(rs=>rs.map((r,j)=>j===i?{...r,[k]:v}:r));
  const addRiga=()=>setRighe(rs=>[...rs,{c:'',d:'',a:''}]);
  const delRiga=i=>setRighe(rs=>rs.filter((_,j)=>j!==i));
  const totD=r2(righe.reduce((s,r)=>s+(parseFloat(r.d)||0),0));
  const totA=r2(righe.reduce((s,r)=>s+(parseFloat(r.a)||0),0));
  const quadra=Math.abs(totD-totA)<0.005 && totD>0;
  function save(){
    if(!data){ toast('Inserisci la data','error'); return; }
    if(!quadra){ toast('La scrittura non quadra (Dare ≠ Avere)','error'); return; }
    const rr=righe.filter(r=>r.c&&((parseFloat(r.d)||0)>0||(parseFloat(r.a)||0)>0))
                  .map(r=>({c:parseInt(r.c),d:r2(parseFloat(r.d)||0),a:r2(parseFloat(r.a)||0)}));
    if(rr.length<2){ toast('Servono almeno due righe valide','error'); return; }
    onSave({data,descr:descr||'(senza descrizione)',righe:rr,cat});
  }
  return (
    <div className="modal-bg" onClick={e=>{if(e.target.className==='modal-bg')onClose();}}>
      <div className="modal" style={{maxWidth:680}}>
        <div className="modal-head"><h3>Modifica scrittura</h3><button className="btn ghost sm" onClick={onClose}>✕</button></div>
        <div className="modal-body"><div className="form-grid">
          <div className="form-row"><label>Data</label><input type="date" value={data} onChange={e=>setData(e.target.value)}/></div>
          <div className="form-row"><label>Descrizione</label><input type="text" value={descr} onChange={e=>setDescr(e.target.value)}/></div>
          <div className="form-row"><label>Categoria rendiconto</label>
            <CatSelect value={cat} onChange={setCat} categorie={categorie}/>
          </div>
          <div className="tbl-wrap">
            <table className="tbl">
              <thead><tr><th>Conto</th><th className="num">Dare</th><th className="num">Avere</th><th></th></tr></thead>
              <tbody>
                {righe.map((r,i)=>(
                  <tr key={i}>
                    <td><ContoSelect value={r.c} onChange={v=>setRiga(i,'c',v)}/></td>
                    <td className="num"><input type="number" step="0.01" value={r.d} onChange={e=>setRiga(i,'d',e.target.value)} style={{textAlign:'right'}}/></td>
                    <td className="num"><input type="number" step="0.01" value={r.a} onChange={e=>setRiga(i,'a',e.target.value)} style={{textAlign:'right'}}/></td>
                    <td><button className="btn ghost sm" onClick={()=>delRiga(i)} disabled={righe.length<=2}>✕</button></td>
                  </tr>
                ))}
              </tbody>
              <tfoot><tr><td style={{fontWeight:600}}>Totali</td>
                <td className="num" style={{fontWeight:600}}>{num2(totD)}</td>
                <td className="num" style={{fontWeight:600}}>{num2(totA)}</td>
                <td className="num" style={{color:quadra?'var(--success)':'var(--danger)',fontWeight:600}}>{quadra?'✓':'≠'}</td>
              </tr></tfoot>
            </table>
          </div>
          <button className="btn ghost sm" onClick={addRiga} style={{alignSelf:'flex-start'}}>+ Aggiungi riga</button>
        </div></div>
        <div className="modal-foot" style={{justifyContent:'space-between'}}>
          <button className="btn danger" onClick={()=>{ if(window.confirm('Eliminare questa scrittura?')) onDelete(); }}>Elimina</button>
          <div style={{display:'flex',gap:8}}>
            <button className="btn ghost" onClick={onClose}>Annulla</button>
            <button className="btn accent" onClick={save}>Salva</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   PAGINA: LIBRO GIORNALE
   ============================================================ */
function PageLibroGiornale({scritture, onUpdate, onDelete, onDeleteMany, toast, categorie}){
  const [editing,setEditing]=useState(null);
  const [q,setQ]=useState('');
  const [fConto,setFConto]=useState('');
  const [fMese,setFMese]=useState('');
  const [selected,setSelected]=useState(()=>new Set());
  const toggleSel=id=>setSelected(prev=>{ const n=new Set(prev); n.has(id)?n.delete(id):n.add(id); return n; });
  const mesi=[...new Set(scritture.map(s=>(s.data||'').slice(0,7)).filter(Boolean))].sort().reverse();
  const contiUsati=[...new Set(scritture.flatMap(s=>s.righe.map(r=>r.c)))].sort((a,b)=>a-b);
  const cod = fConto?parseInt(fConto):null;

  // ---- VISTA MASTRINO (conto selezionato) ----
  if(cod){
    const righe=[];
    scritture.forEach(s=>{
      if(q && !(s.descr||'').toLowerCase().includes(q.toLowerCase())) return;
      s.righe.forEach(r=>{ if(r.c===cod) righe.push({id:s.id, data:s.data, descr:s.descr, d:r.d||0, a:r.a||0}); });
    });
    righe.sort((a,b)=>(a.data||'').localeCompare(b.data||''));
    const saldoIni = fMese ? r2(righe.filter(r=>(r.data||'').slice(0,7) < fMese).reduce((s,r)=>s+r.d-r.a,0)) : 0;
    const vis = fMese ? righe.filter(r=>(r.data||'').slice(0,7)===fMese) : righe;
    let run=saldoIni;
    const rows=vis.map(r=>{ run=r2(run+r.d-r.a); return {...r,saldo:run}; });
    const totD=r2(vis.reduce((s,r)=>s+r.d,0)), totA=r2(vis.reduce((s,r)=>s+r.a,0));
    const saldoFin=r2(saldoIni+totD-totA);
    const c=contoByCode[cod];
    return (
      <div>
        <PageHead title="Libro Giornale" sub="Mastrino di conto"/>
        <div className="filters">
          <span className="label">Conto</span>
          <select value={fConto} onChange={e=>setFConto(e.target.value)}><option value="">Tutti (giornale)</option>{contiUsati.map(x=><option key={x} value={x}>{contoByCode[x]?.nome||('#'+x)}</option>)}</select>
          <span className="label">Mese</span>
          <select value={fMese} onChange={e=>setFMese(e.target.value)}><option value="">Tutti</option>{mesi.map(m=><option key={m} value={m}>{m}</option>)}</select>
          <input type="text" placeholder="Cerca descrizione…" value={q} onChange={e=>setQ(e.target.value)}/>
        </div>
        <div className="card" style={{marginBottom:14,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10}}>
          <div><span className="serif" style={{fontSize:18}}>{c.nome}</span> <span className="pill" style={{marginLeft:8}}>{c.categoria}</span></div>
          <div style={{textAlign:'right'}}><div style={{fontSize:12,color:'var(--ink-3)'}}>Saldo {fMese?('a fine '+fMese):'attuale'}</div><div className={'serif '+(saldoFin<0?'neg':'')} style={{fontSize:22}}>{eur(saldoFin)}</div></div>
        </div>
        <div className="tbl-wrap">
          <table className="tbl">
            <thead><tr><th style={{width:90}}>Data</th><th>Descrizione</th><th className="num">Dare</th><th className="num">Avere</th><th className="num">Saldo</th></tr></thead>
            <tbody>
              {fMese && <tr className="gj-head"><td></td><td><i>Saldo iniziale periodo</i></td><td className="num"></td><td className="num"></td><td className="num">{num2(saldoIni)}</td></tr>}
              {rows.length===0 && <tr><td colSpan="5" className="empty-state">Nessun movimento</td></tr>}
              {rows.map((r,i)=>(
                <tr key={r.id+'_'+i}>
                  <td style={{whiteSpace:'nowrap'}}>{fmtDate(r.data)}</td>
                  <td>{r.descr}</td>
                  <td className="num">{r.d>0?num2(r.d):''}</td>
                  <td className="num">{r.a>0?num2(r.a):''}</td>
                  <td className={'num '+(r.saldo<0?'neg':'')}>{num2(r.saldo)}</td>
                </tr>
              ))}
            </tbody>
            <tfoot><tr><td colSpan="2" style={{fontWeight:600}}>Totali periodo</td><td className="num" style={{fontWeight:600}}>{num2(totD)}</td><td className="num" style={{fontWeight:600}}>{num2(totA)}</td><td className="num" style={{fontWeight:700}}>{num2(saldoFin)}</td></tr></tfoot>
          </table>
        </div>
      </div>
    );
  }

  // ---- VISTA GIORNALE (raggruppata per scrittura) ----
  const list=scritture.filter(s=>(!fMese||(s.data||'').slice(0,7)===fMese)&&(!q||(s.descr||'').toLowerCase().includes(q.toLowerCase())))
    .sort((a,b)=>(b.data||'').localeCompare(a.data||''));
  const totD=r2(list.reduce((s,e)=>s+e.righe.reduce((x,r)=>x+(r.d||0),0),0));
  const totA=r2(list.reduce((s,e)=>s+e.righe.reduce((x,r)=>x+(r.a||0),0),0));

  const listIds=list.map(s=>s.id);
  const selCount=selected.size;
  const allSel=list.length>0 && listIds.every(id=>selected.has(id));
  const someSel=listIds.some(id=>selected.has(id));
  const toggleAll=()=>setSelected(prev=>{ const n=new Set(prev); if(allSel){ listIds.forEach(id=>n.delete(id)); } else { listIds.forEach(id=>n.add(id)); } return n; });
  function bulkDelete(){
    const ids=[...selected];
    if(!ids.length) return;
    if(!window.confirm(`Eliminare ${ids.length} scrittur${ids.length===1?'a':'e'} selezionat${ids.length===1?'a':'e'}? L'operazione non è reversibile.`)) return;
    onDeleteMany(ids);
    setSelected(new Set());
    toast(`${ids.length} scritture eliminate`,'success');
  }

  return (
    <div>
      <PageHead title="Libro Giornale" sub={`${list.length} scritture in partita doppia`}/>
      <div className="filters">
        <span className="label">Conto</span>

/* ============================================================
   PAGINA: RENDICONTO FINANZIARIO  (matrice: mesi in colonna, raggruppabile)
   ============================================================ */
const RF_INVEST = ['FONDI INVESTIMENTO'];
const RF_INTERNI = ['GIROCONTI','RICARICA PREPAGATA','RICARICA CARTA'];

/* helper condiviso: costruisce il rendiconto dalle scritture di liquidità */
function rfMonthKey(iso){ return (iso||'').slice(0,7); }
function rfMonthLabel(key){ const p=key.split('-'); const nm=MESI_ORD[parseInt(p[1],10)-1]||p[1]; return nm.charAt(0).toUpperCase()+nm.slice(1); }
function buildRendiconto(scritture, categorie){
  const catSez={}; (categorie||[]).forEach(c=>{ catSez[nk(c.nome)]=c.sezione; });
  const liq=LIQ_CODES; const isOpening=s=>/apertur/i.test(s.descr||'');
  const acc={entrata:{},uscita:{},investimento:{}}; const mesiSet=new Set();
  (scritture||[]).forEach(s=>{
    if(isOpening(s)||s.tipo==='giroconto') return;
    const liqLines=(s.righe||[]).filter(r=>liq.includes(r.c));
    if(liqLines.length===0) return;
    const cat=catOf(s); const sez=catSez[nk(cat)]||null;
    if(sez==='interno') return;
    const key=rfMonthKey(s.data); if(!key) return;
    const dIn=r2(liqLines.reduce((x,r)=>x+(r.d||0),0));
    const aOut=r2(liqLines.reduce((x,r)=>x+(r.a||0),0));
    const amount=Math.abs(r2(dIn-aOut)); if(amount<=0) return;
    const inflow=dIn>=aOut;
    const section = sez==='investimento'?'investimento':(sez==='entrata'?'entrata':(sez==='uscita'?'uscita':(inflow?'entrata':'uscita')));
    mesiSet.add(key);
    const cn=cat||'(senza categoria)';
    acc[section][cn]=acc[section][cn]||{}; acc[section][cn][key]=r2((acc[section][cn][key]||0)+amount);
  });
  const mesi=[...mesiSet].sort();
  const sumSec=(o,k)=>r2(Object.values(o).reduce((s,x)=>s+(x[k]||0),0));
  const totEnt={},totUsc={},totInv={},flusso={},dispIni={},dispFin={};
  const apertura=r2(LIQ_CODES.reduce((s,c)=>s+(SALDI_INIZIALI[c]||0),0));
  let prev=apertura;
  mesi.forEach(k=>{ totEnt[k]=sumSec(acc.entrata,k); totUsc[k]=sumSec(acc.uscita,k); totInv[k]=sumSec(acc.investimento,k);
    flusso[k]=r2(totEnt[k]-totUsc[k]-totInv[k]); dispIni[k]=prev; dispFin[k]=r2(prev+flusso[k]); prev=dispFin[k]; });
  const catRows=sec=>Object.entries(acc[sec]).map(([nome,perMese])=>({nome,perMese,tot:r2(mesi.reduce((s,k)=>s+(perMese[k]||0),0))})).sort((a,b)=>b.tot-a.tot);
  const colTot={ dispIni:apertura, dispFin:mesi.length?dispFin[mesi[mesi.length-1]]:apertura,
    totEnt:r2(mesi.reduce((s,k)=>s+totEnt[k],0)), totUsc:r2(mesi.reduce((s,k)=>s+totUsc[k],0)),
    totInv:r2(mesi.reduce((s,k)=>s+totInv[k],0)), flusso:r2(mesi.reduce((s,k)=>s+flusso[k],0)) };
  return {mesi,dispIni,dispFin,totEnt,totUsc,totInv,flusso,colTot,rows:{entrata:catRows('entrata'),uscita:catRows('uscita'),investimento:catRows('investimento')}};
}
