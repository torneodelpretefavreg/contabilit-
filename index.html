/* mappa conti di ammortamento per "classe" normalizzata */
function normKey(s){ return String(s||'').toUpperCase().replace(/\./g,' ').replace(/-/g,' ').replace(/\s+/g,' ').trim(); }
let AMM_COST = {}, AMM_FONDO = {};
function rebuildAmmMaps(){
  AMM_COST = {}; AMM_FONDO = {};
  CONTI.forEach(c=>{
    const up=c.nome.toUpperCase();
    if(c.categoria==='COSTI' && up.startsWith('AMMORTAMENTO')) AMM_COST[normKey(up.replace(/^AMMORTAMENTO/,''))]=c.codice;
    if(c.categoria==='RETTIFICA ATTIVO' && /^F\.?\s*AMMORTAMENTO/.test(up)) AMM_FONDO[normKey(up.replace(/^F\.?\s*AMMORTAMENTO/,''))]=c.codice;
  });
}
rebuildAmmMaps();

function PageAmmortamenti({cespiti, onAdd, updateCespiti, toast}){
  const [anno,setAnno]=useState(new Date().getFullYear());
  const piano = cespiti.map(c=>{
    const quotaTeorica = r2((c.costoStorico||0)*(c.aliquota||0));
    const vn = r2((c.costoStorico||0)-(c.fondo||0));
    const quota = r2(Math.min(quotaTeorica, Math.max(vn,0)));   // non oltre il residuo
    const annoFine = (c.aliquota>0 && c.annoIni) ? c.annoIni + Math.ceil(1/c.aliquota) - 1 : null;
    const residuo = vn>0.005;
    const k = normKey(c.classe);
    return {...c, quota, vn, annoFine, residuo, costCode:AMM_COST[k], fondoCode:AMM_FONDO[k]};
  });
  const totQuota=r2(piano.reduce((s,p)=>s+(p.residuo?p.quota:0),0));
  const totVN=r2(piano.reduce((s,p)=>s+p.vn,0));

  // anteprima scrittura: solo cespiti con quota>0 e conti collegati
  const daAmmortare = piano.filter(p=>p.residuo && p.quota>0.005);
  const collegati = daAmmortare.filter(p=>p.costCode && p.fondoCode);
  const scollegati = daAmmortare.filter(p=>!p.costCode || !p.fondoCode);
  const quotaScrittura = r2(collegati.reduce((s,p)=>s+p.quota,0));

  function generaScrittura(){
    if(collegati.length===0){ toast('Nessun cespite ammortizzabile collegato','error'); return; }
    if(!window.confirm(`Registrare l'ammortamento ${anno} per ${eur(quotaScrittura)} e aggiornare i fondi dei ${collegati.length} cespiti collegati?`)) return;
    // aggrega per conto (più cespiti possono condividere gli stessi conti)
    const dare={}, avere={};
    collegati.forEach(p=>{ dare[p.costCode]=r2((dare[p.costCode]||0)+p.quota); avere[p.fondoCode]=r2((avere[p.fondoCode]||0)+p.quota); });
    const righe=[ ...Object.entries(dare).map(([c,d])=>({c:parseInt(c),d,a:0})),
                  ...Object.entries(avere).map(([c,a])=>({c:parseInt(c),d:0,a})) ];
    onAdd({id:uid(),data:`${anno}-12-31`,descr:`Ammortamento esercizio ${anno}`,righe,origine:'manuale',tipo:'contabile'});
    // aggiorna i fondi sui cespiti collegati
    const ids=new Set(collegati.map(p=>p.id));
    updateCespiti(cespiti.map(c=>{
      if(!ids.has(c.id)) return c;
      const p=collegati.find(x=>x.id===c.id);
      return {...c, fondo:r2((c.fondo||0)+p.quota)};
    }));
    toast('Scrittura di ammortamento registrata','success');
  }

  return (
    <div>
      <PageHead title="Piano di Ammortamento" sub="Quote d'esercizio e valore residuo"/>

      <div className="card" style={{marginBottom:22}}>
        <div className="card-title">Genera scrittura di ammortamento di fine anno</div>
        <div style={{display:'flex',gap:14,alignItems:'flex-end',flexWrap:'wrap'}}>
          <div className="form-row" style={{maxWidth:140}}>
            <label>Esercizio</label>
            <input type="number" value={anno} onChange={e=>setAnno(parseInt(e.target.value)||anno)}/>
          </div>
          <div style={{flex:1,minWidth:220,background:'var(--panel-2)',borderRadius:6,padding:'10px 14px',fontSize:13,color:'var(--ink-2)'}}>
            Quota da registrare: <b>{eur(quotaScrittura)}</b> · cespiti collegati: <b>{collegati.length}</b>
            {scollegati.length>0 && <div style={{color:'var(--warn)',marginTop:4,fontSize:12}}>⚠ {scollegati.length} senza conto collegato (esclusi): {scollegati.map(p=>p.nome).join(', ')}</div>}
          </div>
          <button className="btn accent" onClick={generaScrittura} disabled={collegati.length===0}>Registra 31/12/{anno}</button>
        </div>
        {collegati.length>0 && <div className="tbl-wrap" style={{marginTop:14}}>
          <table className="tbl">
            <thead><tr><th>Cespite</th><th>Conto costo (Dare)</th><th>Fondo (Avere)</th><th className="num">Quota</th></tr></thead>
            <tbody>
              {collegati.map(p=>(
                <tr key={p.id}><td>{p.nome}</td><td style={{fontSize:12}}>{contoByCode[p.costCode].nome}</td>
                  <td style={{fontSize:12}}>{contoByCode[p.fondoCode].nome}</td><td className="num">{num2(p.quota)}</td></tr>
              ))}
            </tbody>
            <tfoot><tr><td colSpan="3" style={{fontWeight:600}}>Totale</td><td className="num" style={{fontWeight:600}}>{num2(quotaScrittura)}</td></tr></tfoot>
          </table>
        </div>}
      </div>

      <div className="kpi-grid">
        <Kpi accent label="Quota ammortamento esercizio" value={eur(totQuota)} hint="Beni ancora da ammortizzare"/>
        <Kpi label="Valore netto residuo" value={eur(totVN)}/>
        <Kpi label="N. cespiti" value={piano.length}/>
      </div>
      <div className="tbl-wrap">
        <table className="tbl">
          <thead><tr><th>Cespite</th><th className="num">Costo storico</th><th className="num">Aliquota</th><th className="num">Quota annua</th><th className="num">Fondo</th><th className="num">Valore netto</th><th>Stato</th></tr></thead>
          <tbody>
            {piano.map(p=>(
              <tr key={p.id}>
                <td><b>{p.nome}</b>{p.annoFine&&<div style={{fontSize:11,color:'var(--ink-3)'}}>{p.annoIni}–{p.annoFine}</div>}</td>
                <td className="num">{num2(p.costoStorico)}</td>
                <td className="num">{((p.aliquota||0)*100).toFixed(0)}%</td>
                <td className="num">{num2(p.quota)}</td>
                <td className="num">{num2(p.fondo)}</td>
                <td className="num">{num2(p.vn)}</td>
                <td>{p.residuo?<span className="pill entrata">in ammortamento</span>:<span className="pill">completato</span>}</td>
              </tr>
            ))}
          </tbody>
          <tfoot><tr><td style={{fontWeight:600}}>Totali</td><td colSpan="2"></td><td className="num" style={{fontWeight:600}}>{num2(totQuota)}</td><td></td><td className="num" style={{fontWeight:600}}>{num2(totVN)}</td><td></td></tr></tfoot>
        </table>
      </div>
      <div style={{fontSize:12,color:'var(--ink-3)',marginTop:10,fontStyle:'italic'}}>Quota annua = costo storico × aliquota. Periodo stimato in base all'aliquota a quote costanti.</div>
    </div>
  );
}

/* ============================================================
   PAGINA: PIANO DEI CONTI
   ============================================================ */
function PagePianoConti({saldi, conti, setConti, toast}){
  const list = (conti && conti.length) ? conti : CONTI;
  const [q,setQ]=useState('');
  const [fProsp,setFProsp]=useState('');
  const [showAdd,setShowAdd]=useState(false);
  const nextCod = list.reduce((m,c)=>Math.max(m,c.codice||0),0)+1;
  const [form,setForm]=useState({codice:nextCod,nome:'',prospetto:'SP',categoria:'',eccedenza:'DARE'});
  const cats = Array.from(new Set(list.map(c=>c.categoria).filter(Boolean))).sort();

  const rows=list.filter(c=>(!q||c.nome.toLowerCase().includes(q.toLowerCase())||String(c.codice)===q)&&(!fProsp||c.prospetto.startsWith(fProsp)));

  const usato = cod => { const s=saldi[cod]; return !!(s&&(s.dare!==0||s.avere!==0)); };

  function aggiungi(){
    const nome=(form.nome||'').trim();
    const codice=parseInt(form.codice,10);
    if(!nome){ toast&&toast('Inserisci il nome del conto','error'); return; }
    if(!codice||codice<1){ toast&&toast('Codice non valido','error'); return; }
    if(list.some(c=>c.codice===codice)){ toast&&toast('Codice già esistente','error'); return; }
    const categoria=(form.categoria||'').trim().toUpperCase()||'—';
    const nuovo={codice,nome:nome.toUpperCase(),prospetto:form.prospetto,categoria,eccedenza:form.eccedenza};
    const next=[...list,nuovo].sort((a,b)=>a.codice-b.codice);
    setConti(next);
    toast&&toast('Conto aggiunto','success');
    setForm({codice:codice+1,nome:'',prospetto:form.prospetto,categoria:form.categoria,eccedenza:'DARE'});
  }

  function elimina(c){
    if(usato(c.codice)){ toast&&toast('Impossibile eliminare: il conto ha movimenti','error'); return; }
    if(!window.confirm(`Eliminare il conto ${c.codice} · ${c.nome}?`)) return;
    setConti(list.filter(x=>x.codice!==c.codice));
    toast&&toast('Conto eliminato','success');
  }

  return (
    <div>
      <PageHead title="Piano dei Conti" sub={`${list.length} conti`}/>
      <div className="filters">
        <input type="text" placeholder="Cerca per nome o codice…" value={q} onChange={e=>setQ(e.target.value)}/>
        <span className="label">Prospetto</span>
        <select value={fProsp} onChange={e=>setFProsp(e.target.value)}><option value="">Tutti</option><option value="SP">Stato Patrimoniale</option><option value="CE">Conto Economico</option></select>
        <div style={{flex:1}}></div>
        <button className="btn accent sm" onClick={()=>setShowAdd(s=>!s)}>{showAdd?'Chiudi':'+ Nuovo conto'}</button>
      </div>

      {showAdd && <div className="card" style={{marginBottom:18}}>
        <div className="card-title">Nuovo conto</div>
        <div style={{display:'flex',gap:12,flexWrap:'wrap',alignItems:'flex-end'}}>
          <div className="form-row" style={{maxWidth:90}}>
            <label>Codice</label>
            <input type="number" value={form.codice} onChange={e=>setForm(f=>({...f,codice:e.target.value}))}/>
          </div>
          <div className="form-row" style={{flex:1,minWidth:200}}>
            <label>Nome conto</label>
            <input type="text" value={form.nome} onChange={e=>setForm(f=>({...f,nome:e.target.value}))} placeholder="ES. NUOVO CONTO" onKeyDown={e=>{if(e.key==='Enter')aggiungi();}}/>
          </div>
          <div className="form-row" style={{maxWidth:120}}>
            <label>Prospetto</label>
            <select value={form.prospetto} onChange={e=>setForm(f=>({...f,prospetto:e.target.value}))}><option>SP</option><option>CE</option><option>CE/SP</option></select>
          </div>
          <div className="form-row" style={{minWidth:180}}>
            <label>Categoria</label>
            <input list="pc-cat-list" value={form.categoria} onChange={e=>setForm(f=>({...f,categoria:e.target.value}))} placeholder="ES. COSTI"/>
            <datalist id="pc-cat-list">{cats.map(k=><option key={k} value={k}/>)}</datalist>
          </div>
          <div className="form-row" style={{maxWidth:150}}>
            <label>Eccedenza</label>
            <select value={form.eccedenza} onChange={e=>setForm(f=>({...f,eccedenza:e.target.value}))}><option>DARE</option><option>AVERE</option><option>DARE/AVERE</option></select>
          </div>
          <button className="btn accent" onClick={aggiungi}>Aggiungi</button>
        </div>
      </div>}

      <div className="tbl-wrap">
        <table className="tbl">
          <thead><tr><th style={{width:50}}>Cod</th><th>Conto</th><th>Prospetto</th><th>Categoria</th><th>Eccedenza</th><th className="num">Saldo</th><th style={{width:44}}></th></tr></thead>
          <tbody>
            {rows.sort((a,b)=>a.codice-b.codice).map(c=>{
              const s=saldi[c.codice];
              const inUse=usato(c.codice);
              return <tr key={c.codice}>
                <td className="mono">{c.codice}</td><td><b>{c.nome}</b></td>
                <td><span className="pill">{c.prospetto}</span></td>
                <td style={{fontSize:12}}>{c.categoria}</td>
                <td style={{fontSize:12,color:'var(--ink-3)'}}>{c.eccedenza}</td>
                <td className={'num '+(s&&s.saldo<0?'neg':'')}>{s&&(s.dare!==0||s.avere!==0)?num2(s.saldo):'—'}</td>
                <td style={{textAlign:'center'}}>
                  <button
                    onClick={()=>elimina(c)}
                    disabled={inUse}
                    title={inUse?'Conto con movimenti: non eliminabile':'Elimina conto'}
                    style={{background:'transparent',border:'none',color:inUse?'var(--rule-2)':'var(--danger)',fontSize:15,lineHeight:1,padding:'2px 6px',cursor:inUse?'not-allowed':'pointer'}}>✕</button>
                </td>
              </tr>;
            })}
          </tbody>
        </table>
      </div>
      <div style={{fontSize:12,color:'var(--ink-3)',marginTop:10,fontStyle:'italic'}}>I conti con movimenti non possono essere eliminati. Le modifiche al piano dei conti vengono salvate automaticamente.</div>
    </div>
  );
}

/* ============================================================
   PAGINA: EXPORT
   ============================================================ */
function PageExport({scritture, cespiti, saldi, categorie, toast}){
  const spce = ()=>{
    const saldoOf=c=>(saldi[c.codice]||{saldo:0}).saldo;
    const rc=cat=>CONTI.filter(c=>c.categoria===cat).map(c=>({nome:c.nome,saldo:saldoOf(c)})).filter(r=>Math.abs(r.saldo)>0.001);
    const ss=cat=>r2(CONTI.filter(c=>c.categoria===cat).reduce((s,c)=>s+saldoOf(c),0));
    const immMat=ss('IMM. MATERIALI'),immFin=ss('IMM. FINANZIARIE'),disp=ss('DISP. LIQUIDE'),fondi=ss('RETTIFICA ATTIVO');
    const attivo=r2(immMat+immFin+disp+fondi);
    const pn=ss('PATRIMONIO NETTO');
    const ricavi=r2(CONTI.filter(c=>c.categoria==='RICAVI').reduce((s,c)=>s-saldoOf(c),0));
    const costi=r2(CONTI.filter(c=>c.categoria==='COSTI').reduce((s,c)=>s+saldoOf(c),0));
    const risultato=r2(ricavi-costi);
    return {rc,immMat,immFin,disp,fondi,attivo,pn,passivoNetto:r2(-pn),ricavi,costi,risultato};
  };
  const spAoA = ()=>{
    const d=spce(); const o=[['STATO PATRIMONIALE','€']];
    o.push(['ATTIVO — Immobilizzazioni materiali','']); d.rc('IMM. MATERIALI').forEach(r=>o.push(['   '+r.nome,r.saldo]));
    o.push(['Immobilizzazioni finanziarie','']); d.rc('IMM. FINANZIARIE').forEach(r=>o.push(['   '+r.nome,r.saldo]));
    o.push(['Fondi ammortamento (−)','']); d.rc('RETTIFICA ATTIVO').forEach(r=>o.push(['   '+r.nome,r.saldo]));
    o.push(['Disponibilità liquide','']); d.rc('DISP. LIQUIDE').forEach(r=>o.push(['   '+r.nome,r.saldo]));
    o.push(['TOTALE ATTIVO',d.attivo]);
    o.push(['PASSIVO E NETTO — Patrimonio netto','']); d.rc('PATRIMONIO NETTO').forEach(r=>o.push(['   '+r.nome,r2(-r.saldo)]));
    o.push(["Risultato d'esercizio",d.risultato]);
    o.push(['TOTALE PASSIVO E NETTO',r2(d.passivoNetto+d.risultato)]);
    return o;
  };
  const ceAoA = ()=>{
    const d=spce(); const o=[['CONTO ECONOMICO','€']];
    o.push(['RICAVI','']); d.rc('RICAVI').forEach(r=>o.push(['   '+r.nome,r2(-r.saldo)]));
    o.push(['TOTALE RICAVI',d.ricavi]);
    o.push(['COSTI','']); d.rc('COSTI').forEach(r=>o.push(['   '+r.nome,r.saldo]));
    o.push(['TOTALE COSTI',d.costi]);
    o.push(["RISULTATO D'ESERCIZIO",d.risultato]);
    return o;
  };

  function buildWorkbook(){
    const wb=XLSX.utils.book_new();
    const add=(name,aoa)=>XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(aoa),name);

    // Libro Giornale
    const gj=[['Data','Descrizione','Codice','Conto','Dare','Avere']];
    [...scritture].sort((a,b)=>(a.data||'').localeCompare(b.data||'')).forEach(s=>s.righe.forEach((r,i)=>
      gj.push([i===0?s.data:'',i===0?s.descr:'',r.c,contoByCode[r.c]?.nome||'',r.d||'',r.a||''])));
    add('Libro Giornale',gj);

    // Movimenti (tutti)
    const mv=[['Data','Descrizione','Conto','Tipo','Dare','Avere']];
    [...scritture].sort((a,b)=>(b.data||'').localeCompare(a.data||'')).forEach(s=>s.righe.forEach(r=>
      mv.push([s.data,s.descr,contoByCode[r.c]?.nome||'',s.tipo,r.d||'',r.a||''])));
    add('Movimenti',mv);

    // Movimenti cassa importati
    const cs=[['Mese','Conto','Causale','Categoria','Metodo','Tipo','Importo']];
    MOVIMENTI.forEach(m=>cs.push([m.mese,m.conto,m.motivo,m.cat,m.metodo,m.tipo==='E'?'Entrata':'Uscita',m.imp]));
    add('Movimenti Cassa',cs);

    // Pivot / Bilancio di verifica
    const pv=[['Codice','Conto','Prospetto','Categoria','Dare','Avere','Saldo']];
    let td=0,ta=0;
    CONTI.forEach(c=>{const s=saldi[c.codice]||{dare:0,avere:0,saldo:0}; if(s.dare||s.avere){ pv.push([c.codice,c.nome,c.prospetto,c.categoria,s.dare,s.avere,s.saldo]); td+=s.dare; ta+=s.avere; }});
    pv.push(['','','','TOTALE',r2(td),r2(ta),r2(td-ta)]);
    add('Bilancio di Verifica',pv);

    // Rendiconto (mesi in colonna) — da scritture+categorie
    const rf=buildRendiconto(scritture,categorie);
    const rfHead=['Voce',...rf.mesi.map(rfMonthLabel),'Totale'];
    const rfRows=[['Disponibilità iniziali',...rf.mesi.map(k=>rf.dispIni[k]),rf.colTot.dispIni]];
    const pushSez=(label,tot,colT,rows)=>{ rfRows.push([label,...rf.mesi.map(k=>tot[k]||0),colT]); rows.forEach(r=>rfRows.push(['  '+r.nome,...rf.mesi.map(k=>r.perMese[k]||0),r.tot])); };
    pushSez('Entrate operative',rf.totEnt,rf.colTot.totEnt,rf.rows.entrata);
    pushSez('Uscite operative',rf.totUsc,rf.colTot.totUsc,rf.rows.uscita);
    if(rf.rows.investimento.length) pushSez('Investimenti',rf.totInv,rf.colTot.totInv,rf.rows.investimento);
    rfRows.push(['Flusso del periodo',...rf.mesi.map(k=>rf.flusso[k]),rf.colTot.flusso]);
    rfRows.push(['Disponibilità finali',...rf.mesi.map(k=>rf.dispFin[k]),rf.colTot.dispFin]);
    add('Rendiconto',[rfHead,...rfRows]);

    // Cespiti
    const ce=[['Cespite','Classe','Anno','Costo storico','Aliquota','Quota es.','Fondo','Valore netto']];
    cespiti.forEach(c=>ce.push([c.nome,c.classe,c.annoIni,c.costoStorico,c.aliquota,c.quotaEs,c.fondo,r2((c.costoStorico||0)-(c.fondo||0))]));
    add('Cespiti',ce);

    // Piano dei conti
    const pc=[['Codice','Nome','Prospetto','Categoria','Eccedenza']];
    CONTI.forEach(c=>pc.push([c.codice,c.nome,c.prospetto,c.categoria,c.eccedenza]));
    add('Piano dei Conti',pc);

    // Stato Patrimoniale e Conto Economico
    add('Stato Patrimoniale',spAoA());
    add('Conto Economico',ceAoA());

    return wb;
  }
  function exportExcel(){
    if(!window.XLSX){ toast('Libreria non caricata','error'); return; }
    XLSX.writeFile(buildWorkbook(),`Contabilita_${todayISO()}.xlsx`);
    toast('Export Excel completato','success');
  }
  function exportJson(){
    const data={scritture,cespiti,exportedAt:new Date().toISOString()};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download=`backup_contabilita_${todayISO()}.json`; a.click(); URL.revokeObjectURL(a.href);
    toast('Backup JSON scaricato','success');
  }

  // ---------- PDF ----------
  function pdfHeader(doc,titolo){
    const cx=doc.internal.pageSize.getWidth()/2;
    doc.setFont('helvetica','bold'); doc.setFontSize(16);
    doc.text('CONTABILITÀ PERSONALE',cx,18,{align:'center'});
    doc.setFontSize(11); doc.setFont('helvetica','normal');
    doc.text(titolo,cx,25,{align:'center'});
    doc.setFontSize(9); doc.setTextColor(120);
    doc.text(`Generato il ${new Date().toLocaleDateString('it-IT')}`,cx,31,{align:'center'});
    doc.setTextColor(0);
  }
  function finTable(doc,aoa,startY){
    const body=aoa.slice(1).map(r=>{
      const isHead=r[1]===''; const isTot=/^TOTALE|^RISULTATO/.test(r[0]);
      const st = isTot?{fontStyle:'bold',fillColor:[225,233,228]}:(isHead?{fontStyle:'bold',fillColor:[240,238,233]}:{});
      return [{content:r[0],styles:st},{content:(typeof r[1]==='number'?num2(r[1]):''),styles:{...st,halign:'right'}}];
    });
    doc.autoTable({startY,head:[[aoa[0][0],aoa[0][1]]],body,styles:{fontSize:9,cellPadding:1.6},headStyles:{fillColor:[31,79,143]},columnStyles:{1:{halign:'right',cellWidth:40}}});
    return doc.lastAutoTable.finalY;
  }
  function drawBilancioVerifica(doc){
    pdfHeader(doc,'Bilancio di Verifica');
    let td=0,ta=0; const rows=[];
    CONTI.forEach(c=>{const s=saldi[c.codice]||{dare:0,avere:0,saldo:0}; if(s.dare||s.avere){
      td+=s.dare; ta+=s.avere;
      rows.push([String(c.codice).padStart(2,'0'),c.nome,c.categoria,s.dare?num2(s.dare):'',s.avere?num2(s.avere):'',num2(Math.abs(s.saldo))+(s.saldo<0?' A':s.saldo>0?' D':'')]);
    }});
    rows.push([{content:'TOTALI',colSpan:3,styles:{fontStyle:'bold'}},{content:num2(r2(td)),styles:{fontStyle:'bold'}},{content:num2(r2(ta)),styles:{fontStyle:'bold'}},'']);
    doc.autoTable({startY:36,head:[['Cod','Conto','Categoria','Dare','Avere','Saldo']],body:rows,
      styles:{fontSize:8,cellPadding:1.5},headStyles:{fillColor:[31,79,143]},columnStyles:{3:{halign:'right'},4:{halign:'right'},5:{halign:'right'}}});
  }
  function drawSPCE(doc){
    pdfHeader(doc,'Stato Patrimoniale e Conto Economico');
    let y=finTable(doc,spAoA(),36)+10;
    if(y>235){ doc.addPage(); y=20; }
    finTable(doc,ceAoA(),y);
  }
  function drawRendiconto(doc){
    pdfHeader(doc,'Rendiconto Finanziario');
    const rf=buildRendiconto(scritture,categorie);
    const body=[];
    body.push(['Disponibilità iniziali',...rf.mesi.map(k=>num2(rf.dispIni[k])),num2(rf.colTot.dispIni)]);
    const pushSez=(label,tot,colT,rows)=>{ body.push([{content:label,styles:{fontStyle:'bold',fillColor:[238,238,233]}},...rf.mesi.map(k=>({content:num2(tot[k]||0),styles:{fontStyle:'bold'}})),{content:num2(colT),styles:{fontStyle:'bold'}}]); rows.forEach(r=>body.push(['   '+r.nome,...rf.mesi.map(k=>num2(r.perMese[k]||0)),num2(r.tot)])); };
    pushSez('Entrate operative',rf.totEnt,rf.colTot.totEnt,rf.rows.entrata);
    pushSez('Uscite operative',rf.totUsc,rf.colTot.totUsc,rf.rows.uscita);
    if(rf.rows.investimento.length) pushSez('Investimenti',rf.totInv,rf.colTot.totInv,rf.rows.investimento);
    body.push([{content:'Flusso del periodo',styles:{fontStyle:'bold'}},...rf.mesi.map(k=>({content:num2(rf.flusso[k]),styles:{fontStyle:'bold'}})),{content:num2(rf.colTot.flusso),styles:{fontStyle:'bold'}}]);
    body.push([{content:'Disponibilità finali',styles:{fontStyle:'bold'}},...rf.mesi.map(k=>({content:num2(rf.dispFin[k]),styles:{fontStyle:'bold'}})),{content:num2(rf.colTot.dispFin),styles:{fontStyle:'bold'}}]);
    const halign={}; rf.mesi.forEach((_,i)=>halign[i+1]={halign:'right'}); halign[rf.mesi.length+1]={halign:'right'};
    doc.autoTable({startY:36,head:[['Voce',...rf.mesi.map(rfMonthLabel),'Totale']],body,styles:{fontSize:8,cellPadding:1.5},headStyles:{fillColor:[31,79,143]},columnStyles:halign});
  }
  function drawGiornale(doc){
    pdfHeader(doc,'Libro Giornale');
    const body=[];
    [...scritture].sort((a,b)=>(a.data||'').localeCompare(b.data||'')).forEach(s=>{
      body.push([{content:`${fmtDate(s.data)} — ${s.descr}`,colSpan:3,styles:{fontStyle:'bold',fillColor:[240,238,233]}}]);
      s.righe.forEach(r=>body.push([(r.d>0?'':'    ')+ (contoByCode[r.c]?.nome||('#'+r.c)), r.d>0?num2(r.d):'', r.a>0?num2(r.a):'']));
    });
    doc.autoTable({startY:36,head:[['Conto','Dare','Avere']],body,styles:{fontSize:8,cellPadding:1.4},headStyles:{fillColor:[31,79,143]},columnStyles:{1:{halign:'right'},2:{halign:'right'}}});
  }
  function drawCespiti(doc){
    pdfHeader(doc,'Cespiti e Ammortamenti');
    const body=cespiti.map(c=>[c.nome,c.classe||'',num2(c.costoStorico||0),((c.aliquota||0)*100).toFixed(0)+'%',num2(r2((c.costoStorico||0)*(c.aliquota||0))),num2(c.fondo||0),num2(r2((c.costoStorico||0)-(c.fondo||0)))]);
    doc.autoTable({startY:36,head:[['Cespite','Classe','Costo storico','Aliq.','Quota','Fondo','Valore netto']],body,styles:{fontSize:8,cellPadding:1.5},headStyles:{fillColor:[31,79,143]},columnStyles:{2:{halign:'right'},4:{halign:'right'},5:{halign:'right'},6:{halign:'right'}}});
  }
  function newDoc(landscape){ const {jsPDF}=window.jspdf; return new jsPDF({orientation:landscape?'landscape':'portrait',unit:'mm',format:'a4'}); }
  function exportBilancioPDF(){ if(!window.jspdf){toast('Libreria PDF non caricata','error');return;} const doc=newDoc(); drawBilancioVerifica(doc); doc.save(`Bilancio_di_Verifica_${todayISO()}.pdf`); toast('PDF generato','success'); }
  function exportSPCEPDF(){ if(!window.jspdf){toast('Libreria PDF non caricata','error');return;} const doc=newDoc(); drawSPCE(doc); doc.save(`Bilancio_SP_CE_${todayISO()}.pdf`); toast('PDF generato','success'); }
  function exportRendicontoPDF(){ if(!window.jspdf){toast('Libreria PDF non caricata','error');return;} const doc=newDoc(true); drawRendiconto(doc); doc.save(`Rendiconto_${todayISO()}.pdf`); toast('PDF generato','success'); }
  function exportGiornalePDF(){ if(!window.jspdf){toast('Libreria PDF non caricata','error');return;} const doc=newDoc(); drawGiornale(doc); doc.save(`Libro_Giornale_${todayISO()}.pdf`); toast('PDF generato','success'); }
  function exportPacchettoPDF(){
    if(!window.jspdf){toast('Libreria PDF non caricata','error');return;}
    const doc=newDoc();
    doc.setFont('helvetica','bold'); doc.setFontSize(26); doc.text('CONTABILITÀ PERSONALE',105,90,{align:'center'});
    doc.setFontSize(13); doc.setFont('helvetica','normal'); doc.text('Pacchetto completo dei prospetti',105,103,{align:'center'});
    doc.setFontSize(10); doc.setTextColor(120); doc.text(`Generato il ${new Date().toLocaleDateString('it-IT')}`,105,113,{align:'center'}); doc.setTextColor(0);
    doc.addPage(); drawBilancioVerifica(doc);
    doc.addPage(); drawSPCE(doc);
    doc.addPage('a4','landscape'); drawRendiconto(doc);
    doc.addPage('a4','portrait'); drawGiornale(doc);
    doc.addPage(); drawCespiti(doc);
    doc.save(`Pacchetto_completo_${todayISO()}.pdf`); toast('Pacchetto PDF generato','success');
  }

  const Card=({title,desc,sheets,btn,onClick,gold})=>(
    <div className="card" style={{display:'flex',flexDirection:'column',gap:10}}>
      <div className="card-title serif" style={{fontSize:16}}>{title}</div>
      <div style={{color:'var(--ink-2)',fontSize:13,flex:1}}>{desc}</div>
      {sheets && <div style={{display:'flex',flexWrap:'wrap',gap:6}}>{sheets.map(s=><span key={s} className="pill">{s}</span>)}</div>}
      <button className={'btn '+(gold?'':'accent')} style={gold?{background:'var(--gold)',borderColor:'var(--gold)',alignSelf:'flex-start'}:{alignSelf:'flex-start'}} onClick={onClick}>{btn}</button>
    </div>
  );

  return (
    <div>
      <PageHead title="Export" sub="Scarica i dati della contabilità"/>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(280px,1fr))',gap:16}}>
        <Card title="Esporta in Excel"
          desc="Cartella .xlsx con tutti i prospetti, pronta da aprire o ricaricare nel tuo foglio di lavoro."
          sheets={['Libro Giornale','Movimenti','Bilancio di Verifica','Stato Patrimoniale','Conto Economico','Rendiconto','Cespiti','Piano dei Conti']}
          btn="↓ Scarica Excel" onClick={exportExcel}/>
        <Card title="Backup dati (JSON)"
          desc="Copia di sicurezza di scritture e cespiti. Utile da conservare prima di modifiche importanti."
          btn="↓ Scarica backup" onClick={exportJson} gold/>

        <div className="card" style={{display:'flex',flexDirection:'column',gap:10}}>
          <div className="card-title serif" style={{fontSize:16}}>Esporta in PDF</div>
          <div style={{color:'var(--ink-2)',fontSize:13,flex:1}}>Documenti stampabili dei prospetti principali, pronti da archiviare o condividere.</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
            <button className="btn" onClick={exportBilancioPDF}>Bilancio di Verifica</button>
            <button className="btn" onClick={exportSPCEPDF}>Stato Patrim. + Conto Econ.</button>
            <button className="btn" onClick={exportRendicontoPDF}>Rendiconto</button>
            <button className="btn" onClick={exportGiornalePDF}>Libro Giornale</button>
          </div>
        </div>

        <div className="card" style={{display:'flex',flexDirection:'column',gap:10,borderColor:'var(--accent)',background:'var(--accent-soft)'}}>
          <div className="card-title serif" style={{fontSize:16}}>Pacchetto completo</div>
          <div style={{color:'var(--ink-2)',fontSize:13,flex:1}}>Un unico PDF con tutti i prospetti: bilancio di verifica, stato patrimoniale, conto economico, rendiconto finanziario, libro giornale e cespiti.</div>
          <button className="btn accent" style={{alignSelf:'flex-start'}} onClick={exportPacchettoPDF}>↓ Scarica pacchetto PDF</button>
        </div>
      </div>
    </div>
  );
}


/* ============================================================
   PAGINA: IMPORT  (estratto conto -> scritture)
   Formato standard atteso (intestazioni, ordine libero):
   Data | Conto | Tipo | Categoria | Descrizione | Importo
   ============================================================ */
let LIQ_ALIAS = {};
function rebuildLiqAlias(){ const m={}; CONTI.filter(c=>c.categoria==='DISP. LIQUIDE').forEach(c=>{ m[normKey(c.nome)]=c.codice; }); m['PREPAGATA']=9; m['BPER']=1; m['CONTO']=1; LIQ_ALIAS=m; }
rebuildLiqAlias();
function resolveLiq(v){ const k=normKey(v); if(LIQ_ALIAS[k]!=null) return LIQ_ALIAS[k]; for(const a in LIQ_ALIAS){ if(k.includes(a)||a.includes(k)) return LIQ_ALIAS[a]; } return ''; }
function parseDataCell(v){
  if(v instanceof Date && !isNaN(v)) return v.toISOString().slice(0,10);
  if(typeof v==='number'){ const d=new Date(Math.round((v-25569)*86400*1000)); return isNaN(d)?'':d.toISOString().slice(0,10); }
  const s=String(v||'').trim();
  let m=s.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})$/);
  if(m){ let[_,d,mo,y]=m; if(y.length===2)y='20'+y; return `${y}-${mo.padStart(2,'0')}-${d.padStart(2,'0')}`; }
  m=s.match(/^(\d{4})[\/\-.](\d{1,2})[\/\-.](\d{1,2})$/);
  if(m){ return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`; }
  return '';
}
function PageImport({onAddMany, mappa, setMappa, categorie, setCategorie, toast}){
  const [rows,setRows]=useState([]);
  const [fileName,setFileName]=useState('');
  const [sheets,setSheets]=useState([]);
  const [wbRef,setWbRef]=useState(null);
  const fileRef=useRef(null);

  function detect(headers){
    const H=headers.map(h=>normKey(h));
    const find=cands=>{ for(let i=0;i<H.length;i++){ if(cands.some(c=>{const cc=c.toUpperCase(); return H[i]===cc||H[i].includes(cc);})) return i; } return -1; };
    return {
      data:find(['data','date','giorno','valuta']),
      conto:find(['conto','metodo','c c','account']),
      tipo:find(['tipo','segno','entrata uscita','dare avere']),
      cat:find(['categoria','category']),
      descr:find(['descrizione','causale','motivo','operazione','dettaglio']),
      importo:find(['importo','amount','valore','euro']),
    };
  }
  function parseSheet(wb, name){
    try{
      const ws=wb.Sheets[name];
      const aoa=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:''});
      if(aoa.length<2){ toast('Foglio vuoto o senza dati','error'); setRows([]); return; }
      const hdr=aoa[0]; const col=detect(hdr);
      if(col.importo<0||col.data<0){ toast('Nel foglio mancano le colonne Data e/o Importo','error'); setRows([]); return; }
      const out=[];
      for(let i=1;i<aoa.length;i++){
        const r=aoa[i]; if(!r||r.every(c=>c===''||c==null)) continue;
        const raw=r[col.importo];
        let imp;
        if(typeof raw==='number'){ imp=raw; }
        else {
          let str=String(raw).replace(/[€\s]/g,'').trim();
          if(str.includes(',')){ str=str.replace(/\./g,'').replace(',','.'); } // formato italiano 1.234,56
          imp=parseFloat(str);
        }
        if(isNaN(imp)||imp===0) continue;
        let tipo;
        if(col.tipo>=0){ const t=normKey(r[col.tipo]); tipo=(t.startsWith('E')||t.includes('ENTRAT')||t==='D')?'E':'U'; }
        else tipo = imp<0?'U':'E';
        imp=Math.abs(imp);
        const cat=col.cat>=0?String(r[col.cat]||'').trim():'';
        const contro = mappa&&mappa[normKey(cat)]!=null ? mappa[normKey(cat)] : '';
        out.push({ data:parseDataCell(r[col.data]), cod: col.conto>=0?resolveLiq(r[col.conto]):1, tipo, cat,
          descr: col.descr>=0?String(r[col.descr]||'').trim():'', importo:r2(imp), contro });
      }
      setRows(out);
      toast(`${out.length} movimenti letti da "${name}"`,'success');
    }catch(err){ console.error(err); toast('Errore nella lettura del foglio','error'); }
  }
  function onFile(e){
    const f=e.target.files&&e.target.files[0]; if(!f) return;
    setFileName(f.name); setRows([]); setSheets([]); setWbRef(null);
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:'array',cellDates:true});
        setWbRef(wb); setSheets(wb.SheetNames);
        if(wb.SheetNames.length===1) parseSheet(wb, wb.SheetNames[0]);
      }catch(err){ console.error(err); toast('Errore nella lettura del file','error'); }
    };
    reader.readAsArrayBuffer(f);
    e.target.value='';
  }

  const setRow=(i,k,v)=>setRows(rs=>rs.map((r,j)=>j===i?{...r,[k]:v}:r));
  const delRow=i=>setRows(rs=>rs.filter((_,j)=>j!==i));

  const validi = rows.filter(r=>r.data&&r.cod&&r.contro&&r.importo>0&&r.tipo);
  const incompleti = rows.length - validi.length;

  function importa(){
    if(validi.length===0){ toast('Nessuna riga completa da importare','error'); return; }
    const isGiro=r=>LIQ_CODES.includes(r.contro);
    const scrit = validi.map(r=>({
      id:uid(), data:r.data, descr:r.descr||(isGiro(r)?'Giroconto':(r.tipo==='E'?'Entrata':'Uscita')),
      righe: r.tipo==='E' ? [{c:r.cod,d:r.importo,a:0},{c:r.contro,d:0,a:r.importo}]
                          : [{c:r.contro,d:r.importo,a:0},{c:r.cod,d:0,a:r.importo}],
      origine:'manuale', tipo: isGiro(r)?'giroconto':'liquidita', cat:(r.cat||'').trim()
    }));
    // memorizza mappatura categoria -> conto
    const nuovaMappa={...(mappa||{})};
    validi.forEach(r=>{ if(r.cat) nuovaMappa[normKey(r.cat)]=r.contro; });
    // aggiungi categorie nuove (sezione dedotta dal tipo; interna se giroconto tra liquidità)
    const esistenti=new Set((categorie||[]).map(c=>nk(c.nome)));
    const daAgg=[];
    validi.forEach(r=>{ const c=(r.cat||'').trim(); if(c && !esistenti.has(nk(c))){ esistenti.add(nk(c)); daAgg.push({nome:c,sezione:isGiro(r)?'interno':(r.tipo==='E'?'entrata':'uscita')}); } });
    onAddMany(scrit); setMappa(nuovaMappa);
    if(daAgg.length) setCategorie([...(categorie||[]),...daAgg]);
    toast(`${scrit.length} scritture importate`,'success');
    setRows([]); setFileName(''); setSheets([]); setWbRef(null);
  }

  function scaricaModello(){
    if(!window.XLSX){ toast('Libreria non caricata','error'); return; }
    const aoa=[
      ['Data','Conto','Tipo','Categoria','Descrizione','Importo'],
      ['2026-01-15','BPER C/C','Uscita','ALIMENTARE','Spesa supermercato',42.50],
      ['2026-01-27','BPER C/C','Entrata','LAVORO','Stipendio',1450.00],
      ['2026-01-28','CASSA','Uscita','RISTORANTE','Pranzo',18.00],
    ];
    const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(aoa),'Movimenti');
    XLSX.writeFile(wb,'Modello_import_movimenti.xlsx');
  }

  return (
    <div>
      <PageHead title="Import movimenti" sub="Carica un Excel dell'estratto conto e assegna i conti contabili">
        <button className="btn ghost" onClick={scaricaModello}>↓ Scarica modello</button>
        <button className="btn accent" onClick={()=>fileRef.current&&fileRef.current.click()}>↑ Carica Excel</button>
        <input type="file" ref={fileRef} accept=".xlsx,.xls,.csv" style={{display:'none'}} onChange={onFile}/>
      </PageHead>

      {sheets.length>1 &&
        <div className="card" style={{marginBottom:14,display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
          <span style={{fontSize:13,color:'var(--ink-2)'}}><b>{fileName}</b> · {sheets.length} fogli. Scegli quale importare:</span>
          <select onChange={e=>{ if(e.target.value!=='') parseSheet(wbRef, e.target.value); else setRows([]); }} defaultValue="">
            <option value="">— seleziona foglio —</option>
            {sheets.map(s=><option key={s} value={s}>{s}</option>)}
          </select>
        </div>}

      {rows.length===0 && sheets.length<=1 &&
        <div className="card">
          <div className="card-title">Formato del foglio</div>
          <p style={{color:'var(--ink-2)',fontSize:13,marginTop:0}}>Il foglio deve avere una riga di intestazione con queste colonne (l'ordine è libero, i nomi sono riconosciuti anche con piccole varianti):</p>
          <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:10}}>
            {['Data','Conto','Tipo','Categoria','Descrizione','Importo'].map(c=><span key={c} className="pill">{c}</span>)}
          </div>
          <ul style={{color:'var(--ink-2)',fontSize:13,lineHeight:1.7,marginBottom:0}}>
            <li><b>Conto</b>: il conto di liquidità (BPER C/C, Prepagata, Cassa).</li>
            <li><b>Tipo</b>: Entrata o Uscita. Se manca, viene dedotto dal segno dell'importo.</li>
            <li><b>Categoria</b>: serve a proporre in automatico il conto contabile (la mappatura viene ricordata per gli import successivi).</li>
            <li><b>Importo</b>: numero positivo (il verso lo dà il Tipo).</li>
          </ul>
        </div>}

      {rows.length>0 && <>
        <div className="card" style={{marginBottom:14,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10}}>
          <div style={{fontSize:13,color:'var(--ink-2)'}}>
            <b>{fileName}</b> · {rows.length} movimenti · <span style={{color:'var(--success)'}}>{validi.length} pronti</span>{incompleti>0&&<span style={{color:'var(--warn)'}}> · {incompleti} da completare (assegna la contropartita)</span>}
          </div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn ghost" onClick={()=>{setRows([]);setFileName('');setSheets([]);setWbRef(null);}}>Annulla</button>
            <button className="btn accent" onClick={importa} disabled={validi.length===0}>Importa {validi.length} scritture</button>
          </div>
        </div>
        <div className="tbl-wrap">
          <table className="tbl">
            <thead><tr><th>Data</th><th>Conto liquidità</th><th>Tipo</th><th>Categoria</th><th>Descrizione</th><th className="num">Importo</th><th>Conto contabile (contropartita)</th><th></th></tr></thead>
            <tbody>
              {rows.map((r,i)=>(
                <tr key={i} style={r.contro?{}:{background:'#fbf6e8'}}>
                  <td><input type="date" value={r.data} onChange={e=>setRow(i,'data',e.target.value)} style={{minWidth:130}}/></td>
                  <td><select value={r.cod} onChange={e=>setRow(i,'cod',parseInt(e.target.value))}>{CONTI.filter(c=>c.categoria==='DISP. LIQUIDE').map(c=><option key={c.codice} value={c.codice}>{c.nome}</option>)}</select></td>
                  <td><select value={r.tipo} onChange={e=>setRow(i,'tipo',e.target.value)}><option value="E">Entrata</option><option value="U">Uscita</option></select></td>
                  <td style={{fontSize:12}}>{r.cat}</td>
                  <td><input type="text" value={r.descr} onChange={e=>setRow(i,'descr',e.target.value)} style={{minWidth:160}}/></td>
                  <td className="num">{num2(r.importo)}</td>
                  <td>
                    <ContoSelect value={r.contro} onChange={v=>setRow(i,'contro',v)} filter={c=>c.codice!==r.cod}/>
                    {LIQ_CODES.includes(r.contro) && <span className="pill giroconto" style={{marginLeft:6}}>giroconto</span>}
                  </td>
                  <td><button className="btn ghost sm" onClick={()=>delRow(i)}>✕</button></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div style={{fontSize:12,color:'var(--ink-3)',marginTop:10,fontStyle:'italic'}}>Le righe evidenziate non hanno ancora un conto contabile assegnato e non verranno importate finché non lo scegli. La scelta viene ricordata per categoria. Se come contropartita scegli un altro conto di liquidità (es. Prepagata), la riga viene registrata come <b>giroconto</b> tra i due conti ed esclusa dal rendiconto finanziario.</div>
      </>}
    </div>
  );
}


/* ============================================================
   PAGINA: CONTROLLER (contabilità analitica)
   ============================================================ */
function PageController({scritture, categorie, budget, setBudget}){
  const [tab,setTab]=useState('budget');
  const rf=useMemo(()=>buildRendiconto(scritture,categorie),[scritture,categorie]);
  const actual={}; ['entrata','uscita','investimento'].forEach(sez=> rf.rows[sez].forEach(r=>{ actual[r.nome]={sezione:sez,val:r.tot}; }));
  const cats=useMemo(()=>{
    const m={};
    (categorie||[]).forEach(c=>{ if(c.sezione!=='interno') m[c.nome]={nome:c.nome,sezione:c.sezione}; });
    Object.keys(actual).forEach(n=>{ if(!m[n]) m[n]={nome:n,sezione:actual[n].sezione}; });
    return Object.values(m);
  },[categorie,rf]);

  const [draft,setDraft]=useState(budget||{});
  useEffect(()=>setDraft(budget||{}),[budget]);
  const setB=(nome,val)=>setDraft(d=>({...d,[nome]:val}));
  const commit=()=>{ const clean={}; Object.entries(draft).forEach(([k,v])=>{ const n=parseFloat(v); if(n>0) clean[k]=n; }); setBudget(clean); };

  // % avanzamento anno solare
  const avanz=useMemo(()=>{ const o=new Date(); const a=o.getFullYear(); const ini=new Date(a,0,1),fin=new Date(a,11,31); return Math.round(Math.max(0,Math.min(1,(o-ini)/(fin-ini)))*100); },[]);

  const sezOrder=[{k:'entrata',l:'Entrate'},{k:'uscita',l:'Uscite'},{k:'investimento',l:'Investimenti'}];

  // analisi chart
  const chartRef=useRef(null);
  useEffect(()=>{
    if(tab!=='analisi'||!chartRef.current||!window.Chart) return;
    const ent=rf.rows.entrata.slice(0,8), usc=rf.rows.uscita.slice(0,8);
    const ctx=chartRef.current.getContext('2d');
    const ch=new Chart(ctx,{type:'bar',data:{
      labels:[...ent.map(r=>r.nome),...usc.map(r=>r.nome)],
      datasets:[{label:'Importo',data:[...ent.map(r=>r.tot),...usc.map(r=>-r.tot)],
        backgroundColor:[...ent.map(()=>'#1f4f8f'),...usc.map(()=>'#b54343')],borderRadius:4}]},
      options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{callback:v=>num2(v)}}}}});
    return ()=>ch.destroy();
  },[tab,rf]);

  const totBudget=sez=>r2(cats.filter(c=>c.sezione===sez).reduce((s,c)=>s+(parseFloat(draft[c.nome])||0),0));
  const totActual=sez=>r2(cats.filter(c=>c.sezione===sez).reduce((s,c)=>s+((actual[c.nome]&&actual[c.nome].val)||0),0));

  return (
    <div>
      <PageHead title="Controller" sub="Contabilità analitica · budget e consuntivo per categoria">
        <div className="tipo-switch" style={{gridTemplateColumns:'1fr 1fr',width:240}}>
          <button className={tab==='budget'?'active entrata':''} onClick={()=>setTab('budget')}>Budget vs Consuntivo</button>
          <button className={tab==='analisi'?'active entrata':''} onClick={()=>setTab('analisi')}>Analisi</button>
        </div>
      </PageHead>

      {tab==='budget' && <>
        <div className="kpi-grid">
          <Kpi label="Budget entrate" value={eur(totBudget('entrata'))} hint={`Consuntivo ${eur(totActual('entrata'))}`}/>
          <Kpi label="Budget uscite" value={eur(totBudget('uscita'))} hint={`Consuntivo ${eur(totActual('uscita'))}`}/>
          <Kpi accent label="Avanzamento anno" value={avanz+'%'} hint="Riferimento per il ritmo di spesa"/>
        </div>
        {sezOrder.map(sez=>{
          const list=cats.filter(c=>c.sezione===sez.k).sort((a,b)=>((actual[b.nome]&&actual[b.nome].val)||0)-((actual[a.nome]&&actual[a.nome].val)||0));
          if(list.length===0) return null;
          const tB=totBudget(sez.k), tA=totActual(sez.k);
          return (
            <div key={sez.k} style={{marginBottom:18}}>
              <div className="card-title serif" style={{fontSize:15,margin:'6px 0 8px'}}>{sez.l}</div>
              <div className="tbl-wrap"><table className="tbl">
                <thead><tr><th>Categoria</th><th className="num">Budget</th><th className="num">Consuntivo</th><th className="num">Scostamento</th><th className="num">% uso</th></tr></thead>
                <tbody>
                  {list.map(c=>{
                    const a=(actual[c.nome]&&actual[c.nome].val)||0;
                    const b=parseFloat(draft[c.nome])||0;
                    const scost=r2(a-b);
                    const perc=b>0?Math.round(a/b*100):null;
                    const bad = sez.k==='entrata' ? scost<0 : scost>0; // entrate sotto budget o uscite sopra budget
                    return (
                      <tr key={c.nome}>
                        <td>{c.nome}</td>
                        <td className="num"><input type="number" step="0.01" value={draft[c.nome]!=null?draft[c.nome]:''} onChange={e=>setB(c.nome,e.target.value)} onBlur={commit} placeholder="—" style={{width:90,textAlign:'right'}}/></td>
                        <td className="num">{num2(a)}</td>
                        <td className={'num '+(b>0?(bad?'neg':'pos'):'')}>{b>0?(scost>0?'+':'')+num2(scost):'—'}</td>
                        <td className="num">{perc!=null?perc+'%':'—'}</td>
                      </tr>
                    );
                  })}
                </tbody>
                <tfoot><tr><td style={{fontWeight:600}}>Totale {sez.l}</td><td className="num" style={{fontWeight:600}}>{num2(tB)}</td><td className="num" style={{fontWeight:600}}>{num2(tA)}</td><td className="num" style={{fontWeight:600}}>{tB>0?num2(r2(tA-tB)):'—'}</td><td className="num"></td></tr></tfoot>
              </table></div>
            </div>
          );
        })}
        <div style={{fontSize:12,color:'var(--ink-3)',marginTop:6,fontStyle:'italic'}}>Imposta un budget annuo per categoria nella colonna Budget (si salva uscendo dal campo). Il consuntivo è calcolato dalle scritture.</div>
      </>}

      {tab==='analisi' && <>
        <div className="kpi-grid">
          <Kpi accent label="Totale entrate" value={eur(rf.colTot.totEnt)}/>
          <Kpi label="Totale uscite" value={eur(rf.colTot.totUsc)}/>
          <Kpi label="Margine (entrate − uscite)" value={eur(r2(rf.colTot.totEnt-rf.colTot.totUsc))} neg={(rf.colTot.totEnt-rf.colTot.totUsc)<0}/>
          {rf.colTot.totInv>0 && <Kpi label="Investimenti" value={eur(rf.colTot.totInv)}/>}
        </div>
        <div className="card flat">
          <div className="card-title">Categorie principali (entrate in verde, uscite in rosso)</div>
          <div style={{height:Math.max(260, (rf.rows.entrata.slice(0,8).length+rf.rows.uscita.slice(0,8).length)*30)}}><canvas ref={chartRef}></canvas></div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginTop:16}}>
          {sezOrder.filter(s=>rf.rows[s.k].length).map(sez=>(
            <div key={sez.k} className="card flat">
              <div className="card-title">{sez.l} per categoria</div>
              <table className="tbl"><tbody>
                {rf.rows[sez.k].map(r=>{
                  const tot=totActual(sez.k)||1;
                  return <tr key={r.nome}><td>{r.nome}</td><td className="num">{num2(r.tot)}</td><td className="num" style={{color:'var(--ink-3)',width:54}}>{Math.round(r.tot/tot*100)}%</td></tr>;
                })}
              </tbody></table>
            </div>
          ))}
        </div>
      </>}
    </div>
  );
}

/* ============================================================
   PAGINA: CATEGORIE (rendiconto)
   ============================================================ */
function PageCategorie({categorie, setCategorie, scritture, updateScritture, mappa, setMappa, toast}){
  const [nuovaNome,setNuovaNome]=useState('');
  const [nuovaSez,setNuovaSez]=useState('uscita');
  const [draft,setDraft]=useState({});   // rinomina in corso: indice -> testo digitato
  // conteggio utilizzi per categoria
  const usi={}; (scritture||[]).forEach(s=>{ const c=catOf(s); if(c) usi[nk(c)]=(usi[nk(c)]||0)+1; });

  function add(){
    const nome=nuovaNome.trim(); if(!nome){ toast('Inserisci un nome','error'); return; }
    if(categorie.some(c=>nk(c.nome)===nk(nome))){ toast('Categoria già presente','error'); return; }
    setCategorie([...categorie,{nome,sezione:nuovaSez}]); setNuovaNome('');
    toast('Categoria aggiunta','success');
  }
  function setSez(i,v){ setCategorie(categorie.map((c,j)=>j===i?{...c,sezione:v}:c)); }

  /* la rinomina si conferma uscendo dal campo (o con Invio):
     il nuovo nome viene propagato a tutte le scritture che usano la categoria */
  function renameCommit(i){
    const c=categorie[i]; if(!c) return;
    const nuovo=(draft[i]!=null?draft[i]:c.nome).trim();
    setDraft(d=>{ const n={...d}; delete n[i]; return n; });
    if(!nuovo || nuovo===c.nome) return;
    if(categorie.some((x,j)=>j!==i && nk(x.nome)===nk(nuovo))){ toast('Esiste già una categoria con questo nome','error'); return; }
    const vecchio=c.nome;
    setCategorie(categorie.map((x,j)=>j===i?{...x,nome:nuovo}:x));
    // stesso nome a meno di maiuscole/spazi: le scritture restano collegate, non serve toccarle
    if(nk(nuovo)===nk(vecchio)){ toast('Categoria rinominata','success'); return; }
    // aggiorna le scritture che usano la vecchia categoria
    const target=(scritture||[]).filter(s=>nk(catOf(s))===nk(vecchio));
    if(target.length && updateScritture) updateScritture(target.map(s=>({id:s.id,patch:{cat:nuovo}})));
    // aggiorna la mappatura categoria -> conto usata dall'import
    if(mappa && setMappa){
      const k=normKey(vecchio);
      if(mappa[k]!=null){ const m={...mappa}; m[normKey(nuovo)]=m[k]; delete m[k]; setMappa(m); }
    }
    toast(target.length?`Categoria rinominata — ${target.length} scrittur${target.length===1?'a aggiornata':'e aggiornate'}`:'Categoria rinominata','success');
  }
  function del(i){ const c=categorie[i]; if((usi[nk(c.nome)]||0)>0){ if(!window.confirm(`"${c.nome}" è usata in ${usi[nk(c.nome)]} scritture. Eliminarla comunque? Le scritture resteranno senza categoria.`)) return; } setCategorie(categorie.filter((_,j)=>j!==i)); }

  const perSez=sez=>categorie.map((c,i)=>({...c,i})).filter(c=>c.sezione===sez);
  const Blocco=({sez,label})=>(
    <div style={{marginBottom:18}}>
      <div className="card-title serif" style={{fontSize:15,margin:'4px 0 8px'}}>{label}</div>
      <div className="tbl-wrap"><table className="tbl">
        <thead><tr><th>Categoria</th><th>Sezione</th><th className="num">Utilizzi</th><th></th></tr></thead>
        <tbody>
          {perSez(sez).length===0 && <tr><td colSpan="4" className="empty-state">Nessuna categoria</td></tr>}
          {perSez(sez).map(c=>(
            <tr key={c.i}>
              <td><input type="text" value={draft[c.i]!=null?draft[c.i]:c.nome}
                    onChange={e=>{const v=e.target.value; setDraft(d=>({...d,[c.i]:v}));}}
                    onBlur={()=>renameCommit(c.i)}
                    onKeyDown={e=>{ if(e.key==='Enter') e.target.blur(); if(e.key==='Escape'){ setDraft(d=>{const n={...d}; delete n[c.i]; return n;}); } }}
                    title="Modifica il nome e premi Invio: verrà aggiornato anche nelle scritture"
                    style={{minWidth:200}}/></td>
              <td><select value={c.sezione} onChange={e=>setSez(c.i,e.target.value)}>{SEZIONI.map(s=><option key={s.v} value={s.v}>{s.l}</option>)}</select></td>
              <td className="num">{usi[nk(c.nome)]||0}</td>
              <td><button className="btn danger sm" onClick={()=>del(c.i)}>✕</button></td>
            </tr>
          ))}
        </tbody>
      </table></div>
    </div>
  );

  return (
    <div>
      <PageHead title="Categorie" sub="Categorie del rendiconto finanziario"/>
      <div className="card" style={{marginBottom:20,maxWidth:620}}>
        <div className="card-title">Aggiungi categoria</div>
        <div style={{display:'flex',gap:10,alignItems:'flex-end',flexWrap:'wrap'}}>
          <div className="form-row" style={{flex:1,minWidth:180}}><label>Nome</label><input type="text" value={nuovaNome} onChange={e=>setNuovaNome(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')add();}} placeholder="Es. Spese viaggio"/></div>
          <div className="form-row" style={{minWidth:160}}><label>Sezione</label><select value={nuovaSez} onChange={e=>setNuovaSez(e.target.value)}>{SEZIONI.map(s=><option key={s.v} value={s.v}>{s.l}</option>)}</select></div>
          <button className="btn accent" onClick={add}>+ Aggiungi</button>
        </div>
      </div>
      <Blocco sez="entrata" label="Entrate"/>
      <Blocco sez="uscita" label="Uscite"/>
      <Blocco sez="investimento" label="Investimenti"/>
      <Blocco sez="interno" label="Interne (escluse dal flusso)"/>
      <div style={{fontSize:12,color:'var(--ink-3)',marginTop:6,fontStyle:'italic'}}>Per rinominare una categoria modifica il nome e premi Invio (o esci dal campo): il nuovo nome viene applicato automaticamente a tutte le scritture che la usano e alla mappatura dell'import. Esc annulla la modifica.</div>
    </div>
  );
}

/* ============================================================
   PAGINA: VARIAZIONI CASSA
   Righe libere (descrizione, importo con segno, conto contabile,
   categoria RF) -> proposta di scrittura -> conferma manuale.
   ============================================================ */
function PageVariazioni({onAddMany, saldi, categorie, toast}){
  const [liq,setLiq]=useState(3);                 // conto liquidità: default CASSA
  const [dataDef,setDataDef]=useState(todayISO());
  const newRow=()=>({k:uid(), data:dataDef, descr:'', importo:'', conto:'', cat:''});
  const [rows,setRows]=useState(()=>[{k:uid(),data:todayISO(),descr:'',importo:'',conto:'',cat:''}]);
  const [proposta,setProposta]=useState(null);    // null finché non si preme "Proponi"

  const invalida=()=>setProposta(null);
  const setRow=(i,k,v)=>{ invalida(); setRows(rs=>rs.map((r,j)=>j===i?{...r,[k]:v}:r)); };
  const addRow=()=>{ invalida(); setRows(rs=>[...rs,newRow()]); };
  const delRow=i=>{ invalida(); setRows(rs=>rs.length>1?rs.filter((_,j)=>j!==i):[newRow()]); };
  const resetAll=()=>{ setProposta(null); setRows([newRow()]); };

  const impOf=r=>{ const n=parseFloat(String(r.importo).replace(',','.')); return isNaN(n)?0:n; };
  const isValida=r=>!!r.data && !!r.conto && Math.abs(impOf(r))>0.004;
  const valide=rows.filter(isValida);
  const incomplete=rows.filter(r=>(r.descr||r.importo!==''||r.conto) && !isValida(r)).length;

  const totale=r2(valide.reduce((s,r)=>s+impOf(r),0));
  const saldoAtt=(saldi[liq]&&saldi[liq].saldo)||0;

  function proponi(){
    if(!valide.length){ toast('Nessuna riga completa (servono importo ≠ 0 e conto)','error'); return; }
    const scrit=valide.map(r=>{
      const v=r2(impOf(r)); const imp=Math.abs(v); const pos=v>0; const cc=parseInt(r.conto);
      return {
        id:uid(), data:r.data,
        descr:(r.descr||'').trim() || (pos?'Variazione cassa in aumento':'Variazione cassa in diminuzione'),
        righe: pos ? [{c:liq,d:imp,a:0},{c:cc,d:0,a:imp}]
                   : [{c:cc,d:imp,a:0},{c:liq,d:0,a:imp}],
        origine:'manuale', tipo:'liquidita', cat:(r.cat||'').trim(),
        _pos:pos, _imp:imp, _cc:cc
      };
    });
    setProposta(scrit);
  }
  function conferma(){
    if(!proposta||!proposta.length) return;
    const puliti=proposta.map(s=>{ const {_pos,_imp,_cc,...rest}=s; return rest; });
    onAddMany(puliti);
    toast(`${puliti.length} ${puliti.length===1?'scrittura registrata':'scritture registrate'}`,'success');
    resetAll();
  }

  return (
    <div>
      <PageHead title="Variazioni cassa" sub="Inserisci le variazioni, poi proponi la scrittura e confermala">
        <button className="btn ghost" onClick={resetAll}>Svuota</button>
        <button className="btn accent" onClick={proponi} disabled={!valide.length}>⇢ Proponi scritture</button>
      </PageHead>

      <div className="card" style={{marginBottom:14,display:'flex',gap:18,flexWrap:'wrap',alignItems:'flex-end'}}>
        <div className="form-row" style={{minWidth:220}}>
          <label>Conto liquidità (contropartita)</label>
          <ContoSelect value={liq} onChange={v=>{invalida();setLiq(v);}} filter={c=>c.categoria==='DISP. LIQUIDE'}/>
        </div>
        <div className="form-row" style={{minWidth:170}}>
          <label>Data predefinita</label>
          <input type="date" value={dataDef} onChange={e=>setDataDef(e.target.value)}/>
        </div>
        <div style={{marginLeft:'auto',fontSize:12.5,color:'var(--ink-2)',textAlign:'right'}}>
          Saldo {contoByCode[liq]?.nome}: <b>{eur(saldoAtt)}</b><br/>
          Variazione proposta: <b style={{color:totale>=0?'var(--success)':'var(--danger)'}}>{totale>=0?'+':''}{num2(totale)}</b> → saldo <b>{eur(r2(saldoAtt+totale))}</b>
        </div>
      </div>

      <div className="tbl-wrap">
        <table className="tbl">
          <thead><tr>
            <th style={{width:130}}>Data</th>
            <th>Descrizione operazione</th>
            <th className="num" style={{width:120}}>Importo (±)</th>
            <th style={{width:230}}>Conto contabile</th>
            <th style={{width:200}}>Categoria rendiconto</th>
            <th style={{width:40}}></th>
          </tr></thead>
          <tbody>
            {rows.map((r,i)=>{
              const v=impOf(r); const pos=v>0;
              return (
                <tr key={r.k} style={isValida(r)?{}:{background:'#fbf6e8'}}>
                  <td><input type="date" value={r.data} onChange={e=>setRow(i,'data',e.target.value)}/></td>
                  <td><input type="text" value={r.descr} onChange={e=>setRow(i,'descr',e.target.value)} placeholder="Es. rettifica spese cassa" style={{minWidth:180}}/></td>
                  <td className="num"><input type="number" step="0.01" value={r.importo} onChange={e=>setRow(i,'importo',e.target.value)} placeholder="0,00"
                        style={{textAlign:'right',color:v===0?undefined:(pos?'var(--success)':'var(--danger)'),fontWeight:v===0?400:600}}/></td>
                  <td><ContoSelect value={r.conto} onChange={val=>setRow(i,'conto',val)} filter={c=>c.categoria==='COSTI'||c.categoria==='RICAVI'||c.categoria==='RICAVI/COSTI'}/></td>
                  <td>
                    <CatSelect value={r.cat} onChange={val=>setRow(i,'cat',val)} categorie={categorie} sezioni={v>=0?['entrata']:['uscita','investimento']}/>
                  </td>
                  <td><button className="btn ghost sm" onClick={()=>delRow(i)}>✕</button></td>
                </tr>
              );
            })}
          </tbody>
          <tfoot><tr>
            <td colSpan={2} style={{fontWeight:600}}>Totale variazione</td>
            <td className="num" style={{fontWeight:600,color:totale>=0?'var(--success)':'var(--danger)'}}>{totale>=0?'+':''}{num2(totale)}</td>
            <td colSpan={3}></td>
          </tr></tfoot>
        </table>
      </div>
      <div style={{display:'flex',gap:8,marginTop:10,alignItems:'center'}}>
        <button className="btn ghost sm" onClick={addRow}>+ Aggiungi riga</button>
        <span style={{fontSize:12,color:'var(--ink-3)',fontStyle:'italic'}}>
          Importo <b>positivo</b> = la cassa aumenta (Dare {contoByCode[liq]?.nome} · Avere conto) · <b>negativo</b> = la cassa diminuisce (Dare conto · Avere {contoByCode[liq]?.nome}).
          {incomplete>0 && <> · {incomplete} riga/e da completare.</>}
        </span>
      </div>

      {proposta && <div className="card" style={{marginTop:18,borderColor:'var(--accent)'}}>
        <div className="card-title">Scritture proposte · {proposta.length}</div>
        <p style={{color:'var(--ink-2)',fontSize:12.5,marginTop:0}}>Niente è ancora registrato. Controlla e conferma.</p>
        <div className="tbl-wrap">
          <table className="tbl">
            <thead><tr><th>Data</th><th>Descrizione</th><th>Dare</th><th>Avere</th><th className="num">Importo</th><th>Cat. rendiconto</th></tr></thead>
            <tbody>
              {proposta.map(s=>(
                <tr key={s.id}>
                  <td>{fmtDate(s.data)}</td>
                  <td>{s.descr}</td>
                  <td>{contoByCode[s.righe[0].c]?.nome}</td>
                  <td>{contoByCode[s.righe[1].c]?.nome}</td>
                  <td className="num">{num2(s._imp)}</td>
                  <td style={{fontSize:12}}>{s.cat||<span style={{color:'var(--ink-3)'}}>—</span>}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div style={{display:'flex',justifyContent:'flex-end',gap:8,marginTop:12}}>
          <button className="btn ghost" onClick={()=>setProposta(null)}>Annulla proposta</button>
          <button className="btn accent" onClick={conferma}>✓ Conferma e registra</button>
        </div>
      </div>}
    </div>
  );
}

function seedScrittureObj(){
  const obj={}; SEED.scritture.forEach((s,i)=>{ obj['seed'+i]={data:s.data,descr:s.descr,righe:s.righe.map(r=>({...r})),origine:'seed',tipo:s.liq?'liquidita':'contabile'}; }); return obj;
}
function seedCespitiObj(){
  const obj={}; CESPITI_SEED.forEach((c,i)=>{ obj['c'+i]={...c}; delete obj['c'+i].id; }); return obj;
}

function App({authUser, onLogout}){
  const [scritture,setScritture]=useState([]);
  const [cespiti,setCespiti]=useState([]);
  const [conti,setContiState]=useState(CONTI);
  const [mappa,setMappaState]=useState({});
  const [categorie,setCategorieState]=useState(seedCategorie());
  const [budget,setBudgetState]=useState({});
  const [ready,setReady]=useState(false);
  const [page,setPage]=useState('dashboard');
  const [menuOpen,setMenuOpen]=useState(false);
  const [toast,setToastState]=useState({msg:'',kind:''});
  const toastTimer=useRef(null);
  const showToast=(msg,kind)=>{ setToastState({msg,kind}); clearTimeout(toastTimer.current); toastTimer.current=setTimeout(()=>setToastState({msg:'',kind:''}),2600); };

  // ---- caricamento iniziale (Firebase o locale) ----
  useEffect(()=>{
    if(firebaseReady){
      const sref=db.ref('scritture');
      sref.on('value',snap=>{
        const val=snap.val();
        if(val==null){ sref.set(seedScrittureObj()); return; }
        setScritture(Object.entries(val).map(([id,v])=>({id,...v,righe:v.righe||[]})));
        setReady(true);
      });
      const cref=db.ref('cespiti');
      cref.on('value',snap=>{
        const val=snap.val();
        if(val==null){ cref.set(seedCespitiObj()); return; }
        setCespiti(Object.entries(val).map(([id,v])=>({id,...v})));
      });
      const ctref=db.ref('conti');
      ctref.on('value',snap=>{ const v=snap.val(); if(v==null){ ctref.set(CONTI); return; } const arr=(Array.isArray(v)?v.filter(Boolean):Object.values(v)); applyConti(arr); setContiState(arr); });
      db.ref('mappaCategorie').on('value',snap=>{ const m=snap.val()||{}; setMappaCat(m); setMappaState(m); });
      const catref=db.ref('categorieRF');
      catref.on('value',snap=>{ const v=snap.val(); if(v==null){ catref.set(seedCategorie()); return; } setCategorieState(Array.isArray(v)?v.filter(Boolean):Object.values(v)); });
      db.ref('budget').on('value',snap=>setBudgetState(snap.val()||{}));
    } else {
      setScritture(loadScritture()); setCespiti(loadCespiti()); setReady(true);
      try{ const m=JSON.parse(localStorage.getItem('contabilita_mappa_v1')||'{}'); setMappaCat(m); setMappaState(m); }catch(e){}
      try{ const c=JSON.parse(localStorage.getItem('contabilita_cat_v1')||'null'); if(c) setCategorieState(c); }catch(e){}
      try{ setBudgetState(JSON.parse(localStorage.getItem('contabilita_budget_v1')||'{}')); }catch(e){}
    }
  },[]);

  const saldi = useMemo(()=>calcSaldi(scritture),[scritture]);

  const addScrittura = s => {
    if(firebaseReady){ const {id,...rest}=s; db.ref('scritture/'+id).set(rest); }
    else setScritture(arr=>{ const n=[...arr,s]; saveScritture(n); return n; });
  };
  const updateScrittura = (id,patch) => {
    if(firebaseReady){
      const cur=scritture.find(s=>s.id===id)||{};
      const {id:_,...rest}={...cur,...patch};
      db.ref('scritture/'+id).set(rest);
    } else setScritture(arr=>{ const n=arr.map(s=>s.id===id?{...s,...patch}:s); saveScritture(n); return n; });
  };
  const deleteScrittura = id => {
    if(firebaseReady){ db.ref('scritture/'+id).remove(); }
    else setScritture(arr=>{ const n=arr.filter(s=>s.id!==id); saveScritture(n); return n; });
  };
  const deleteScritture = ids => {
    if(!ids||!ids.length) return;
    const set=new Set(ids);
    if(firebaseReady){ const up={}; ids.forEach(id=>{ up['scritture/'+id]=null; }); db.ref().update(up); }
    else setScritture(arr=>{ const n=arr.filter(s=>!set.has(s.id)); saveScritture(n); return n; });
  };
  const updateScritture = updates => {
    if(!updates||!updates.length) return;
    if(firebaseReady){
      const up={};
      updates.forEach(({id,patch})=>{ const cur=scritture.find(s=>s.id===id)||{}; const {id:_,...rest}={...cur,...patch}; up['scritture/'+id]=rest; });
      db.ref().update(up);
    } else setScritture(arr=>{
      const m=new Map(updates.map(u=>[u.id,u.patch]));
      const n=arr.map(s=>m.has(s.id)?{...s,...m.get(s.id)}:s); saveScritture(n); return n;
    });
  };
  const addScritture = list => {
    if(!list||!list.length) return;
    if(firebaseReady){ const up={}; list.forEach(s=>{ const {id,...rest}=s; up['scritture/'+id]=rest; }); db.ref().update(up); }
    else setScritture(arr=>{ const n=[...arr,...list]; saveScritture(n); return n; });
  };
  const setMappa = m => {
    setMappaCat(m);
    setMappaState(m);
    if(firebaseReady){ db.ref('mappaCategorie').set(m); }
    else { try{ localStorage.setItem('contabilita_mappa_v1', JSON.stringify(m)); }catch(e){} }
  };
  const setConti = list => {
    applyConti(list);
    setContiState(list);
    if(firebaseReady){ db.ref('conti').set(list); }
    else { saveContiLS(list); }
  };
  const setCategorie = list => {
    setCategorieState(list);
    if(firebaseReady){ db.ref('categorieRF').set(list); }
    else { try{ localStorage.setItem('contabilita_cat_v1', JSON.stringify(list)); }catch(e){} }
  };
  const setBudget = obj => {
    setBudgetState(obj);
    if(firebaseReady){ db.ref('budget').set(obj); }
    else { try{ localStorage.setItem('contabilita_budget_v1', JSON.stringify(obj)); }catch(e){} }
  };
  const updateCespiti = arr => {
    if(firebaseReady){ const obj={}; arr.forEach(c=>{ const {id,...rest}=c; obj[id]=rest; }); db.ref('cespiti').set(obj); }
    else { setCespiti(arr); saveCespiti(arr); }
  };

  function resetSeed(){
    if(window.confirm('Ripristinare i dati originali dal libro giornale? Le scritture e i cespiti aggiunti verranno persi.')){
      if(firebaseReady){ db.ref('scritture').set(seedScrittureObj()); db.ref('cespiti').set(seedCespitiObj()); }
      else { try{ localStorage.removeItem(LS_KEY); localStorage.removeItem(LS_CES); }catch(e){} setScritture(loadScritture()); setCespiti(loadCespiti()); }
      showToast('Dati ripristinati','success');
    }
  }

  const nav=id=>{setPage(id);setMenuOpen(false);};

  if(!ready) return (
    <div className="login-shell"><div className="login-card" style={{textAlign:'center'}}>
      <div className="logo serif">Contabilità Personale</div>
      <div className="tag">{firebaseReady?'Connessione a Firebase…':'Avvio…'}</div>
    </div></div>
  );

  return (
    <div className="app">
      <div className="topbar">
        <button className="menu-btn" onClick={()=>setMenuOpen(o=>!o)}>☰</button>
        <h1 className="serif">Contabilità Personale<span className="sub">partita doppia</span></h1>
        <span className="badge desktop-only" style={firebaseReady?{borderColor:'#2a4d86',color:'#9fc0ee'}:{}}>{firebaseReady?'● Firebase':'● Locale'}</span>
        <span className="badge desktop-only">{scritture.length} scritture</span>
        <button className="icon-btn" onClick={resetSeed}>↺ Reset</button>
        {onLogout && <button className="icon-btn" onClick={onLogout} title={authUser?authUser.email:''}>⎋ Esci</button>}
      </div>
      <div className="layout">
        <div className={'sidebar'+(menuOpen?' open':'')}>
          {NAV.map(g=>(
            <React.Fragment key={g.sec}>
              <div className="section-label">{g.sec}</div>
              {g.items.map(it=>(
                <button key={it.id} className={'navlink'+(page===it.id?' active':'')} onClick={()=>nav(it.id)}>
                  <span className="ico">{it.ico}</span>{it.label}
                </button>
              ))}
            </React.Fragment>
          ))}
        </div>
        <div className="sidebar-backdrop" onClick={()=>setMenuOpen(false)}></div>
        <div className="main">
          {page==='dashboard' && <PageDashboard scritture={scritture} saldi={saldi} goto={nav}/>}
          {page==='snapshot' && <PageSnapshot scritture={scritture}/>}
          {page==='chiusura' && <PageChiusura scritture={scritture} categorie={categorie} toast={showToast}/>}
          {page==='nuova' && <PageNuova onAdd={addScrittura} toast={showToast} categorie={categorie}/>}
          {page==='variazioni' && <PageVariazioni onAddMany={addScritture} saldi={saldi} categorie={categorie} toast={showToast}/>}
          {page==='import' && <PageImport onAddMany={addScritture} mappa={mappa} setMappa={setMappa} categorie={categorie} setCategorie={setCategorie} toast={showToast}/>}
          {page==='giornale' && <PageLibroGiornale scritture={scritture} onUpdate={updateScrittura} onDelete={deleteScrittura} onDeleteMany={deleteScritture} toast={showToast} categorie={categorie}/>}
          {page==='movimenti' && <PageMovimenti scritture={scritture} saldi={saldi}/>}
          {page==='pivot' && <PagePivotConti saldi={saldi}/>}
          {page==='bilancio' && <PageBilancio saldi={saldi}/>}
          {page==='rendiconto' && <PageRendiconto scritture={scritture} categorie={categorie}/>}
          {page==='controller' && <PageController scritture={scritture} categorie={categorie} budget={budget} setBudget={setBudget}/>}
          {page==='pianoconti' && <PagePianoConti saldi={saldi} conti={conti} setConti={setConti} toast={showToast}/>}
          {page==='cespiti' && <PageCespiti cespiti={cespiti} setCespiti={updateCespiti} toast={showToast}/>}
          {page==='ammortamenti' && <PageAmmortamenti cespiti={cespiti} onAdd={addScrittura} updateCespiti={updateCespiti} toast={showToast}/>}
          {page==='categorie' && <PageCategorie categorie={categorie} setCategorie={setCategorie} scritture={scritture} updateScritture={updateScritture} mappa={mappa} setMappa={setMappa} toast={showToast}/>}
          {page==='export' && <PageExport scritture={scritture} cespiti={cespiti} saldi={saldi} categorie={categorie} toast={showToast}/>}
        </div>
      </div>
      <Toast msg={toast.msg} kind={toast.kind}/>
    </div>
  );
}

/* login con Firebase Authentication (email + password) */
function LoginAuth(){
  const [email,setEmail]=useState('');
  const [pw,setPw]=useState('');
  const [err,setErr]=useState('');
  const [busy,setBusy]=useState(false);
  const [info,setInfo]=useState('');
  function submit(){
    setErr(''); setInfo(''); setBusy(true);
    auth.signInWithEmailAndPassword(email.trim(),pw)
      .catch(e=>{
        const m={'auth/invalid-email':'Email non valida','auth/user-not-found':'Utente inesistente',
          'auth/wrong-password':'Password errata','auth/invalid-credential':'Credenziali errate',
          'auth/too-many-requests':'Troppi tentativi, riprova più tardi'};
        setErr(m[e.code]||'Accesso non riuscito');
      })
      .finally(()=>setBusy(false));
  }
  function reset(){
    if(!email.trim()){ setErr('Inserisci la tua email per il reset'); return; }
    auth.sendPasswordResetEmail(email.trim())
      .then(()=>setInfo('Email di reset inviata'))
      .catch(()=>setErr('Impossibile inviare il reset'));
  }
  return (
    <div className="login-shell">
      <div className="login-card">
        <div className="logo serif">Contabilità Personale</div>
        <div className="tag">Accedi con le tue credenziali</div>
        {err && <div className="err">{err}</div>}
        {info && <div className="err" style={{background:'var(--accent-soft)',color:'var(--accent-ink)'}}>{info}</div>}
        <div className="field"><label>Email</label>
          <input type="email" value={email} autoFocus onChange={e=>{setEmail(e.target.value);setErr('');}} onKeyDown={e=>{if(e.key==='Enter')submit();}}/></div>
        <div className="field"><label>Password</label>
          <input type="password" value={pw} onChange={e=>{setPw(e.target.value);setErr('');}} onKeyDown={e=>{if(e.key==='Enter')submit();}}/></div>
        <button className="btn accent" onClick={submit} disabled={busy}>{busy?'Accesso…':'Accedi'}</button>
        <button className="btn ghost sm" onClick={reset} style={{marginTop:8}}>Password dimenticata?</button>
      </div>
    </div>
  );
}

/* login semplice (solo password) — fallback senza Firebase */
function Login({onOk}){
  const [pw,setPw]=useState('');
  const [err,setErr]=useState('');
  function submit(){
    if(pw===APP_PASSWORD){ try{ sessionStorage.setItem('cp_unlocked','1'); }catch(e){} onOk(); }
    else setErr('Password errata');
  }
  return (
    <div className="login-shell"><div className="login-card">
      <div className="logo serif">Contabilità Personale</div>
      <div className="tag">Inserisci la password per accedere</div>
      {err && <div className="err">{err}</div>}
      <div className="field"><label>Password</label>
        <input type="password" value={pw} autoFocus onChange={e=>{setPw(e.target.value);setErr('');}} onKeyDown={e=>{if(e.key==='Enter')submit();}}/></div>
      <button className="btn accent" onClick={submit}>Accedi</button>
    </div></div>
  );
}

function Root(){
  const [user,setUser]=useState(undefined);
  const [pwUnlocked,setPwUnlocked]=useState(()=>{ try{ return sessionStorage.getItem('cp_unlocked')==='1'; }catch(e){ return false; } });
  useEffect(()=>{
    if(firebaseReady && auth){ const unsub=auth.onAuthStateChanged(u=>setUser(u||null)); return unsub; }
    setUser(null);
  },[]);
  if(firebaseReady && auth){
    if(user===undefined) return <Splash text="Caricamento…"/>;
    if(!user) return <LoginAuth/>;
    return <App authUser={user} onLogout={()=>auth.signOut()}/>;
  }
  // fallback senza Firebase Auth: password locale
  if(!pwUnlocked) return <Login onOk={()=>setPwUnlocked(true)}/>;
  return <App/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);

</script>
</body>
</html>
