// PAGINA: BILANCIO DI VERIFICA + SP/CE
// ============================================================
function PageBilancio({ conti, movimenti, saldiIniziali }) {
  const contiMap = useMemo(() => {
    const m = {};
    conti.forEach(c => { m[c.codice] = c; });
    CONTI_LIQUIDITA.forEach(c => { if (!m[c.codice]) m[c.codice] = { codice: c.codice, nome: c.nome }; });
    return m;
  }, [conti]);

  const scritture = useMemo(
    () => generaLibroGiornale(movimenti, saldiIniziali, contiMap),
    [movimenti, saldiIniziali, contiMap]
  );

  const mastrini = useMemo(() => {
    const m = calcolaMastrini(scritture);
    // arricchisco con i metadati del piano dei conti
    return m.map(x => ({
      ...x,
      prospetto: contiMap[x.codice]?.prospetto || "",
      categoria: contiMap[x.codice]?.categoria || "",
    })).sort((a, b) => a.codice - b.codice);
  }, [scritture, contiMap]);

  const totD = mastrini.reduce((s, m) => s + m.dare, 0);
  const totA = mastrini.reduce((s, m) => s + m.avere, 0);

  // SP / CE sintetico
  const spVoci = mastrini.filter(m => m.prospetto === "SP" || m.prospetto === "SP/CE");
  const ceVoci = mastrini.filter(m => m.prospetto === "CE" || m.prospetto === "SP/CE");

  // SP: attivo (DARE-eccedenza) - passivo (AVERE-eccedenza)
  const attivita = spVoci.filter(m => m.saldo > 0).reduce((s,m)=> s+m.saldo, 0);
  const passivita = spVoci.filter(m => m.saldo < 0).reduce((s,m)=> s+m.saldo, 0); // negativo
  // CE: ricavi (AVERE) - costi (DARE)
  const ricavi = ceVoci.filter(m => m.categoria === "RICAVI").reduce((s,m)=> s + m.avere - m.dare, 0);
  const costi = ceVoci.filter(m => ["COSTI","COSTI/RICAVI"].includes(m.categoria)).reduce((s,m)=> s + m.dare - m.avere, 0);
  const utile = ricavi - costi;

  return (
    <div>
      <div className="page-head">
        <div>
          <h2>Bilancio di Verifica & SP/CE</h2>
          <div className="sub">Saldi progressivi · {mastrini.filter(m => m.dare > 0 || m.avere > 0).length} conti attivi</div>
        </div>
      </div>

      <div className="kpi-grid">
        <div className="kpi">
          <div className="label">Ricavi</div>
          <div className="value" style={{color:"var(--accent)"}}>{fmtEuro(ricavi)}</div>
          <div className="hint">Conto Economico</div>
        </div>
        <div className="kpi">
          <div className="label">Costi</div>
          <div className="value" style={{color:"var(--danger)"}}>{fmtEuro(costi)}</div>
          <div className="hint">Conto Economico</div>
        </div>
        <div className="kpi accent">
          <div className="label">Utile / Perdita</div>
          <div className="value">{fmtEuro(utile)}</div>
          <div className="hint">{utile >= 0 ? "Utile" : "Perdita"} d'esercizio</div>
        </div>
        <div className="kpi">
          <div className="label">Attivo SP</div>
          <div className="value">{fmtEuro(attivita)}</div>
          <div className="hint">Stato Patrimoniale</div>
        </div>
      </div>

      <h3 className="serif" style={{fontWeight:500, fontSize:18, margin:"28px 0 12px"}}>Bilancio di Verifica</h3>
      <div className="tbl-wrap" style={{maxHeight:600, overflowY:"auto"}}>
        <table className="tbl">
          <thead>
            <tr>
              <th style={{width:50}}>Cod.</th>
              <th>Conto</th>
              <th>Categoria</th>
              <th style={{width:55}}>Prosp.</th>
              <th className="num" style={{width:110}}>Dare</th>
              <th className="num" style={{width:110}}>Avere</th>
              <th className="num" style={{width:110}}>Saldo</th>
            </tr>
          </thead>
          <tbody>
            {mastrini.filter(m => m.dare > 0 || m.avere > 0).map(m => (
              <tr key={m.codice}>
                <td className="mono" style={{fontWeight:600}}>{String(m.codice).padStart(2,"0")}</td>
                <td>{m.nome.trim()}</td>
                <td><span className="pill">{m.categoria || "—"}</span></td>
                <td>{m.prospetto || "—"}</td>
                <td className="num">{m.dare > 0 ? fmt(m.dare) : ""}</td>
                <td className="num">{m.avere > 0 ? fmt(m.avere) : ""}</td>
                <td className={"num " + (m.saldo < 0 ? "neg" : m.saldo > 0 ? "pos" : "")}>
                  {fmt(Math.abs(m.saldo))} {m.saldo < 0 ? "A" : m.saldo > 0 ? "D" : ""}
                </td>
              </tr>
            ))}
            <tr style={{borderTop:"2px solid var(--ink)", fontWeight:600, background:"var(--panel-2)"}}>
              <td colSpan={4} style={{fontFamily:"'Fraunces',serif", fontSize:14}}>TOTALI</td>
              <td className="num" style={{fontWeight:700}}>{fmt(totD)}</td>
              <td className="num" style={{fontWeight:700}}>{fmt(totA)}</td>
              <td className="num">{Math.abs(totD-totA) < 0.01 ? "✓" : fmt(totD-totA)}</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:18, marginTop:28}}>
        <div>
          <h3 className="serif" style={{fontWeight:500, fontSize:18, margin:"0 0 12px"}}>Stato Patrimoniale</h3>
          <div className="tbl-wrap">
            <table className="tbl">
              <thead>
                <tr>
                  <th>Voce</th>
                  <th className="num">Importo</th>
                </tr>
              </thead>
              <tbody>
                {spVoci.filter(m => m.saldo !== 0).map(m => (
                  <tr key={m.codice}>
                    <td>
                      <span style={{fontSize:11, color:"var(--ink-3)"}}>{String(m.codice).padStart(2,"0")}</span>{" "}
                      {m.nome.trim()}
                      <div style={{fontSize:10.5, color:"var(--ink-3)"}}>{m.categoria}</div>
                    </td>
                    <td className={"num " + (m.saldo < 0 ? "neg" : "")}>{fmt(m.saldo)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
        <div>
          <h3 className="serif" style={{fontWeight:500, fontSize:18, margin:"0 0 12px"}}>Conto Economico</h3>
          <div className="tbl-wrap">
            <table className="tbl">
              <thead>
                <tr>
                  <th>Voce</th>
                  <th className="num">Importo</th>
                </tr>
              </thead>
              <tbody>
                {ceVoci.filter(m => m.saldo !== 0).map(m => {
                  const isRicavo = m.categoria === "RICAVI";
                  const val = isRicavo ? (m.avere - m.dare) : (m.dare - m.avere);
                  return (
                    <tr key={m.codice}>
                      <td>
                        <span style={{fontSize:11, color:"var(--ink-3)"}}>{String(m.codice).padStart(2,"0")}</span>{" "}
                        {m.nome.trim()}
                        <div style={{fontSize:10.5, color:"var(--ink-3)"}}>{m.categoria}</div>
                      </td>
                      <td className={"num " + (isRicavo ? "pos" : "neg")}>{isRicavo ? "+" : "−"}{fmt(val)}</td>
                    </tr>
                  );
                })}
                <tr style={{borderTop:"2px solid var(--ink)", fontWeight:600, background:"var(--panel-2)"}}>
                  <td style={{fontFamily:"'Fraunces',serif"}}>RISULTATO D'ESERCIZIO</td>
                  <td className={"num " + (utile < 0 ? "neg" : "pos")} style={{fontWeight:700}}>{fmt(utile)}</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// PAGINA: RENDICONTO FINANZIARIO
// ============================================================
function PageRendiconto({ conti, movimenti }) {
  const [filterBu, setFilterBu] = useState("");
  const [drillDown, setDrillDown] = useState(null); // { tipo, categoria, mese, movs }

  const filtered = useMemo(() => movimenti.filter(m => !filterBu || m.bu === filterBu), [movimenti, filterBu]);

  // Matrice categoria × mese per entrate e uscite
  const tabella = useMemo(() => {
    const entrate = {};
    const uscite = {};
    filtered.forEach(m => {
      const cat = m.categoria || "(senza categoria)";
      const mese = m.mese || "?";
      if (m.tipo === "entrata") {
        if (!entrate[cat]) entrate[cat] = {};
        entrate[cat][mese] = (entrate[cat][mese] || 0) + m.importo;
      } else if (m.tipo === "uscita") {
        if (!uscite[cat]) uscite[cat] = {};
        uscite[cat][mese] = (uscite[cat][mese] || 0) + m.importo;
      }
    });
    return { entrate, uscite };
  }, [filtered]);

  const totaliPerMese = (mappa) => {
    const tot = {};
    MESI.forEach(m => tot[m] = 0);
    Object.values(mappa).forEach(rigaMesi => {
      Object.entries(rigaMesi).forEach(([m, v]) => {
        if (tot[m] !== undefined) tot[m] += v;
      });
    });
    return tot;
  };

  const totEntrateMese = totaliPerMese(tabella.entrate);
  const totUsciteMese = totaliPerMese(tabella.uscite);
  const totEntrateGen = Object.values(totEntrateMese).reduce((s,v)=>s+v, 0);
  const totUsciteGen = Object.values(totUsciteMese).reduce((s,v)=>s+v, 0);

  const apriDrill = (tipo, categoria, mese) => {
    const movs = filtered.filter(m => m.tipo === tipo && (m.categoria || "(senza categoria)") === categoria && m.mese === mese);
    setDrillDown({ tipo, categoria, mese, movs });
  };

  const renderSezione = (titolo, tipo, mappa, totMese, totGen, classCol) => {
    const rows = Object.entries(mappa);
    if (rows.length === 0) return null;
    return (
      <div style={{marginBottom:28}}>
        <h3 className="serif" style={{fontWeight:500, fontSize:18, margin:"0 0 10px"}}>{titolo}</h3>
        <div className="tbl-wrap" style={{overflowX:"auto"}}>
          <table className="tbl" style={{fontSize:12}}>
            <thead>
              <tr>
                <th style={{minWidth:170, position:"sticky", left:0, background:"var(--panel-2)", zIndex:2}}>Categoria</th>
                {MESI.map(m => <th key={m} className="num" style={{textTransform:"capitalize", minWidth:80}}>{m.slice(0,3)}</th>)}
                <th className="num" style={{minWidth:90, background:"var(--panel-2)"}}>Totale</th>
              </tr>
            </thead>
            <tbody>
              {rows.sort(([a],[b]) => a.localeCompare(b)).map(([cat, mesi]) => {
                const totRiga = Object.values(mesi).reduce((s,v)=>s+v, 0);
                return (
                  <tr key={cat}>
                    <td style={{position:"sticky", left:0, background:"var(--panel)", fontWeight:500}}>{cat}</td>
                    {MESI.map(m => (
                      <td key={m} className={"num " + classCol} style={mesi[m] ? {cursor:"pointer", textDecoration:"underline dotted"} : {}}
                          onClick={() => mesi[m] && apriDrill(tipo, cat, m)}
                          title={mesi[m] ? "Click per dettagli" : ""}>
                        {mesi[m] ? fmt(mesi[m]) : ""}
                      </td>
                    ))}
                    <td className="num" style={{fontWeight:600}}>{fmt(totRiga)}</td>
                  </tr>
                );
              })}
              <tr style={{borderTop:"2px solid var(--ink)", fontWeight:600, background:"var(--panel-2)"}}>
                <td style={{position:"sticky", left:0, background:"var(--panel-2)", fontFamily:"'Fraunces',serif"}}>Totale</td>
                {MESI.map(m => <td key={m} className={"num " + classCol}>{totMese[m] ? fmt(totMese[m]) : ""}</td>)}
                <td className="num" style={{fontWeight:700}}>{fmt(totGen)}</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    );
  };

  return (
    <div>
      <div className="page-head">
        <div>
          <h2>Rendiconto Finanziario</h2>
          <div className="sub">Flussi entrate/uscite per categoria e mese · click su una cella per i dettagli</div>
        </div>
      </div>

      <div className="filters">
        <span className="label">Filtra:</span>
        <select value={filterBu} onChange={e => setFilterBu(e.target.value)}>
          <option value="">Tutte le BU</option>
          {BUSINESS_UNITS.map(b => <option key={b} value={b}>{b}</option>)}
        </select>
      </div>

      <div className="kpi-grid">
        <div className="kpi">
          <div className="label">Entrate totali</div>
          <div className="value" style={{color:"var(--accent)"}}>{fmtEuro(totEntrateGen)}</div>
        </div>
        <div className="kpi">
          <div className="label">Uscite totali</div>
          <div className="value" style={{color:"var(--danger)"}}>{fmtEuro(totUsciteGen)}</div>
        </div>
        <div className="kpi accent">
          <div className="label">Flusso netto</div>
          <div className="value">{fmtEuro(totEntrateGen - totUsciteGen)}</div>
          <div className="hint">Entrate − Uscite</div>
        </div>
      </div>

      {renderSezione("Entrate per categoria e mese", "entrata", tabella.entrate, totEntrateMese, totEntrateGen, "pos")}
      {renderSezione("Uscite per categoria e mese", "uscita", tabella.uscite, totUsciteMese, totUsciteGen, "neg")}

      {drillDown && (
        <div className="modal-bg" onClick={() => setDrillDown(null)}>
          <div className="modal" onClick={e => e.stopPropagation()} style={{maxWidth:760}}>
            <div className="modal-head">
              <h3>
                {drillDown.tipo === "entrata" ? "↓ Entrate" : "↑ Uscite"} · {drillDown.categoria} · <span style={{textTransform:"capitalize"}}>{drillDown.mese}</span>
              </h3>
              <button className="btn ghost sm" onClick={() => setDrillDown(null)}>✕</button>
            </div>
            <div className="modal-body">
              {drillDown.movs.length === 0 ? (
                <div className="empty-state">Nessun movimento</div>
              ) : (
                <table className="tbl">
                  <thead>
                    <tr>
                      <th style={{width:90}}>Data</th>
                      <th>Descrizione</th>
                      <th>BU</th>
                      <th className="num" style={{width:100}}>Importo</th>
                    </tr>
                  </thead>
                  <tbody>
                    {drillDown.movs.sort((a,b) => (a.data || "").localeCompare(b.data || "")).map((m,i) => (
                      <tr key={m._id || i}>
                        <td>{fmtDate(m.data)}</td>
                        <td>{m.descrizione || <span style={{color:"var(--ink-3)"}}>(senza descrizione)</span>}</td>
                        <td><span className="pill">{m.bu || "—"}</span></td>
                        <td className={"num " + (drillDown.tipo === "entrata" ? "pos" : "neg")}>{fmt(m.importo)}</td>
                      </tr>
                    ))}
                    <tr style={{borderTop:"2px solid var(--ink)", fontWeight:700, background:"var(--panel-2)"}}>
                      <td colSpan={3}>TOTALE</td>
                      <td className="num">{fmt(drillDown.movs.reduce((s,m) => s + m.importo, 0))}</td>
                    </tr>
                  </tbody>
                </table>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ============================================================
// PAGINA: PIVOT CONTI (analisi per conto del Piano dei Conti)
// ============================================================
function PagePivotConti({ conti, movimenti, saldiIniziali }) {
  const [vista, setVista] = useState("uscite"); // uscite | entrate | tutti
  const [filterCategoria, setFilterCategoria] = useState("");
  const [drillDown, setDrillDown] = useState(null);
  const [sortBy, setSortBy] = useState("totale"); // totale | nome | impatto

  const contiMap = useMemo(() => {
    const m = {};
    conti.forEach(c => { m[c.codice] = c; });
    CONTI_LIQUIDITA.forEach(c => { if (!m[c.codice]) m[c.codice] = { codice: c.codice, nome: c.nome }; });
    return m;
  }, [conti]);

  // Categorie disponibili
  const categorie = useMemo(() => {
    const set = new Set();
    Object.values(contiMap).forEach(c => { if (c.categoria) set.add(c.categoria); });
    return [...set].sort();
  }, [contiMap]);

  // Matrice contoPdC × mese
  const tabella = useMemo(() => {
    const matrice = {}; // {contoPdC: {mese: importo}}
    const dettagli = {}; // {contoPdC: {mese: [movimenti]}}

    movimenti.forEach(m => {
      if (!m.contoPdC) return;
      const segno = (m.tipo === "entrata") ? "entrata" : (m.tipo === "uscita") ? "uscita" : null;
      if (!segno) return;
      if (vista !== "tutti" && vista !== segno + "s" && vista !== segno) {
        // vista="uscite" → mostra solo uscite ecc.
        if (vista === "uscite" && segno !== "uscita") return;
        if (vista === "entrate" && segno !== "entrata") return;
      }
      const cod = m.contoPdC;
      const mese = m.mese || "?";
      if (!matrice[cod]) matrice[cod] = {};
      if (!dettagli[cod]) dettagli[cod] = {};
      if (!dettagli[cod][mese]) dettagli[cod][mese] = [];
      matrice[cod][mese] = (matrice[cod][mese] || 0) + m.importo;
      dettagli[cod][mese].push(m);
    });
    return { matrice, dettagli };
  }, [movimenti, vista]);

  // Filtra per categoria
  const contiFiltrati = useMemo(() => {
    return Object.entries(tabella.matrice)
      .filter(([cod]) => {
        if (!filterCategoria) return true;
        return contiMap[cod]?.categoria === filterCategoria;
      })
      .map(([cod, mesi]) => ({
        codice: Number(cod),
        nome: contiMap[cod]?.nome || `Conto ${cod}`,
        categoria: contiMap[cod]?.categoria || "",
        mesi,
        totale: Object.values(mesi).reduce((s,v) => s+v, 0),
      }));
  }, [tabella, filterCategoria, contiMap]);

  const totGenerale = contiFiltrati.reduce((s,c) => s + c.totale, 0);

  // Sort
  const contiOrdinati = useMemo(() => {
    const arr = [...contiFiltrati];
    if (sortBy === "totale") arr.sort((a,b) => b.totale - a.totale);
    else if (sortBy === "nome") arr.sort((a,b) => a.nome.localeCompare(b.nome));
    else if (sortBy === "impatto") arr.sort((a,b) => b.totale - a.totale);
    else arr.sort((a,b) => a.codice - b.codice);
    return arr;
  }, [contiFiltrati, sortBy]);

  // Totali per mese
  const totaliMese = useMemo(() => {
    const tot = {};
    MESI.forEach(m => tot[m] = 0);
    contiFiltrati.forEach(c => {
      Object.entries(c.mesi).forEach(([m, v]) => {
        if (tot[m] !== undefined) tot[m] += v;
      });
    });
    return tot;
  }, [contiFiltrati]);

  const apriDrill = (conto, mese) => {
    const movs = tabella.dettagli[conto.codice]?.[mese] || [];
    setDrillDown({ conto, mese, movs });
  };

  return (
    <div>
      <div className="page-head">
        <div>
          <h2>Pivot Conti</h2>
          <div className="sub">Analisi per conto del Piano dei Conti · click su una cella per i dettagli</div>
        </div>
      </div>

      <div className="filters">
        <span className="label">Vista:</span>
        <select value={vista} onChange={e => setVista(e.target.value)}>
          <option value="uscite">Solo uscite</option>
          <option value="entrate">Solo entrate</option>
          <option value="tutti">Tutti i movimenti</option>
        </select>
        <span className="label">Categoria:</span>
        <select value={filterCategoria} onChange={e => setFilterCategoria(e.target.value)}>
          <option value="">Tutte</option>
          {categorie.map(c => <option key={c} value={c}>{c}</option>)}
        </select>
        <span className="label">Ordina per:</span>
        <select value={sortBy} onChange={e => setSortBy(e.target.value)}>
          <option value="totale">Totale (decrescente)</option>
          <option value="nome">Nome conto</option>
          <option value="codice">Codice</option>
        </select>
      </div>

      <div className="kpi-grid">
        <div className="kpi accent">
          <div className="label">Totale {vista === "entrate" ? "Entrate" : vista === "uscite" ? "Uscite" : "Movimenti"}</div>
          <div className="value">{fmtEuro(totGenerale)}</div>
          <div className="hint">{contiFiltrati.length} conti attivi</div>
        </div>
        {contiOrdinati.slice(0, 3).map((c, i) => (
          <div key={c.codice} className="kpi">
            <div className="label">{i === 0 ? "Top" : (i+1)+"°"} conto</div>
            <div className="value" style={{fontSize: 18, lineHeight: 1.2}}>{c.nome.trim().slice(0, 22)}</div>
            <div className="hint">{fmtEuro(c.totale)} · {totGenerale > 0 ? (c.totale / totGenerale * 100).toFixed(1) : 0}%</div>
          </div>
        ))}
      </div>

      <div className="tbl-wrap" style={{overflowX:"auto", marginTop:18}}>
        <table className="tbl" style={{fontSize:12}}>
          <thead>
            <tr>
              <th style={{minWidth:230, position:"sticky", left:0, background:"var(--panel-2)", zIndex:2}}>Conto</th>
              {MESI.map(m => <th key={m} className="num" style={{textTransform:"capitalize", minWidth:75}}>{m.slice(0,3)}</th>)}
              <th className="num" style={{minWidth:95, background:"var(--panel-2)"}}>Totale</th>
              <th className="num" style={{minWidth:65, background:"var(--panel-2)"}}>%</th>
            </tr>
          </thead>
          <tbody>
            {contiOrdinati.map(c => {
              const pct = totGenerale > 0 ? (c.totale / totGenerale * 100) : 0;
              const classCol = vista === "entrate" ? "pos" : vista === "uscite" ? "neg" : "";
              return (
                <tr key={c.codice}>
                  <td style={{position:"sticky", left:0, background:"var(--panel)"}}>
                    <div style={{display:"flex", alignItems:"baseline", gap:8}}>
                      <span className="mono" style={{fontSize:10.5, color:"var(--ink-3)"}}>{String(c.codice).padStart(2,"0")}</span>
                      <span style={{fontWeight:500}}>{c.nome.trim()}</span>
                    </div>
                    {c.categoria && <div style={{fontSize:10.5, color:"var(--ink-3)", marginTop:1}}>{c.categoria}</div>}
                  </td>
                  {MESI.map(m => (
                    <td key={m} className={"num " + classCol}
                        style={c.mesi[m] ? {cursor:"pointer", textDecoration:"underline dotted"} : {}}
                        onClick={() => c.mesi[m] && apriDrill(c, m)}
                        title={c.mesi[m] ? "Click per dettagli" : ""}>
                      {c.mesi[m] ? fmt(c.mesi[m]) : ""}
                    </td>
                  ))}
                  <td className="num" style={{fontWeight:700}}>{fmt(c.totale)}</td>
                  <td className="num" style={{fontWeight:600, color: pct > 20 ? "var(--accent-ink)" : "var(--ink-2)"}}>
                    {pct.toFixed(1)}%
                  </td>
                </tr>
              );
            })}
            <tr style={{borderTop:"2px solid var(--ink)", fontWeight:700, background:"var(--panel-2)"}}>
              <td style={{position:"sticky", left:0, background:"var(--panel-2)", fontFamily:"'Fraunces',serif"}}>TOTALE</td>
              {MESI.map(m => <td key={m} className="num">{totaliMese[m] ? fmt(totaliMese[m]) : ""}</td>)}
              <td className="num">{fmt(totGenerale)}</td>
              <td className="num">100%</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div style={{marginTop:18, padding:"12px 16px", background:"var(--panel-2)", border:"1px solid var(--rule)", borderRadius:8, fontSize:12, color:"var(--ink-2)"}}>
        <strong>💡 Suggerimento.</strong> Filtra per categoria (es. "COSTI") per concentrarti su un sottoinsieme. La percentuale è calcolata sul totale visibile (rispetta i filtri). Click su una cella per vedere le singole transazioni che la compongono.
      </div>

      {drillDown && (
        <div className="modal-bg" onClick={() => setDrillDown(null)}>
          <div className="modal" onClick={e => e.stopPropagation()} style={{maxWidth:760}}>
            <div className="modal-head">
              <h3>
                {String(drillDown.conto.codice).padStart(2,"0")} {drillDown.conto.nome.trim()} · <span style={{textTransform:"capitalize"}}>{drillDown.mese}</span>
              </h3>
              <button className="btn ghost sm" onClick={() => setDrillDown(null)}>✕</button>
            </div>
            <div className="modal-body">
              {drillDown.movs.length === 0 ? (
                <div className="empty-state">Nessun movimento</div>
              ) : (
                <table className="tbl">
                  <thead>
                    <tr>
                      <th style={{width:90}}>Data</th>
                      <th>Descrizione</th>
                      <th>Categoria</th>
                      <th className="num" style={{width:100}}>Importo</th>
                    </tr>
                  </thead>
                  <tbody>
                    {drillDown.movs.sort((a,b) => (a.data || "").localeCompare(b.data || "")).map((m,i) => (
                      <tr key={m._id || i}>
                        <td>{fmtDate(m.data)}</td>
                        <td>{m.descrizione || <span style={{color:"var(--ink-3)"}}>(senza descrizione)</span>}</td>
                        <td><span className="pill">{m.categoria || "—"}</span></td>
                        <td className={"num " + (m.tipo === "entrata" ? "pos" : "neg")}>{m.tipo === "entrata" ? "+" : "−"}{fmt(m.importo)}</td>
                      </tr>
                    ))}
                    <tr style={{borderTop:"2px solid var(--ink)", fontWeight:700, background:"var(--panel-2)"}}>
                      <td colSpan={3}>TOTALE</td>
                      <td className="num">{fmt(drillDown.movs.reduce((s,m) => s + m.importo, 0))}</td>
                    </tr>
                  </tbody>
                </table>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// PAGINA: EXPORT
// ============================================================
function PageExport({ conti, movimenti, saldiIniziali, stagione }) {
  const [busy, setBusy] = useState(false);
  const [lastAction, setLastAction] = useState(null);

  const contiMap = useMemo(() => {
    const m = {};
    conti.forEach(c => { m[c.codice] = c; });
    CONTI_LIQUIDITA.forEach(c => { if (!m[c.codice]) m[c.codice] = { codice: c.codice, nome: c.nome }; });
    return m;
  }, [conti]);

  const exportExcel = () => {
    setBusy(true);
    try {
      const wb = XLSX.utils.book_new();

      // 1. Movimenti
      const movRows = movimenti.map(m => ({
        Tipo: m.tipo,
        Data: m.data,
        Mese: m.mese,
        "Conto liquidità": contiMap[m.contoLiquidita]?.nome.trim() || "?",
        "Conto destinazione": m.contoLiquiditaDest ? contiMap[m.contoLiquiditaDest]?.nome.trim() : "",
        "Conto P.d.C.": m.contoPdC ? `${m.contoPdC} ${contiMap[m.contoPdC]?.nome.trim() || ""}` : "",
        Categoria: m.categoria,
        BU: m.bu,
        Importo: m.importo,
        Descrizione: m.descrizione,
        Importato: m.importato ? "Sì" : "",
      }));
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(movRows), "Movimenti");

      // 2. Libro Giornale
      const scritture = generaLibroGiornale(movimenti, saldiIniziali, contiMap);
      const lgRows = [];
      scritture.forEach((s, idx) => {
        s.righe.forEach((r, ri) => {
          lgRows.push({
            Data: ri === 0 ? s.data : "",
            Codice: r.codice,
            Conto: r.nome.trim(),
            Descrizione: ri === 0 ? s.descrizione : "",
            Dare: r.dare > 0 ? r.dare : "",
            Avere: r.avere > 0 ? r.avere : "",
          });
        });
      });
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(lgRows), "Libro Giornale");

      // 3. Bilancio Verifica
      const mastrini = calcolaMastrini(scritture).map(x => ({
        Codice: x.codice,
        Conto: x.nome.trim(),
        Categoria: contiMap[x.codice]?.categoria || "",
        Prospetto: contiMap[x.codice]?.prospetto || "",
        Dare: x.dare,
        Avere: x.avere,
        Saldo: x.dare - x.avere,
      })).sort((a,b) => a.Codice - b.Codice);
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(mastrini), "Bilancio Verifica");

      // 4. Piano dei Conti
      const pdcRows = conti.sort((a,b)=>a.codice-b.codice).map(c => ({
        Codice: c.codice, Nome: c.nome.trim(), Eccedenza: c.eccedenza, Prospetto: c.prospetto, Categoria: c.categoria
      }));
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(pdcRows), "Piano dei Conti");

      XLSX.writeFile(wb, `Contabilita_FutsalFabbrico_${stagione}.xlsx`);
      setLastAction("Excel esportato");
    } catch(e) {
      alert("Errore export Excel: " + e.message);
    } finally {
      setBusy(false);
    }
  };

  const exportPDF = () => {
    setBusy(true);
    try {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
      const scritture = generaLibroGiornale(movimenti, saldiIniziali, contiMap);
      const mastrini = calcolaMastrini(scritture).filter(m => m.dare > 0 || m.avere > 0).sort((a,b)=>a.codice-b.codice);

      // Intestazione
      doc.setFont("helvetica", "bold");
      doc.setFontSize(16);
      doc.text("FUTSAL FABBRICO ASD", 105, 18, { align: "center" });
      doc.setFontSize(11);
      doc.setFont("helvetica", "normal");
      doc.text(`Bilancio di Verifica · Stagione ${stagione}`, 105, 25, { align: "center" });
      doc.setFontSize(9);
      doc.setTextColor(100);
      doc.text(`Generato il ${new Date().toLocaleDateString("it-IT")} alle ${new Date().toLocaleTimeString("it-IT")}`, 105, 31, { align: "center" });
      doc.setTextColor(0);

      // Tabella mastrini
      const rows = mastrini.map(m => [
        String(m.codice).padStart(2,"0"),
        m.nome.trim(),
        contiMap[m.codice]?.categoria || "",
        m.dare > 0 ? m.dare.toFixed(2) : "",
        m.avere > 0 ? m.avere.toFixed(2) : "",
        Math.abs(m.dare - m.avere).toFixed(2) + (m.dare - m.avere < 0 ? " A" : m.dare - m.avere > 0 ? " D" : "")
      ]);
      const totD = mastrini.reduce((s,m)=>s+m.dare,0);
      const totA = mastrini.reduce((s,m)=>s+m.avere,0);
      rows.push([
        "", { content: "TOTALI", styles: { fontStyle: "bold" } }, "",
        { content: totD.toFixed(2), styles: { fontStyle: "bold" } },
        { content: totA.toFixed(2), styles: { fontStyle: "bold" } },
        Math.abs(totD-totA) < 0.01 ? "✓" : (totD-totA).toFixed(2),
      ]);

      doc.autoTable({
        startY: 38,
        head: [["Cod.", "Conto", "Categoria", "Dare", "Avere", "Saldo"]],
        body: rows,
        styles: { fontSize: 8, cellPadding: 1.5 },
        headStyles: { fillColor: [26, 26, 26], textColor: 240, fontStyle: "bold" },
        columnStyles: {
          0: { cellWidth: 12, halign: "center" },
          3: { cellWidth: 24, halign: "right" },
          4: { cellWidth: 24, halign: "right" },
          5: { cellWidth: 26, halign: "right" },
        },
      });

      doc.save(`Bilancio_FutsalFabbrico_${stagione}.pdf`);
      setLastAction("PDF esportato");
    } catch(e) {
      alert("Errore export PDF: " + e.message);
    } finally {
      setBusy(false);
    }
  };

  return (
    <div>
      <div className="page-head">
        <div>
          <h2>Export</h2>
          <div className="sub">Esporta dati e bilanci in Excel o PDF</div>
        </div>
      </div>

      <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(300px, 1fr))", gap:14}}>
        <div className="card">
          <h3 className="card-title">📊 Excel completo</h3>
          <p style={{fontSize:13, color:"var(--ink-2)", marginTop:0}}>
            File <code>.xlsx</code> con 4 fogli: Movimenti, Libro Giornale, Bilancio di Verifica, Piano dei Conti.
          </p>
          <button className="btn accent" onClick={exportExcel} disabled={busy}>{busy ? "Esportando…" : "Scarica Excel"}</button>
        </div>

        <div className="card">
          <h3 className="card-title">📄 Bilancio PDF</h3>
          <p style={{fontSize:13, color:"var(--ink-2)", marginTop:0}}>
            PDF formale del Bilancio di Verifica, formato A4 con intestazione Futsal Fabbrico ASD.
          </p>
          <button className="btn accent" onClick={exportPDF} disabled={busy}>{busy ? "Esportando…" : "Scarica PDF"}</button>
        </div>
      </div>

      {lastAction && (
        <div style={{marginTop:18, padding:"10px 14px", background:"var(--accent-soft)", border:"1px solid #c8d8ce", borderRadius:8, fontSize:13, color:"var(--accent-ink)"}}>
          ✓ {lastAction}
        </div>
      )}
    </div>
  );
}

// PAGINA: CESPITI

function PageCespiti({ cespiti, stagione, onToast }) {
  const [editing, setEditing] = useState(null);
  const [creating, setCreating] = useState(false);

  const sorted = useMemo(() => [...cespiti].sort((a,b) => (a.conto || "").localeCompare(b.conto || "")), [cespiti]);

  const totCosto = sorted.reduce((s,c) => s + (c.costo_storico || 0), 0);
  const totFondo = sorted.reduce((s,c) => s + (c.fondo_ammortamento || 0), 0);
  const totQuota = sorted.reduce((s,c) => s + (c.quota_esercizio || 0), 0);
  const valoreNetto = totCosto - totFondo;

  const saveCespite = async (data, oldKey) => {
    try {
      const key = oldKey || `cesp_${Date.now().toString(36)}`;
      await db.ref(`stagioni/${stagione}/cespiti/${key}`).set(data);
      onToast("Cespite salvato");
      setEditing(null); setCreating(false);
    } catch(e) { alert("Errore: " + e.message); }
  };

  const deleteCespite = async (key) => {
    if (!confirm("Eliminare questo cespite?")) return;
    try {
      await db.ref(`stagioni/${stagione}/cespiti/${key}`).remove();
      onToast("Cespite eliminato");
    } catch(e) { alert("Errore: " + e.message); }
  };

  // Per ottenere la key del cespite uso una scansione separata
  const [cespitiConKey, setCespitiConKey] = useState([]);
  useEffect(() => {
    if (!firebaseReady) return;
    const ref = db.ref(`stagioni/${stagione}/cespiti`);
    const cb = ref.on("value", snap => {
      const v = snap.val();
      setCespitiConKey(v ? Object.entries(v).map(([k, c]) => ({...c, _key: k})) : []);
    });
    return () => ref.off("value", cb);
  }, [stagione]);

  const visibili = cespitiConKey.sort((a,b) => (a.conto || "").localeCompare(b.conto || ""));

  return (
    <div>
      <div className="page-head">
        <div>
          <h2>Cespiti & Ammortamenti</h2>
          <div className="sub">{cespiti.length} beni · Costo storico {fmtEuro(totCosto)} · Valore netto {fmtEuro(valoreNetto)}</div>
        </div>
        <button className="btn accent" onClick={() => setCreating(true)}>+ Nuovo cespite</button>
      </div>

      <div className="kpi-grid">
        <div className="kpi">
          <div className="label">Costo storico</div>
          <div className="value">{fmtEuro(totCosto)}</div>
          <div className="hint">Tutti i beni</div>
        </div>
        <div className="kpi">
          <div className="label">Fondo ammortamento</div>
          <div className="value" style={{color:"var(--danger)"}}>{fmtEuro(totFondo)}</div>
        </div>
        <div className="kpi accent">
          <div className="label">Valore netto</div>
          <div className="value">{fmtEuro(valoreNetto)}</div>
          <div className="hint">Costo − Fondo</div>
        </div>
        <div className="kpi">
          <div className="label">Quota esercizio</div>
          <div className="value">{fmtEuro(totQuota)}</div>
          <div className="hint">Ammortamento annuo</div>
        </div>
      </div>

      <div className="tbl-wrap" style={{marginTop:20}}>
        <table className="tbl">
          <thead>
            <tr>
              <th>Conto / Bene</th>
              <th>Classe</th>
              <th className="num" style={{width:60}}>N°</th>
              <th className="num" style={{width:80}}>Anno</th>
              <th className="num" style={{width:110}}>Costo storico</th>

}

function CespiteForm({ cespite, onSave, onCancel }) {
  const isNew = !cespite;
  const [conto, setConto] = useState(cespite?.conto || "");
  const [classe, setClasse] = useState(cespite?.classe || "IMMOBILIZZAZIONI MATERIALI");
  const [nBeni, setNBeni] = useState(cespite?.n_beni || "1");
  const [annoInizio, setAnnoInizio] = useState(cespite?.anno_inizio || new Date().getFullYear());
  const [costo, setCosto] = useState(cespite?.costo_storico || "");
  const [aliquota, setAliquota] = useState(cespite ? (cespite.aliquota * 100) : "");
  const [quota, setQuota] = useState(cespite?.quota_esercizio || 0);
  const [fondo, setFondo] = useState(cespite?.fondo_ammortamento || 0);

  // Auto-calcolo quota se cambio costo o aliquota
  useEffect(() => {
    if (costo && aliquota) {
      const q = Number(costo) * (Number(aliquota) / 100);
      setQuota(Math.round(q * 100) / 100);
    }
  }, [costo, aliquota]);

  const submit = (e) => {
    e.preventDefault();
    if (!conto.trim()) return alert("Nome conto obbligatorio");
    onSave({
      conto: conto.trim(),
      classe,
      n_beni: nBeni,
      anno_inizio: Number(annoInizio),
      costo_storico: Number(costo) || 0,
      aliquota: (Number(aliquota) || 0) / 100,
      quota_esercizio: Number(quota) || 0,
      fondo_ammortamento: Number(fondo) || 0,
    });
  };

  return (
    <div className="modal-bg" onClick={onCancel}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-head">
          <h3>{isNew ? "Nuovo cespite" : "Modifica cespite"}</h3>
          <button className="btn ghost sm" onClick={onCancel}>✕</button>
        </div>
        <div className="modal-body">
          <form className="form-grid" onSubmit={submit}>
            <div className="form-row">
              <label>Nome bene <span className="req">*</span></label>
              <input type="text" value={conto} onChange={e => setConto(e.target.value)} required placeholder="es. PALLONI FUTSAL"/>
            </div>
            <div className="form-row">
              <label>Classe</label>
              <select value={classe} onChange={e => setClasse(e.target.value)}>
                <option>IMMOBILIZZAZIONI MATERIALI</option>
                <option>IMMOBILIZZAZIONI IMMATERIALI</option>
              </select>
            </div>
            <div className="form-row">
              <label>Numero beni</label>
              <input type="text" value={nBeni} onChange={e => setNBeni(e.target.value)}/>
            </div>
            <div className="form-row">
              <label>Anno acquisto</label>
              <input type="number" value={annoInizio} onChange={e => setAnnoInizio(e.target.value)} min="2000" max="2100"/>
            </div>
            <div className="form-row">
              <label>Costo storico €</label>
              <input type="number" step="0.01" value={costo} onChange={e => setCosto(e.target.value)}/>
            </div>
            <div className="form-row">
              <label>Aliquota %</label>
              <input type="number" step="0.01" value={aliquota} onChange={e => setAliquota(e.target.value)} placeholder="es. 20 per 20%"/>
            </div>
            <div className="form-row">
              <label>Quota esercizio</label>
              <input type="number" step="0.01" value={quota} onChange={e => setQuota(e.target.value)}/>
            </div>
            <div className="form-row">
              <label>Fondo ammortamento</label>
              <input type="number" step="0.01" value={fondo} onChange={e => setFondo(e.target.value)}/>
            </div>
            <div style={{display:"flex", justifyContent:"flex-end", gap:8, marginTop:12, paddingTop:14, borderTop:"1px solid var(--rule)"}}>
              <button type="button" className="btn ghost" onClick={onCancel}>Annulla</button>
              <button type="submit" className="btn accent">Salva</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  );
}

function PageTorneo({ stagione, onToast }) {
  const [squadre, setSquadre] = useState([]);
  const [serate, setSerate] = useState([]);
  const [editingSquadra, setEditingSquadra] = useState(null);
  const [creatingSquadra, setCreatingSquadra] = useState(false);
  const [editingSerata, setEditingSerata] = useState(null);
  const [creatingSerata, setCreatingSerata] = useState(false);
  const [tab, setTab] = useState("dash");

  useEffect(() => {
    if (!firebaseReady) return;
    const refSq = db.ref(`stagioni/${stagione}/torneo/squadre`);
    const refSe = db.ref(`stagioni/${stagione}/torneo/serate`);
    const cbSq = refSq.on("value", snap => {
      const v = snap.val();
      setSquadre(v ? Object.entries(v).map(([k,s])=>({...s,_key:k})) : []);
    });
    const cbSe = refSe.on("value", snap => {
      const v = snap.val();
      setSerate(v ? Object.entries(v).map(([k,s])=>({...s,_key:k})) : []);
    });
    return () => { refSq.off("value", cbSq); refSe.off("value", cbSe); };
  }, [stagione]);

  // Seed iniziale delle 16 squadre dello sheet
  const seedSquadre = async () => {
    if (squadre.length > 0) {
      if (!confirm("Esistono già squadre. Sovrascrivere tutte con quelle iniziali del torneo?")) return;
    }
    try {
      const updates = {};
      // pulisci esistenti
      squadre.forEach(s => { updates[s._key] = null; });
      // aggiungi le seed
      SEED_SQUADRE.forEach((sq, i) => {
        updates[`team_${String(i+1).padStart(2,'0')}`] = sq;
      });
      await db.ref(`stagioni/${stagione}/torneo/squadre`).update(updates);
      onToast("Squadre importate");
    } catch(e) { alert("Errore: " + e.message); }
  };

  // KPI torneo
  const totIscrizioni = squadre.reduce((s,sq) => s + (sq.quotaIscrizione || 0), 0);
  const totAssicurazioni = squadre.reduce((s,sq) => s + (sq.quotaAssicurazione || 0), 0);
  const totDaRiscuotere = squadre.filter(sq => !sq.riscosso).reduce((s,sq) => s + (sq.totale || 0), 0);
  const totRiscosso = squadre.filter(sq => sq.riscosso).reduce((s,sq) => s + (sq.totale || 0), 0);

  const totSerate = serate.reduce((s,se) => s + (se.cash || 0) + (se.pos || 0) + (se.paypal || 0) + (se.satispay || 0), 0);
  const ricaviTorneo = totIscrizioni + totAssicurazioni + totSerate;

  const saveSquadra = async (data, key) => {
    try {
      const k = key || `team_${Date.now().toString(36)}`;
      await db.ref(`stagioni/${stagione}/torneo/squadre/${k}`).set(data);
      onToast("Squadra salvata");
      setEditingSquadra(null); setCreatingSquadra(false);
    } catch(e) { alert("Errore: " + e.message); }
  };

  const deleteSquadra = async (k) => {
    if (!confirm("Eliminare questa squadra?")) return;
    await db.ref(`stagioni/${stagione}/torneo/squadre/${k}`).remove();
    onToast("Squadra eliminata");
  };

  const saveSerata = async (data, key) => {
    try {
      const k = key || `serata_${Date.now().toString(36)}`;
      await db.ref(`stagioni/${stagione}/torneo/serate/${k}`).set(data);
      onToast("Serata salvata");
      setEditingSerata(null); setCreatingSerata(false);
    } catch(e) { alert("Errore: " + e.message); }
  };

  const deleteSerata = async (k) => {
    if (!confirm("Eliminare questa serata?")) return;
    await db.ref(`stagioni/${stagione}/torneo/serate/${k}`).remove();
    onToast("Serata eliminata");
  };

  return (
    <div>
      <div className="page-head">
        <div>
          <h2>Torneo del Prete</h2>
          <div className="sub">Gestione iscrizioni squadre e incassi serate</div>
        </div>
      </div>

      <div className="tipo-switch" style={{maxWidth:560, marginBottom:20}}>
        <button type="button" className={tab === "dash" ? "active entrata" : ""} onClick={() => setTab("dash")}>◆ Riepilogo</button>
        <button type="button" className={tab === "squadre" ? "active entrata" : ""} onClick={() => setTab("squadre")}>★ Squadre ({squadre.length})</button>
        <button type="button" className={tab === "serate" ? "active entrata" : ""} onClick={() => setTab("serate")}>● Serate ({serate.length})</button>
      </div>

      {tab === "dash" && (
        <>
          <div className="kpi-grid">
            <div className="kpi accent">
              <div className="label">Ricavi torneo totali</div>

              <div className="hint">Iscriz. + Assic. + Serate</div>

            <div className="kpi">
              <div className="label">Iscrizioni</div>
              <div className="value" style={{color:"var(--accent)"}}>{fmtEuro(totIscrizioni)}</div>
              <div className="hint">{squadre.length} squadre</div>
            </div>
            <div className="kpi">
              <div className="label">Assicurazioni</div>
              <div className="value" style={{color:"var(--accent)"}}>{fmtEuro(totAssicurazioni)}</div>
              <div className="hint">Quote per giocatore</div>
            </div>
            <div className="kpi">
              <div className="label">Incassi serate</div>
              <div className="value" style={{color:"var(--accent)"}}>{fmtEuro(totSerate)}</div>
              <div className="hint">{serate.length} serate</div>
            </div>
            <div className="kpi">
              <div className="label">Da riscuotere</div>
              <div className="value" style={{color: totDaRiscuotere > 0 ? "var(--warn)" : "var(--accent)"}}>{fmtEuro(totDaRiscuotere)}</div>
              <div className="hint">{squadre.filter(s => !s.riscosso).length} squadre</div>
            </div>
            <div className="kpi">
              <div className="label">Riscosso</div>
              <div className="value">{fmtEuro(totRiscosso)}</div>
            </div>
          </div>

          {squadre.length === 0 && (
            <div className="card" style={{marginTop:20, textAlign:"center"}}>
              <h3 className="card-title">Nessuna squadra ancora</h3>
              <p style={{fontSize:13, color:"var(--ink-2)"}}>Importa le 16 squadre del Torneo del Prete 2025 dallo sheet.</p>
              <button className="btn accent" onClick={seedSquadre}>Importa squadre iniziali</button>
            </div>
          )}
        </>
      )}

      {tab === "squadre" && (
        <>
          <div style={{display:"flex", justifyContent:"space-between", marginBottom:14}}>
            <div style={{display:"flex", gap:8}}>
              <button className="btn accent" onClick={() => setCreatingSquadra(true)}>+ Nuova squadra</button>
              {squadre.length === 0 && <button className="btn ghost" onClick={seedSquadre}>Importa le 16 dello sheet</button>}
            </div>
          </div>
          <div className="tbl-wrap">
            <table className="tbl">
              <thead>
                <tr>
                  <th style={{width:70}}>Team</th>
                  <th>Nome squadra</th>
                  <th className="num" style={{width:80}}>Giocatori</th>
                  <th className="num" style={{width:100}}>Iscrizione</th>
                  <th className="num" style={{width:110}}>Assicurazione</th>
                  <th className="num" style={{width:90}}>Totale</th>
                  <th style={{width:90}}>Riscosso?</th>
                  <th style={{width:90}}></th>
                </tr>
              </thead>
              <tbody>
                {squadre.sort((a,b) => (a.team || "").localeCompare(b.team || "")).map(sq => (
                  <tr key={sq._key}>
                    <td style={{fontWeight:600}}>{sq.team}</td>
                    <td>{sq.nome || <span style={{color:"var(--ink-3)"}}>—</span>}</td>
                    <td className="num">{sq.nGiocatori || "—"}</td>
                    <td className="num">{fmt(sq.quotaIscrizione)}</td>
                    <td className="num">{fmt(sq.quotaAssicurazione)}</td>
                    <td className="num" style={{fontWeight:600}}>{fmt(sq.totale)}</td>
                    <td>
                      <span className="pill" style={{background: sq.riscosso ? "var(--accent-soft)" : "var(--danger-soft)", borderColor: sq.riscosso ? "#c8d8ce" : "#f1d6d6", color: sq.riscosso ? "var(--accent-ink)" : "var(--danger)"}}>
                        {sq.riscosso ? "✓ Sì" : "✗ No"}

                    <td>
                      <div style={{display:"flex", gap:4}}>

function SquadraForm({ squadra, onSave, onCancel }) {
  const isNew = !squadra;
  const [team, setTeam] = useState(squadra?.team || "");
  const [nome, setNome] = useState(squadra?.nome || "");
  const [nGiocatori, setNGiocatori] = useState(squadra?.nGiocatori || 0);
  const [qIscr, setQIscr] = useState(squadra?.quotaIscrizione || 150);
  const [qAssic, setQAssic] = useState(squadra?.quotaAssicurazione || 0);
  const [riscosso, setRiscosso] = useState(squadra?.riscosso ?? false);

  // auto: assicurazione = 5 € per giocatore
  useEffect(() => {
    if (isNew && nGiocatori && !qAssic) {
      setQAssic(Number(nGiocatori) * 5);
    }
  }, [nGiocatori]);

  const totale = Number(qIscr || 0) + Number(qAssic || 0);

  const submit = (e) => {
    e.preventDefault();
    if (!team.trim()) return alert("Codice team obbligatorio (es. TEAM 1)");
    onSave({
      team: team.trim().toUpperCase(),
      nome: nome.trim(),
      nGiocatori: Number(nGiocatori) || 0,
      quotaIscrizione: Number(qIscr) || 0,
      quotaAssicurazione: Number(qAssic) || 0,
      totale,
      riscosso: !!riscosso,
    });
  };

  return (
    <div className="modal-bg" onClick={onCancel}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-head">
          <h3>{isNew ? "Nuova squadra" : `Modifica ${squadra.team}`}</h3>

        </div>
        <div className="modal-body">
          <form className="form-grid" onSubmit={submit}>
            <div className="form-row"><label>Codice team <span className="req">*</span></label><input type="text" value={team} onChange={e => setTeam(e.target.value)} placeholder="es. TEAM 17" required/></div>
            <div className="form-row"><label>Nome squadra</label><input type="text" value={nome} onChange={e => setNome(e.target.value)} placeholder="es. FANALINO FC"/></div>
            <div className="form-row"><label>N. giocatori</label><input type="number" min="0" value={nGiocatori} onChange={e => setNGiocatori(e.target.value)}/></div>
            <div className="form-row"><label>Quota iscrizione €</label><input type="number" step="0.01" value={qIscr} onChange={e => setQIscr(e.target.value)}/></div>
            <div className="form-row"><label>Quota assicurazione €</label><input type="number" step="0.01" value={qAssic} onChange={e => setQAssic(e.target.value)}/></div>

            <div className="form-row"><label>Riscosso?</label><label style={{display:"flex", alignItems:"center", gap:8}}><input type="checkbox" checked={riscosso} onChange={e => setRiscosso(e.target.checked)}/> Quota già incassata</label></div>
            <div style={{display:"flex", justifyContent:"flex-end", gap:8, marginTop:12, paddingTop:14, borderTop:"1px solid var(--rule)"}}>
              <button type="button" className="btn ghost" onClick={onCancel}>Annulla</button>
              <button type="submit" className="btn accent">Salva</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  );
}

function SerataForm({ serata, onSave, onCancel }) {
  const isNew = !serata;
  const [data, setData] = useState(serata?.data || todayISO());
  const [note, setNote] = useState(serata?.note || "");
  const [cash, setCash] = useState(serata?.cash || "");
  const [pos, setPos] = useState(serata?.pos || "");
  const [paypal, setPaypal] = useState(serata?.paypal || "");
  const [satispay, setSatispay] = useState(serata?.satispay || "");

  const totale = (Number(cash) || 0) + (Number(pos) || 0) + (Number(paypal) || 0) + (Number(satispay) || 0);

  const submit = (e) => {
    e.preventDefault();
    onSave({
      data, note: note.trim(),
      cash: Number(cash) || 0,
      pos: Number(pos) || 0,
      paypal: Number(paypal) || 0,
      satispay: Number(satispay) || 0,
    });
  };

  return (
    <div className="modal-bg" onClick={onCancel}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-head">
          <h3>{isNew ? "Nuova serata" : "Modifica serata"}</h3>
          <button className="btn ghost sm" onClick={onCancel}>✕</button>
        </div>
        <div className="modal-body">
          <form className="form-grid" onSubmit={submit}>
            <div className="form-row"><label>Data <span className="req">*</span></label><input type="date" value={data} onChange={e => setData(e.target.value)} required/></div>
            <div className="form-row"><label>Note</label><input type="text" value={note} onChange={e => setNote(e.target.value)} placeholder="es. Finale, semifinale, serata 3..."/></div>
            <div className="form-row"><label>Incasso Cash €</label><input type="number" step="0.01" min="0" value={cash} onChange={e => setCash(e.target.value)}/></div>
            <div className="form-row"><label>Incasso POS €</label><input type="number" step="0.01" min="0" value={pos} onChange={e => setPos(e.target.value)}/></div>
            <div className="form-row"><label>Incasso PayPal €</label><input type="number" step="0.01" min="0" value={paypal} onChange={e => setPaypal(e.target.value)}/></div>
            <div className="form-row"><label>Incasso Satispay €</label><input type="number" step="0.01" min="0" value={satispay} onChange={e => setSatispay(e.target.value)}/></div>
            <div className="form-row"><label>Totale serata</label><div className="mono" style={{fontWeight:700, fontSize:16}}>{fmtEuro(totale)}</div></div>
            <div style={{display:"flex", justifyContent:"flex-end", gap:8, marginTop:12, paddingTop:14, borderTop:"1px solid var(--rule)"}}>
              <button type="button" className="btn ghost" onClick={onCancel}>Annulla</button>
              <button type="submit" className="btn accent">Salva</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// PAGINA: PIANO DEI CONTI
// ============================================================
function PagePianoConti({ conti, stagione, onToast }) {
  const [editing, setEditing] = useState(null);
  const [creating, setCreating] = useState(false);
  const [filter, setFilter] = useState("");
  const [filterCat, setFilterCat] = useState("");

  const cats = useMemo(() => [...new Set(conti.map(c => c.categoria))].sort(), [conti]);

  const filtered = useMemo(() => conti
    .filter(c => !filterCat || c.categoria === filterCat)
    .filter(c => !filter || c.nome.toLowerCase().includes(filter.toLowerCase()) || String(c.codice).includes(filter))
    .sort((a,b) => a.codice - b.codice), [conti, filter, filterCat]);

  const saveConto = async (data) => {
    try {
      await db.ref(`stagioni/${stagione}/conti/c${data.codice}`).set(data);
      onToast("Conto salvato");
      setEditing(null); setCreating(false);
    } catch(e) { alert("Errore: " + e.message); }
  };
  const deleteConto = async (codice) => {
    if (!confirm(`Eliminare il conto ${codice}?`)) return;
    try {
      await db.ref(`stagioni/${stagione}/conti/c${codice}`).remove();
      onToast("Conto eliminato");
    } catch(e) { alert("Errore: " + e.message); }
  };

  return (
    <div>
      <div className="page-head">
        <div>
          <h2>Piano dei Conti</h2>
          <div className="sub">{conti.length} conti · base per ogni movimento</div>
        </div>
        <button className="btn accent" onClick={() => setCreating(true)}>+ Nuovo conto</button>
      </div>

      <div className="filters">
        <input type="text" placeholder="cerca per codice o nome…" value={filter} onChange={e => setFilter(e.target.value)} style={{maxWidth:280}}/>
        <select value={filterCat} onChange={e => setFilterCat(e.target.value)}>
          <option value="">Tutte le categorie</option>
          {cats.map(c => <option key={c} value={c}>{c}</option>)}
        </select>
      </div>

      <div className="tbl-wrap">
        <table className="tbl">
          <thead>
            <tr>
              <th style={{width:60}}>Codice</th>
              <th>Nome</th>
              <th>Eccedenza</th>
              <th>Prospetto</th>
              <th>Categoria</th>
              <th style={{width:90}}></th>
            </tr>
          </thead>
          <tbody>
            {filtered.map(c => (
              <tr key={c.codice}>
                <td className="mono" style={{fontWeight:600}}>{String(c.codice).padStart(2,"0")}</td>
                <td>{c.nome.trim()}</td>
                <td><span className="pill">{c.eccedenza}</span></td>
                <td>{c.prospetto}</td>
                <td>{c.categoria}</td>
                <td>
                  <div style={{display:"flex", gap:4}}>
                    <button className="btn ghost sm" onClick={() => setEditing(c)}>✎</button>
                    <button className="btn danger sm" onClick={() => deleteConto(c.codice)}>🗑</button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {(editing || creating) && (
        <ContoForm
          conto={editing}
          existingCodes={conti.map(c => c.codice)}
          onSave={saveConto}
          onCancel={() => { setEditing(null); setCreating(false); }}
        />
      )}
    </div>
  );
}

function ContoForm({ conto, existingCodes, onSave, onCancel }) {
  const isNew = !conto;
  const [codice, setCodice] = useState(conto?.codice || (Math.max(0, ...existingCodes) + 1));
  const [nome, setNome] = useState(conto?.nome || "");
  const [eccedenza, setEccedenza] = useState(conto?.eccedenza || "DARE");
  const [prospetto, setProspetto] = useState(conto?.prospetto || "CE");
  const [categoria, setCategoria] = useState(conto?.categoria || "COSTI");

  const submit = (e) => {
    e.preventDefault();
    if (!nome.trim()) return alert("Nome obbligatorio");
    if (isNew && existingCodes.includes(Number(codice))) return alert("Codice già esistente");
    onSave({ codice: Number(codice), nome: nome.trim(), eccedenza, prospetto, categoria });
  };

  return (
    <div className="modal-bg" onClick={onCancel}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-head">
          <h3>{isNew ? "Nuovo conto" : `Modifica conto ${conto.codice}`}</h3>
          <button className="btn ghost sm" onClick={onCancel}>✕</button>
        </div>
        <div className="modal-body">
          <form className="form-grid" onSubmit={submit}>
            <div className="form-row">
              <label>Codice <span className="req">*</span></label>
              <input type="number" value={codice} onChange={e => setCodice(e.target.value)} disabled={!isNew} required />
            </div>
            <div className="form-row">
              <label>Nome <span className="req">*</span></label>
              <input type="text" value={nome} onChange={e => setNome(e.target.value)} required />
            </div>
            <div className="form-row">
              <label>Eccedenza</label>
              <select value={eccedenza} onChange={e => setEccedenza(e.target.value)}>
                <option>DARE</option>
                <option>AVERE</option>
                <option>DARE/AVERE</option>
              </select>
            </div>
            <div className="form-row">
              <label>Prospetto</label>
              <select value={prospetto} onChange={e => setProspetto(e.target.value)}>
                <option>SP</option>
                <option>CE</option>
                <option>SP/CE</option>
              </select>
            </div>
            <div className="form-row">
              <label>Categoria</label>
              <select value={categoria} onChange={e => setCategoria(e.target.value)}>
                {["DISP. LIQUIDE","CREDITI","DEBITI","IMM. MATERIALI","IMM. IMMATERIALI","RETTIFICA ATTIVO","PN","RICAVI","COSTI","COSTI/RICAVI","CONTO TRANSITORIO"].map(c => <option key={c}>{c}</option>)}
              </select>
            </div>
            <div style={{display:"flex", justifyContent:"flex-end", gap:8, marginTop:12, paddingTop:14, borderTop:"1px solid var(--rule)"}}>
              <button type="button" className="btn ghost" onClick={onCancel}>Annulla</button>
              <button type="submit" className="btn accent">Salva</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// APP ROOT
// ============================================================
function App() {
  const [logged, setLogged] = useState(sessionStorage.getItem(SESSION_KEY) === "1");
  const [stagione, setStagione] = useState(STAGIONE_DEFAULT);
  const [stagioniDisponibili, setStagioniDisponibili] = useState([STAGIONE_DEFAULT]);
  const [page, setPage] = useState("dashboard");
  const [toast, setToast] = useState(null);

  const { conti, movimenti, cespiti, saldiIniziali, loading, seedStagione } = useFirebaseData(stagione);

  // Carica lista stagioni esistenti su Firebase
  useEffect(() => {
    if (!firebaseReady) return;
    const ref = db.ref("stagioni");
    const cb = ref.on("value", snap => {
      const v = snap.val();
      const keys = v ? Object.keys(v) : [];
      const all = [...new Set([STAGIONE_DEFAULT, ...keys])].sort().reverse();
      setStagioniDisponibili(all);
    });
    return () => ref.off("value", cb);
  }, []);

  // Auto-seed quando si seleziona una stagione vuota
  // O auto-reset se trova la vecchia struttura
  useEffect(() => {
    if (!firebaseReady) return;
    (async () => {
      const oldSeedSnap = await db.ref(`stagioni/${stagione}/scrittureSeed`).once("value");
      if (oldSeedSnap.exists()) {
        if (confirm("Rilevati dati della Release 1.0. Aggiornare alla nuova versione con saldi corretti e Libro Giornale? I dati saranno reimportati da zero dallo sheet.")) {
          await db.ref(`stagioni/${stagione}`).remove();
          await seedStagione();
        }
        return;
      }
      // Controlla se i movimenti hanno il campo contoPdC (introdotto in Release 2)
      const movsSnap = await db.ref(`stagioni/${stagione}/movimenti`).once("value");
      if (movsSnap.exists()) {
        const movs = Object.values(movsSnap.val() || {});
        const importati = movs.filter(m => m.importato);
        const senzaPdC = importati.filter(m => m.tipo !== "giroconto" && !m.contoPdC);

        // Trigger per Release 3.2: i movimenti importati hanno una vecchia versione (entrata 4350 IDEA VERDE + 7 prelievi POS al conto 20)
        // Riconosco da: c'è un'entrata con descrizione che contiene "PRELIEVO DA POS PER PAGAMENTI IDEA VERDE"
        const hasOldImport = importati.some(m => m.tipo === "entrata" && (m.descrizione || "").includes("PRELIEVO DA POS PER PAGAMENTI IDEA VERDE"));

        if (importati.length > 0 && senzaPdC.length > 0) {
          if (confirm(`Rilevati ${senzaPdC.length} movimenti importati senza conto P.d.C. (Release 1.1). Aggiornare alla Release 2 con auto-mapping al Piano dei Conti? I movimenti importati verranno ricaricati.`)) {
            const updates = {};
            Object.entries(movsSnap.val() || {}).forEach(([k, m]) => {
              if (m.importato) updates[k] = null;
            });
            await db.ref(`stagioni/${stagione}/movimenti`).update(updates);
            const movsObj = {};
            SEED_MOVIMENTI.forEach((m, i) => {
              movsObj[`seed_${String(i).padStart(4,'0')}`] = {
                ...m, importato: true, creatoIl: new Date().toISOString()
              };
            });
            await db.ref(`stagioni/${stagione}/movimenti`).update(movsObj);
          }
          return;
        }

        if (hasOldImport) {
          if (confirm("Rilevata vecchia versione dei movimenti importati (Release 2/3.0/3.1). Aggiornare alla Release 3.2 con i prelievi POS riclassificati correttamente? I movimenti importati verranno ricaricati (i movimenti che hai creato tu rimangono invariati).")) {
            const updates = {};
            Object.entries(movsSnap.val() || {}).forEach(([k, m]) => {
              if (m.importato) updates[k] = null;
            });
            await db.ref(`stagioni/${stagione}/movimenti`).update(updates);
            const movsObj = {};
            SEED_MOVIMENTI.forEach((m, i) => {
              movsObj[`seed_${String(i).padStart(4,'0')}`] = {
                ...m, importato: true, creatoIl: new Date().toISOString()
              };
            });
            await db.ref(`stagioni/${stagione}/movimenti`).update(movsObj);
          }
        }
        return;
      }
      const contiSnap = await db.ref(`stagioni/${stagione}/conti`).once("value");
      if (!contiSnap.exists() && stagione === STAGIONE_DEFAULT) {
        await seedStagione();
      }
    })();
  }, [stagione]);

  const showToast = (msg, type="success") => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 2400);
  };

  const newStagione = async () => {
    const next = prompt("Nuova stagione (formato YY-YY, es. 26-27):");
    if (!next || !/^\d{2}-\d{2}$/.test(next)) return alert("Formato non valido");
    const key = `20${next.split("-")[0]}-${next.split("-")[1]}`;
    try {
      await db.ref(`stagioni/${key}/meta`).set({ stagione: key, creataIl: new Date().toISOString(), version: APP_VERSION });
      // copia anche piano dei conti dalla stagione corrente
      const contiObj = {};
      conti.forEach(c => { contiObj[`c${c.codice}`] = c; });
      await db.ref(`stagioni/${key}/conti`).set(contiObj);
      setStagione(key);
      showToast(`Stagione ${key} creata`);
    } catch(e) { alert("Errore: " + e.message); }
  };

  if (!logged) return <Login onLogin={() => setLogged(true)} />;

  if (!firebaseReady) {
    return (
      <div className="login-shell">
        <div className="login-card">
          <div className="logo">Configurazione richiesta</div>
          <div className="tag" style={{marginBottom:20}}>Firebase non è ancora configurato.</div>
          <p style={{fontSize:13, lineHeight:1.6, color:"var(--ink-2)"}}>
            Apri il file <span className="mono">index.html</span> e incolla la configurazione Firebase del progetto <span className="mono">contabilita-ffabbrico</span> nel blocco <span className="mono">FIREBASE_CONFIG</span> (è ai primissimi righi dello script). Poi ricarica.
          </p>
        </div>
      </div>
    );
  }

  return (
    <div className="app">
      <div className="topbar">
        <h1>Futsal Fabbrico ASD <span className="sub">— Contabilità</span></h1>
        <span className="badge">Stagione</span>
        <select value={stagione} onChange={e => setStagione(e.target.value)}>
          {stagioniDisponibili.map(s => <option key={s} value={s}>{s}</option>)}
        </select>
        <button className="icon-btn" onClick={newStagione}>+ Nuova stagione</button>
        <button className="icon-btn" onClick={() => { sessionStorage.removeItem(SESSION_KEY); setLogged(false); }}>Esci</button>
      </div>

      <div className="layout">
        <nav className="sidebar">
          <div className="section-label">Operatività</div>
          <button className={"navlink " + (page==="dashboard"?"active":"")} onClick={() => setPage("dashboard")}><span className="ico">◆</span> Dashboard</button>
          <button className={"navlink " + (page==="nuovo"?"active":"")} onClick={() => setPage("nuovo")}><span className="ico">+</span> Nuovo movimento</button>
          <button className={"navlink " + (page==="movimenti"?"active":"")} onClick={() => setPage("movimenti")}><span className="ico">≡</span> Movimenti</button>

          <div className="section-label">Anagrafiche</div>
          <button className={"navlink " + (page==="conti"?"active":"")} onClick={() => setPage("conti")}><span className="ico">▦</span> Piano dei Conti</button>

          <div className="section-label">Reports contabili</div>
          <button className={"navlink " + (page==="libro"?"active":"")} onClick={() => setPage("libro")}><span className="ico">▤</span> Libro Giornale</button>
          <button className={"navlink " + (page==="bilancio"?"active":"")} onClick={() => setPage("bilancio")}><span className="ico">⚖</span> Bilancio Verifica</button>
          <button className={"navlink " + (page==="rf"?"active":"")} onClick={() => setPage("rf")}><span className="ico">≋</span> Rendiconto Fin.</button>
          <button className={"navlink " + (page==="pivot"?"active":"")} onClick={() => setPage("pivot")}><span className="ico">⊞</span> Pivot Conti</button>
          <button className={"navlink " + (page==="snapshot"?"active":"")} onClick={() => setPage("snapshot")}><span className="ico">📸</span> Snapshot mensili</button>
          <button className={"navlink " + (page==="export"?"active":"")} onClick={() => setPage("export")}><span className="ico">↧</span> Export</button>

          <div className="section-label">Gestione</div>
          <button className={"navlink " + (page==="cespiti"?"active":"")} onClick={() => setPage("cespiti")}><span className="ico">▣</span> Cespiti</button>
          <button className={"navlink " + (page==="torneo"?"active":"")} onClick={() => setPage("torneo")}><span className="ico">★</span> Torneo</button>
        </nav>

        <main className="main">
          {loading ? (
            <div className="empty-state">Caricamento dati…</div>
          ) : (
            <>
              {page === "dashboard" && <PageDashboard conti={conti} movimenti={movimenti} saldiIniziali={saldiIniziali} />}
              {page === "nuovo" && <PageNuovo conti={conti} stagione={stagione} onSaved={(msg) => { showToast(msg); setPage("movimenti"); }} onCancel={() => setPage("dashboard")} />}
              {page === "movimenti" && <PageMovimenti conti={conti} movimenti={movimenti} stagione={stagione} onToast={showToast} />}
              {page === "conti" && <PagePianoConti conti={conti} stagione={stagione} onToast={showToast} />}
              {page === "libro" && <PageLibroGiornale conti={conti} movimenti={movimenti} saldiIniziali={saldiIniziali} />}
              {page === "bilancio" && <PageBilancio conti={conti} movimenti={movimenti} saldiIniziali={saldiIniziali} />}
              {page === "rf" && <PageRendiconto conti={conti} movimenti={movimenti} />}
              {page === "pivot" && <PagePivotConti conti={conti} movimenti={movimenti} saldiIniziali={saldiIniziali} />}
              {page === "snapshot" && <PageSnapshot conti={conti} movimenti={movimenti} saldiIniziali={saldiIniziali} stagione={stagione} onToast={showToast} />}
              {page === "export" && <PageExport conti={conti} movimenti={movimenti} saldiIniziali={saldiIniziali} stagione={stagione} />}
              {page === "cespiti" && <PageCespiti cespiti={cespiti} stagione={stagione} onToast={showToast} />}
              {page === "torneo" && <PageTorneo stagione={stagione} onToast={showToast} />}
            </>
          )}
        </main>
      </div>

      {toast && <div className={"toast " + (toast.type || "")}>{toast.msg}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
