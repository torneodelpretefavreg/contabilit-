<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contabilità · Futsal Fabbrico ASD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>
  :root {
    --bg: #f7f6f2;
    --panel: #ffffff;
    --panel-2: #fbfaf6;
    --ink: #1a1a1a;
    --ink-2: #4a4a4a;
    --ink-3: #8a8a82;
    --rule: #e8e6df;
    --rule-2: #d8d5cc;
    --accent: #2d5e3e;       /* verde campo, sobrio */
    --accent-soft: #e8efe9;
    --accent-ink: #1a3d27;
    --gold: #b8954b;
    --danger: #b54343;
    --danger-soft: #fbecec;
    --success: #2d5e3e;
    --warn: #c08020;
    --shadow-sm: 0 1px 2px rgba(20,20,20,0.04), 0 0 0 1px rgba(20,20,20,0.04);
    --shadow-md: 0 4px 16px rgba(20,20,20,0.06), 0 0 0 1px rgba(20,20,20,0.04);
    --shadow-lg: 0 20px 50px rgba(20,20,20,0.12);
    --radius: 6px;
    --radius-lg: 10px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .serif { font-family: 'Fraunces', Georgia, serif; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

  button { font-family: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; font-size: inherit; }

  /* === LAYOUT === */
  .app { min-height: 100vh; display: flex; flex-direction: column; }

  .topbar {
    background: var(--ink);
    color: #f0eee7;
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 24px;
    border-bottom: 1px solid #000;
  }
  .topbar h1 {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 500;
    margin: 0;
    letter-spacing: -0.01em;
    flex: 1;
  }
  .topbar h1 .sub {
    color: #a8a59a;
    margin-left: 12px;
    font-size: 13px;
    font-style: italic;
  }
  .topbar .badge {
    background: #2d2d2d;
    border: 1px solid #3a3a3a;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #c9c7be;
  }
  .topbar select {
    background: #2d2d2d;
    color: #f0eee7;
    border: 1px solid #3a3a3a;
    padding: 5px 10px;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
  }
  .topbar select:hover { border-color: #555; }
  .topbar button.icon-btn {
    background: transparent;
    color: #c9c7be;
    border: 1px solid #3a3a3a;
    padding: 5px 10px;
    border-radius: 4px;
    font-size: 12px;
  }
  .topbar button.icon-btn:hover { background: #2d2d2d; }

  .layout {
    display: flex;
    flex: 1;
    min-height: 0;
  }
  .sidebar {
    width: 220px;
    background: var(--panel);
    border-right: 1px solid var(--rule);
    padding: 24px 12px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .sidebar .section-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-3);
    margin: 18px 14px 6px;
    font-weight: 600;
  }
  .sidebar .section-label:first-child { margin-top: 0; }
  .navlink {
    background: transparent;
    border: none;
    text-align: left;
    padding: 8px 14px;
    border-radius: 4px;
    color: var(--ink-2);
    font-size: 13.5px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: background 0.12s;
  }
  .navlink:hover { background: var(--bg); color: var(--ink); }
  .navlink.active {
    background: var(--ink);
    color: #f0eee7;
  }
  .navlink .ico {
    font-size: 14px;
    width: 16px;
    text-align: center;
    opacity: 0.7;
  }
  .navlink.active .ico { opacity: 1; }

  .main {
    flex: 1;
    min-width: 0;
    padding: 32px 36px;
    overflow-y: auto;
  }

  .page-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 24px;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--rule);
  }
  .page-head h2 {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    font-weight: 500;
    margin: 0;
    letter-spacing: -0.02em;
  }
  .page-head .sub {
    color: var(--ink-3);
    font-size: 13px;
  }

  /* === BUTTONS === */
  .btn {
    background: var(--ink);
    color: #f0eee7;
    border: 1px solid var(--ink);
    padding: 8px 16px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 500;
    transition: all 0.12s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn:hover { background: #000; }
  .btn.ghost {
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--rule-2);
  }
  .btn.ghost:hover { background: var(--bg); border-color: var(--ink-3); }
  .btn.accent {
    background: var(--accent);
    border-color: var(--accent);
  }
  .btn.accent:hover { background: var(--accent-ink); }
  .btn.danger {
    background: transparent;
    color: var(--danger);
    border: 1px solid var(--rule-2);
  }
  .btn.danger:hover { background: var(--danger-soft); border-color: var(--danger); }
  .btn.sm { padding: 5px 10px; font-size: 12px; }

  /* === CARDS === */
  .card {
    background: var(--panel);
    border: 1px solid var(--rule);
    border-radius: var(--radius-lg);
    padding: 20px;
  }
  .card.flat { box-shadow: var(--shadow-sm); }
  .card .card-title {
    font-family: 'Fraunces', serif;
    font-size: 16px;
    font-weight: 500;
    margin: 0 0 14px;
  }

  /* === KPI === */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }
  .kpi {
    background: var(--panel);
    border: 1px solid var(--rule);
    border-radius: var(--radius-lg);
    padding: 18px 20px;
    position: relative;
    overflow: hidden;
  }
  .kpi.accent { background: var(--ink); color: #f0eee7; border-color: var(--ink); }
  .kpi .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-3);
    margin-bottom: 8px;
    font-weight: 600;
  }
  .kpi.accent .label { color: #a8a59a; }
  .kpi .value {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    font-weight: 500;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  .kpi .value.neg { color: var(--danger); }
  .kpi .hint {
    margin-top: 4px;
    font-size: 11.5px;
    color: var(--ink-3);
  }

  /* === TABLE === */
  .tbl-wrap {
    background: var(--panel);
    border: 1px solid var(--rule);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  table.tbl {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  table.tbl th {
    text-align: left;
    padding: 11px 14px;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-3);
    font-weight: 600;
    background: var(--panel-2);
    border-bottom: 1px solid var(--rule);
    position: sticky;
    top: 0;
  }
  table.tbl td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--rule);
    vertical-align: top;
  }
  table.tbl tr:last-child td { border-bottom: none; }
  table.tbl tr:hover td { background: var(--panel-2); }
  table.tbl td.num, table.tbl th.num { text-align: right; font-variant-numeric: tabular-nums; font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 12.5px; }
  table.tbl td.neg { color: var(--danger); }
  table.tbl td.pos { color: var(--success); }
  table.tbl .pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 500;
    background: var(--bg);
    border: 1px solid var(--rule);
    color: var(--ink-2);
  }
  table.tbl .pill.entrata { background: var(--accent-soft); border-color: #c8d8ce; color: var(--accent-ink); }
  table.tbl .pill.uscita { background: var(--danger-soft); border-color: #f1d6d6; color: var(--danger); }
  table.tbl .pill.giroconto { background: #f4ebd7; border-color: #e6d5a8; color: #7a5a1d; }

  .empty-state {
    padding: 40px;
    text-align: center;
    color: var(--ink-3);
    font-style: italic;
  }

  /* === FORM === */
  .form-grid {
    display: grid;
    gap: 14px;
  }
  .form-row {
    display: grid;
    grid-template-columns: 180px 1fr;
    align-items: center;
    gap: 16px;
  }
  .form-row label {
    font-size: 12.5px;
    color: var(--ink-2);
    font-weight: 500;
  }
  .form-row .req { color: var(--danger); }
  input[type=text], input[type=number], input[type=date], input[type=password], select, textarea {
    width: 100%;
    padding: 8px 11px;
    border: 1px solid var(--rule-2);
    border-radius: var(--radius);
    background: var(--panel);
    color: var(--ink);
    transition: border 0.12s;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  textarea { resize: vertical; min-height: 60px; }

  .tipo-switch {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0;
    border: 1px solid var(--rule-2);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .tipo-switch button {
    background: var(--panel);
    color: var(--ink-2);
    border: none;
    border-right: 1px solid var(--rule);
    padding: 10px 12px;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.12s;
  }
  .tipo-switch button:last-child { border-right: none; }
  .tipo-switch button:hover { background: var(--bg); }
  .tipo-switch button.active.entrata { background: var(--accent); color: #fff; }
  .tipo-switch button.active.uscita { background: var(--danger); color: #fff; }
  .tipo-switch button.active.giroconto { background: var(--gold); color: #fff; }

  /* === FILTERS === */
  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 16px;
    align-items: center;
  }
  .filters input, .filters select {
    padding: 6px 10px;
    font-size: 12.5px;
    max-width: 200px;
  }
  .filters .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-3);
    font-weight: 600;
  }

  /* === LOGIN === */
  .login-shell {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(at 20% 30%, var(--accent-soft) 0px, transparent 50%),
      radial-gradient(at 80% 70%, #f4ebd7 0px, transparent 50%),
      var(--bg);
    padding: 24px;
  }
  .login-card {
    background: var(--panel);
    border: 1px solid var(--rule);
    border-radius: 14px;
    padding: 40px 44px;
    max-width: 420px;
    width: 100%;
    box-shadow: var(--shadow-lg);
  }
  .login-card .logo {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 500;
    margin: 0 0 4px;
    letter-spacing: -0.01em;
  }
  .login-card .tag {
    color: var(--ink-3);
    font-size: 12.5px;
    margin-bottom: 28px;
    font-style: italic;
  }
  .login-card .field { margin-bottom: 14px; }
  .login-card .field label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-3);
    margin-bottom: 5px;
    font-weight: 600;
  }
  .login-card .err {
    color: var(--danger);
    background: var(--danger-soft);
    padding: 8px 12px;
    border-radius: var(--radius);
    font-size: 12.5px;
    margin-bottom: 12px;
  }
  .login-card .btn { width: 100%; justify-content: center; padding: 11px; }

  /* === MODAL === */
  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(20,20,20,0.4);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .modal {
    background: var(--panel);
    border-radius: var(--radius-lg);
    max-width: 640px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
  }
  .modal-head {
    padding: 18px 24px;
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-head h3 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    margin: 0;
    font-size: 18px;
  }
  .modal-body { padding: 22px 24px; }
  .modal-foot {
    padding: 14px 24px;
    border-top: 1px solid var(--rule);
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }

  /* === TOAST === */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    padding: 12px 18px;
    background: var(--ink);
    color: #f0eee7;
    border-radius: var(--radius);
    font-size: 13px;
    box-shadow: var(--shadow-lg);
    z-index: 200;
    animation: slideUp 0.2s ease-out;
  }
  .toast.success { background: var(--accent); }
  .toast.error { background: var(--danger); }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* === LIQUIDITY BARS === */
  .liq-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 14px;
  }
  .liq-card {
    background: var(--panel);
    border: 1px solid var(--rule);
    border-radius: var(--radius-lg);
    padding: 18px 20px;
  }
  .liq-card .head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }
  .liq-card .name {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-3);
    font-weight: 600;
  }
  .liq-card .saldo {
    font-family: 'Fraunces', serif;
    font-size: 24px;
    font-weight: 500;
    letter-spacing: -0.02em;
  }
  .liq-card .saldo.neg { color: var(--danger); }
  .liq-card .delta {
    font-size: 11px;
    color: var(--ink-3);
    margin-top: 4px;
    font-variant-numeric: tabular-nums;
  }
  .liq-card .delta .pos { color: var(--success); }
  .liq-card .delta .neg { color: var(--danger); }

  /* === SCROLLBARS === */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--rule-2); border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-3); }

  /* === RESPONSIVE === */
  @media (max-width: 900px) {
    .layout { flex-direction: column; }
    .sidebar { width: 100%; flex-direction: row; flex-wrap: wrap; padding: 12px; overflow-x: auto; }
    .sidebar .section-label { display: none; }
    .navlink { padding: 6px 10px; font-size: 12px; white-space: nowrap; }
    .main { padding: 18px; }
    .form-row { grid-template-columns: 1fr; gap: 6px; }
    .form-row label { font-size: 11px; }
    .page-head h2 { font-size: 22px; }
  }
</style>
</head>

<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

// ============================================================
// CONFIG
// ============================================================
const APP_VERSION = "3.4.0";
const APP_PASSWORD = "futsal26"; // password di accesso all'app
const SESSION_KEY = "ffabb_contab_session";

// Config Firebase progetto contfutsal
const FIREBASE_CONFIG = {

  authDomain: "contfutsal-fad6a.firebaseapp.com",

  projectId: "contfutsal-fad6a",
  storageBucket: "contfutsal-fad6a.firebasestorage.app",
  messagingSenderId: "146841375979",
  appId: "1:146841375979:web:e7a506f9cb1300eccb5aae",
  measurementId: "G-D6LMXTZK1G"
};

// Firebase init – solo se configurato
let db = null;
let firebaseReady = false;
try {
  if (FIREBASE_CONFIG.apiKey !== "TODO") {
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();
    firebaseReady = true;
  }
} catch(e) { console.warn("Firebase non inizializzato:", e); }

// ============================================================
// COSTANTI DI DOMINIO
// ============================================================
const CONTI_LIQUIDITA = [
  { codice: 1, nome: "FUTSAL C/C" },
  { codice: 3, nome: "CASSA" },
  { codice: 4, nome: '"TIZIO" C/C' },
  { codice: 5, nome: "POS C/C" },
  { codice: 9, nome: "PAYPAL C/C" },
  { codice: 10, nome: "SATISPAY C/C" },
];

const BUSINESS_UNITS = ["FUTSAL", "TDP", "GENERAL"];

const MESI = ["settembre","ottobre","novembre","dicembre","gennaio","febbraio","marzo","aprile","maggio","giugno","luglio","agosto"];

// Stagione corrente di default
function stagioneDaData(d) {
  const date = new Date(d);
  const y = date.getFullYear();
  const m = date.getMonth(); // 0-11
  // settembre (8) → nuova stagione
  if (m >= 8) return `${y}-${(y+1).toString().slice(2)}`;
  else return `${y-1}-${y.toString().slice(2)}`;
}
const STAGIONE_DEFAULT = stagioneDaData(new Date());

// ============================================================

const fmt = (n, dec = 2) => {
  if (n === null || n === undefined || isNaN(n)) return "—";
  return Number(n).toLocaleString("it-IT", { minimumFractionDigits: dec, maximumFractionDigits: dec });
};
const fmtEuro = (n) => "€ " + fmt(n);
const fmtDate = (iso) => {
  if (!iso) return "—";
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  return d.toLocaleDateString("it-IT", { day: "2-digit", month: "2-digit", year: "numeric" });
};
const todayISO = () => new Date().toISOString().slice(0,10);
const meseDaData = (iso) => {
  const d = new Date(iso);
  if (isNaN(d)) return "";
  return MESI[(d.getMonth() + 4) % 12]; // settembre=0
};
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);

// ============================================================
// FIREBASE DATA HOOK
// ============================================================
function useFirebaseData(stagione) {
  const [conti, setConti] = useState([]);
  const [movimenti, setMovimenti] = useState([]);
  const [cespiti, setCespiti] = useState([]);
  const [saldiIniziali, setSaldiIniziali] = useState({});
  const [loading, setLoading] = useState(true);
  const [seedingDone, setSeedingDone] = useState(false);

  useEffect(() => {
    if (!firebaseReady || !stagione) { setLoading(false); return; }
    setLoading(true);
    const refs = [
      db.ref(`stagioni/${stagione}/conti`),
      db.ref(`stagioni/${stagione}/movimenti`),
      db.ref(`stagioni/${stagione}/cespiti`),
      db.ref(`stagioni/${stagione}/saldiIniziali`),
    ];
    const cbs = [
      refs[0].on("value", snap => setConti(snap.val() ? Object.values(snap.val()) : [])),
      refs[1].on("value", snap => {
        const v = snap.val();
        setMovimenti(v ? Object.entries(v).map(([k,m]) => ({...m, _id: k})) : []);
      }),
      refs[2].on("value", snap => setCespiti(snap.val() ? Object.values(snap.val()) : [])),
      refs[3].on("value", snap => {
        setSaldiIniziali(snap.val() || {});
        setLoading(false);
      }),
    ];
    return () => refs.forEach((r,i) => r.off("value", cbs[i]));
  }, [stagione]);

  // Seed iniziale se la stagione è vuota
  const seedStagione = useCallback(async () => {
    if (!firebaseReady || !stagione) return;
    const contiSnap = await db.ref(`stagioni/${stagione}/conti`).once("value");
    if (contiSnap.exists()) return;
    // seed
    const contiObj = {};
    SEED_CONTI.forEach(c => { contiObj[`c${c.codice}`] = c; });
    const cespitiObj = {};
    SEED_CESPITI.forEach((c, i) => { cespitiObj[`cesp_${i}`] = c; });
    // i movimenti del seed vengono caricati direttamente in /movimenti, marcati come "importati"
    const movsObj = {};
    SEED_MOVIMENTI.forEach((m, i) => {
      movsObj[`seed_${String(i).padStart(4,'0')}`] = {
        ...m,
        importato: true,
        creatoIl: new Date().toISOString()
      };
    });
    await db.ref(`stagioni/${stagione}`).update({
      conti: contiObj,
      cespiti: cespitiObj,
      movimenti: movsObj,
      saldiIniziali: SALDI_INIZIALI,
      meta: { stagione, creataIl: new Date().toISOString(), version: APP_VERSION, saldiIniziali: SALDI_INIZIALI }
    });
    setSeedingDone(true);
  }, [stagione]);

  return { conti, movimenti, cespiti, saldiIniziali, loading, seedStagione };
}

function Login({ onLogin }) {
  const [pw, setPw] = useState("");
  const [err, setErr] = useState("");
  const submit = (e) => {
    e.preventDefault();
    if (pw === APP_PASSWORD) {
      sessionStorage.setItem(SESSION_KEY, "1");
      onLogin();
    } else {
      setErr("Password errata.");
    }
  };
  return (
    <div className="login-shell">
      <form className="login-card" onSubmit={submit}>
        <div className="logo">Futsal Fabbrico ASD</div>
        <div className="tag">Contabilità · Stagione {STAGIONE_DEFAULT}</div>
        {err && <div className="err">{err}</div>}
        <div className="field">
          <label>Password</label>
          <input type="password" autoFocus value={pw} onChange={e => setPw(e.target.value)} />
        </div>
        <button className="btn accent" type="submit">Entra</button>
        {!firebaseReady && (
          <div style={{marginTop:18, fontSize:11.5, color:"var(--warn)", lineHeight:1.5}}>
            ⚠ Firebase non configurato. Apri <span className="mono">index.html</span> e incolla la config nel blocco <span className="mono">FIREBASE_CONFIG</span>.
          </div>
        )}
      </form>
    </div>
  );
}

      );
    }
    if (tipo === "uscita") {
      return conti.filter(c =>
        ["COSTI", "IMM. MATERIALI", "IMM. IMMATERIALI", "DEBITI", "CREDITI", "COSTI/RICAVI", "CONTO TRANSITORIO"].includes(c.categoria)
      );
    }
    return [];
  }, [conti, tipo]);

  const submit = (e) => {
    e.preventDefault();
    if (!importo || Number(importo) <= 0) return alert("Importo non valido");
    if (tipo === "giroconto") {
      if (!contoLiquidita) return alert("Seleziona conto liquidità origine");
      if (!contoLiquiditaDest) return alert("Seleziona conto destinazione");
      if (contoLiquidita === contoLiquiditaDest) return alert("I conti devono essere diversi");
    } else {
      if (!contoPdC) return alert("Seleziona conto del Piano dei Conti");
      // contoLiquidita opzionale: se vuoto = movimento non monetario (ammortamento, sopravvenienza ecc.)
    }

    const nonMonetario = tipo !== "giroconto" && !contoLiquidita;

    const payload = {
      tipo,
      data,
      contoLiquidita: contoLiquidita ? Number(contoLiquidita) : null,
      contoLiquiditaDest: tipo === "giroconto" ? Number(contoLiquiditaDest) : null,
      contoPdC: tipo !== "giroconto" ? Number(contoPdC) : null,
      categoria: categoria || "",
      bu: bu || "GENERAL",
      importo: Number(importo),
      descrizione: descrizione || "",
      mese: meseDaData(data),
      nonMonetario,
      creatoIl: mov?.creatoIl || new Date().toISOString(),
      modificatoIl: new Date().toISOString()
    };
    onSave(payload);
  };

  return (
    <form onSubmit={submit} className="form-grid">
      <div className="form-row">
        <label>Tipo movimento <span className="req">*</span></label>
        <div className="tipo-switch">
          <button type="button" className={tipo === "entrata" ? "active entrata" : ""} onClick={() => setTipo("entrata")}>↓ Entrata</button>
          <button type="button" className={tipo === "uscita" ? "active uscita" : ""} onClick={() => setTipo("uscita")}>↑ Uscita</button>
          <button type="button" className={tipo === "giroconto" ? "active giroconto" : ""} onClick={() => setTipo("giroconto")}>⇄ Giroconto</button>
        </div>
      </div>
      <div className="form-row">
        <label>Data <span className="req">*</span></label>
        <input type="date" value={data} onChange={e => setData(e.target.value)} required />
      </div>
      <div className="form-row">
        <label>{tipo === "giroconto" ? "Conto origine" : "Conto liquidità"} {tipo === "giroconto" ? <span className="req">*</span> : <span style={{color:"var(--ink-3)",fontSize:11}}>(opzionale)</span>}</label>
        <select value={contoLiquidita} onChange={e => setContoLiquidita(e.target.value)} required={tipo === "giroconto"}>
          <option value="">{tipo === "giroconto" ? "— seleziona —" : "— nessuno (movimento non monetario) —"}</option>
          {CONTI_LIQUIDITA.map(c => <option key={c.codice} value={c.codice}>{c.codice.toString().padStart(2,"0")} · {c.nome}</option>)}
        </select>
      </div>
      {tipo === "giroconto" && (
        <div className="form-row">
          <label>Conto destinazione <span className="req">*</span></label>
          <select value={contoLiquiditaDest} onChange={e => setContoLiquiditaDest(e.target.value)} required>
            <option value="">— seleziona —</option>
            {CONTI_LIQUIDITA.filter(c => c.codice !== Number(contoLiquidita)).map(c => <option key={c.codice} value={c.codice}>{c.codice.toString().padStart(2,"0")} · {c.nome}</option>)}
          </select>
        </div>
      )}
      {tipo !== "giroconto" && (
        <div className="form-row">
          <label>Conto Piano dei Conti <span className="req">*</span></label>
          <select value={contoPdC} onChange={e => setContoPdC(e.target.value)} required>
            <option value="">— seleziona —</option>
            {contiPdCFiltrati.sort((a,b) => a.codice - b.codice).map(c => (
              <option key={c.codice} value={c.codice}>{c.codice.toString().padStart(2,"0")} · {c.nome.trim()} [{c.categoria}]</option>
            ))}
          </select>
        </div>
      )}
      {tipo !== "giroconto" && (
        <>
          <div className="form-row">
            <label>Categoria libera</label>
            <input type="text" value={categoria} onChange={e => setCategoria(e.target.value)} placeholder="es. ONERI CSI" />
          </div>
          <div className="form-row">
            <label>Business Unit</label>
            <select value={bu} onChange={e => setBu(e.target.value)}>
              {BUSINESS_UNITS.map(b => <option key={b} value={b}>{b}</option>)}
            </select>
          </div>
        </>
      )}
      <div className="form-row">
        <label>Importo €  <span className="req">*</span></label>
        <input type="number" step="0.01" min="0" value={importo} onChange={e => setImporto(e.target.value)} required />
      </div>
      <div className="form-row">
        <label>Descrizione</label>
        <textarea value={descrizione} onChange={e => setDescrizione(e.target.value)} placeholder="Motivo / dettaglio operazione" />
      </div>
      <div style={{display:"flex", justifyContent:"flex-end", gap:8, marginTop:12, paddingTop:14, borderTop:"1px solid var(--rule)"}}>
        <button type="button" className="btn ghost" onClick={onCancel}>Annulla</button>
        <button type="submit" className="btn accent">Salva movimento</button>
      </div>
    </form>
  );
}

// PAGINA: DASHBOARD
// ============================================================
function PageDashboard({ conti, movimenti, saldiIniziali }) {
  // Calcola saldi per ogni conto liquidità
  const saldi = useMemo(() => {
    const map = {};
    CONTI_LIQUIDITA.forEach(c => {
      map[c.codice] = {
        iniziale: saldiIniziali[c.codice] || 0,
        entrate: 0,
        uscite: 0,
        entrate_nuove: 0,
        uscite_nuove: 0,
      };
    });
    movimenti.forEach(m => {
      const e = map[m.contoLiquidita];
      if (e) {
        if (m.tipo === "entrata") {
          e.entrate += m.importo;
          if (!m.importato) e.entrate_nuove += m.importo;
        } else if (m.tipo === "uscita") {
          e.uscite += m.importo;
          if (!m.importato) e.uscite_nuove += m.importo;
        } else if (m.tipo === "giroconto") {
          e.uscite += m.importo;
          if (!m.importato) e.uscite_nuove += m.importo;
        }
      }
      if (m.tipo === "giroconto" && map[m.contoLiquiditaDest]) {
        map[m.contoLiquiditaDest].entrate += m.importo;
        if (!m.importato) map[m.contoLiquiditaDest].entrate_nuove += m.importo;
      }
    });
    return map;
  }, [movimenti, saldiIniziali]);

  // KPI: nuove = solo movimenti registrati dall'utente, totale = inclusi gli importati
  const totEntrateNuove = movimenti.filter(m => m.tipo === "entrata" && !m.importato).reduce((s,m) => s + m.importo, 0);
  const totUsciteNuove = movimenti.filter(m => m.tipo === "uscita" && !m.importato).reduce((s,m) => s + m.importo, 0);
  const totEntrate = movimenti.filter(m => m.tipo === "entrata").reduce((s,m) => s + m.importo, 0);
  const totUscite = movimenti.filter(m => m.tipo === "uscita").reduce((s,m) => s + m.importo, 0);
  const liquiditaTotale = Object.values(saldi).reduce((s,v) => s + v.iniziale + v.entrate - v.uscite, 0);

  return (
    <div>
      <div className="page-head">
        <div>
          <h2>Dashboard</h2>
          <div className="sub">Disponibilità reali, entrate e uscite della stagione</div>
        </div>
      </div>

      <div className="kpi-grid">
        <div className="kpi accent">
          <div className="label">Liquidità totale</div>
          <div className="value">{fmtEuro(liquiditaTotale)}</div>
          <div className="hint">Tutti i conti aggregati</div>
        </div>
        <div className="kpi">
          <div className="label">Entrate stagione</div>
          <div className="value" style={{color:"var(--accent)"}}>{fmtEuro(totEntrate)}</div>
          <div className="hint">{totEntrateNuove > 0 ? `di cui ${fmtEuro(totEntrateNuove)} nuove` : `${movimenti.filter(m=>m.tipo==="entrata").length} movimenti`}</div>
        </div>
        <div className="kpi">
          <div className="label">Uscite stagione</div>
          <div className="value" style={{color:"var(--danger)"}}>{fmtEuro(totUscite)}</div>
          <div className="hint">{totUsciteNuove > 0 ? `di cui ${fmtEuro(totUsciteNuove)} nuove` : `${movimenti.filter(m=>m.tipo==="uscita").length} movimenti`}</div>
        </div>
        <div className="kpi">
          <div className="label">Saldo stagione</div>
          <div className={"value " + (totEntrate-totUscite < 0 ? "neg" : "")}>{fmtEuro(totEntrate - totUscite)}</div>
          <div className="hint">Entrate − Uscite</div>
        </div>
      </div>

      <h3 className="serif" style={{fontWeight:500, fontSize:18, margin:"24px 0 12px"}}>Disponibilità per conto</h3>
      <div className="liq-grid">
        {CONTI_LIQUIDITA.map(c => {
          const s = saldi[c.codice];
          const saldoFinale = s.iniziale + s.entrate - s.uscite;
          return (
            <div key={c.codice} className="liq-card">
              <div className="head">
                <span className="name">{c.nome.trim()}</span>
              </div>
              <div className={"saldo " + (saldoFinale < 0 ? "neg" : "")}>{fmtEuro(saldoFinale)}</div>
              <div className="delta">
                Iniziale {fmt(s.iniziale)} ·
                <span className="pos"> +{fmt(s.entrate)}</span> ·
                <span className="neg"> -{fmt(s.uscite)}</span>
              </div>
            </div>
          );
        })}
      </div>

      <div style={{marginTop:24, padding:"16px 20px", background:"var(--panel-2)", border:"1px solid var(--rule)", borderRadius:10, fontSize:12.5, color:"var(--ink-2)"}}>
        <strong>Nota.</strong> I saldi iniziali (al 01/09/2025) provengono dalla riapertura dello sheet originale. I movimenti importati dai fogli ENTRATE NEW / USCITE NEW sono già presenti nella lista <em>Movimenti</em> (badge "importato"). I nuovi movimenti che inserirai si sommano sopra.
      </div>
    </div>
  );
}

function PageNuovo({ conti, stagione, onSaved, onCancel }) {
  const handleSave = async (payload) => {
    if (!firebaseReady) return alert("Firebase non configurato");
    try {
      const ref = db.ref(`stagioni/${stagione}/movimenti`).push();
      await ref.set(payload);
      onSaved("Movimento registrato");
    } catch(e) {
      alert("Errore: " + e.message);
    }
  };
  return (
    <div>
      <div className="page-head">
        <div>
          <h2>Nuovo movimento</h2>
          <div className="sub">Registra un'entrata, un'uscita o un giroconto tra conti</div>
        </div>
      </div>
      <div className="card" style={{maxWidth:760}}>
        <MovimentoForm conti={conti} onSave={handleSave} onCancel={onCancel} />

}

// ============================================================
// PAGINA: LISTA MOVIMENTI
// ============================================================
function PageMovimenti({ conti, movimenti, stagione, onToast }) {
  const [filterTipo, setFilterTipo] = useState("");
  const [filterMese, setFilterMese] = useState("");
  const [filterBu, setFilterBu] = useState("");
  const [filterText, setFilterText] = useState("");
  const [filterOrigine, setFilterOrigine] = useState("");
  const [editing, setEditing] = useState(null);

  const contiMap = useMemo(() => {
    const m = {};
    conti.forEach(c => { m[c.codice] = c; });
    CONTI_LIQUIDITA.forEach(c => { if (!m[c.codice]) m[c.codice] = { codice: c.codice, nome: c.nome }; });
    return m;
  }, [conti]);

  const filtered = useMemo(() => {
    return movimenti
      .filter(m => !filterTipo || m.tipo === filterTipo)
      .filter(m => !filterMese || m.mese === filterMese)
      .filter(m => !filterBu || m.bu === filterBu)
      .filter(m => !filterOrigine || (filterOrigine === "imp" ? m.importato : !m.importato))
      .filter(m => {
        if (!filterText) return true;
        const t = filterText.toLowerCase();
        return (m.descrizione || "").toLowerCase().includes(t)
          || (m.categoria || "").toLowerCase().includes(t);
      })
      .sort((a,b) => (b.data || "").localeCompare(a.data || ""));
  }, [movimenti, filterTipo, filterMese, filterBu, filterText, filterOrigine]);

  const handleEdit = async (payload) => {
    try {
      // doppia conferma se è un movimento importato
      if (editing.importato) {
        if (!confirm(`Stai modificando un movimento IMPORTATO dallo sheet (€${editing.importo}). Procedere?`)) return;
      }
      await db.ref(`stagioni/${stagione}/movimenti/${editing._id}`).set({...payload, importato: editing.importato});
      onToast("Movimento aggiornato");
      setEditing(null);
    } catch(e) { alert("Errore: " + e.message); }
  };

  const handleDelete = async (id) => {
    const mov = movimenti.find(m => m._id === id);
    if (mov?.importato) {
      if (!confirm(`⚠️ Questo è un movimento IMPORTATO dallo sheet:\n\n${mov.descrizione || mov.categoria} · €${mov.importo}\n\nEliminarlo definitivamente?`)) return;
      if (!confirm("Sei davvero sicuro? Questa operazione non può essere annullata.")) return;
    } else {
      if (!confirm("Eliminare definitivamente questo movimento?")) return;
    }
    try {
      await db.ref(`stagioni/${stagione}/movimenti/${id}`).remove();
      onToast("Movimento eliminato");
    } catch(e) { alert("Errore: " + e.message); }
  };

  return (
    <div>
      <div className="page-head">
        <div>
          <h2>Movimenti</h2>
          <div className="sub">{filtered.length} di {movimenti.length} movimenti</div>
        </div>
      </div>

      <div className="filters">
        <span className="label">Filtri:</span>
        <select value={filterTipo} onChange={e => setFilterTipo(e.target.value)}>
          <option value="">Tutti i tipi</option>
          <option value="entrata">Entrate</option>
          <option value="uscita">Uscite</option>
          <option value="giroconto">Giroconti</option>
        </select>
        <select value={filterMese} onChange={e => setFilterMese(e.target.value)}>
          <option value="">Tutti i mesi</option>
          {MESI.map(m => <option key={m} value={m}>{m}</option>)}
        </select>
        <select value={filterBu} onChange={e => setFilterBu(e.target.value)}>
          <option value="">Tutte le BU</option>
          {BUSINESS_UNITS.map(b => <option key={b} value={b}>{b}</option>)}
        </select>
        <select value={filterOrigine} onChange={e => setFilterOrigine(e.target.value)}>
          <option value="">Tutti (imp. + nuovi)</option>
          <option value="new">Solo nuovi</option>
          <option value="imp">Solo importati</option>
        </select>
        <input type="text" placeholder="cerca testo…" value={filterText} onChange={e => setFilterText(e.target.value)} />
        {(filterTipo || filterMese || filterBu || filterText || filterOrigine) && (
          <button className="btn ghost sm" onClick={() => { setFilterTipo(""); setFilterMese(""); setFilterBu(""); setFilterText(""); setFilterOrigine(""); }}>Reset</button>
        )}
      </div>

      <div className="tbl-wrap">
        {filtered.length === 0 ? (
          <div className="empty-state">Nessun movimento{movimenti.length>0 ? " corrispondente ai filtri" : " registrato. Inserisci il primo dal menu →"}</div>
        ) : (
          <table className="tbl">
            <thead>
              <tr>
                <th>Tipo</th>
                <th>Data</th>
                <th>Conto liquidità</th>
                <th>Contropartita</th>
                <th>Descrizione</th>
                <th>BU</th>
                <th className="num">Importo</th>
                <th style={{width:90}}></th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(m => {
                const liq = contiMap[m.contoLiquidita];
                const ctrp = m.tipo === "giroconto"
                  ? `→ ${contiMap[m.contoLiquiditaDest]?.nome.trim() || "?"}`
                  : contiMap[m.contoPdC] ? `${m.contoPdC.toString().padStart(2,"0")} ${contiMap[m.contoPdC].nome.trim()}` : "?";
                return (
                  <tr key={m._id}>
                    <td>
                      <span className={"pill " + m.tipo}>{m.tipo}</span>
                      {m.importato && <span className="pill" style={{marginLeft:4, fontSize:9.5, background:"#f5f0e6", borderColor:"#e6d5a8", color:"#7a5a1d"}}>imp.</span>}
                      {m.nonMonetario && <span className="pill" style={{marginLeft:4, fontSize:9.5, background:"#f0eaff", borderColor:"#d8c8f0", color:"#5a3da8"}}>n.m.</span>}
                    </td>
                    <td>{fmtDate(m.data)}</td>
                    <td>{liq?.nome.trim() || "?"}</td>
                    <td>
                      <div>{ctrp}</div>
                      {m.categoria && <div style={{fontSize:11, color:"var(--ink-3)", marginTop:2}}>{m.categoria}</div>}
                    </td>
                    <td>{m.descrizione || <span style={{color:"var(--ink-3)"}}>—</span>}</td>
                    <td><span className="pill">{m.bu || "—"}</span></td>
                    <td className={"num " + (m.tipo === "uscita" ? "neg" : m.tipo === "entrata" ? "pos" : "")}>
                      {m.tipo === "uscita" ? "−" : m.tipo === "entrata" ? "+" : "⇄"} {fmt(m.importo)}
                    </td>
                    <td>
                      <div style={{display:"flex", gap:4}}>
                        <button className="btn ghost sm" onClick={() => setEditing(m)}>✎</button>
                        <button className="btn danger sm" onClick={() => handleDelete(m._id)}>🗑</button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </div>

      {editing && (
        <div className="modal-bg" onClick={() => setEditing(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-head">
              <h3>Modifica movimento</h3>
              <button className="btn ghost sm" onClick={() => setEditing(null)}>✕</button>
            </div>
            <div className="modal-body">
              <MovimentoForm conti={conti} mov={editing} onSave={handleEdit} onCancel={() => setEditing(null)} />
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ============================================================
// UTILITY CONTABILI: genera Libro Giornale da movimenti
// ============================================================
function generaLibroGiornale(movimenti, saldiIniziali, contiMap) {
  const scritture = [];

  // Scrittura di apertura: BILANCIO DI APERTURA in AVERE, conti liquidità in DARE
  const totApertura = Object.values(saldiIniziali).reduce((s, v) => s + (v || 0), 0);
  if (totApertura > 0) {
    const righeApertura = [];
    Object.entries(saldiIniziali).forEach(([cod, v]) => {
      if (v && v !== 0) {
        const c = contiMap[cod];
        righeApertura.push({
          codice: Number(cod),
          nome: c?.nome || `Conto ${cod}`,
          dare: v > 0 ? v : 0,
          avere: v < 0 ? -v : 0,
        });
      }
    });
    righeApertura.push({
      codice: 60,
      nome: "BILANCIO DI APERTURA",
      dare: 0,
      avere: totApertura,
    });
    scritture.push({
      data: "2025-09-01",
      descrizione: "Riapertura saldi iniziali",
      righe: righeApertura,
      auto: true,
      origine: "apertura"
    });
  }

  // Per ogni movimento → scrittura partita doppia
  movimenti.forEach(m => {
    const liq = m.contoLiquidita ? contiMap[m.contoLiquidita] : null;
    // Se non c'è conto liquidità e non è un giroconto: scrittura "non monetaria"
    // serve almeno un secondo conto. Per ora usiamo categoria → conto di contropartita generico
    // o se mancante, saltiamo
    if (m.tipo === "entrata" && m.contoPdC) {
      if (!liq) {
        // movimento non monetario in entrata: lo trattiamo come rettifica con contropartita 35 SOPRAVVENIENZE ATTIVE di default
        scritture.push({
          data: m.data,
          descrizione: m.descrizione || `Entrata non monetaria ${m.categoria || ''}`.trim(),
          righe: [
            { codice: m.contoPdC, nome: contiMap[m.contoPdC]?.nome || "?", dare: m.importo, avere: 0 },
            { codice: 35, nome: "SOPRAVVENIENZE ATTIVE", dare: 0, avere: m.importo },
          ],
          auto: true, origine: m._id || "mov", movId: m._id, nonMonetario: true,
        });
      } else {
        const pdc = contiMap[m.contoPdC];
        scritture.push({
          data: m.data,
          descrizione: m.descrizione || `Entrata ${m.categoria || ''}`.trim(),
          righe: [
            { codice: m.contoLiquidita, nome: liq.nome || "?", dare: m.importo, avere: 0 },
            { codice: m.contoPdC, nome: pdc?.nome || "?", dare: 0, avere: m.importo },
          ],
          auto: true, origine: m._id || "mov", movId: m._id,
        });
      }
    } else if (m.tipo === "uscita" && m.contoPdC) {
      if (!liq) {
        // movimento non monetario in uscita (es. ammortamento): DARE costo / AVERE fondo
        // se il conto è un AMMORTAMENTO (codici 44-51) → contropartita = fondo (52-59)
        // altrimenti contropartita generica 60 BILANCIO o lasciamo a "Sopravvenienze passive"
        let contropartitaCod = 60; // BILANCIO DI APERTURA (transitorio)
        let contropartitaNome = "BILANCIO DI APERTURA";
        // Mappa ammortamento → fondo
        const ammoMap = {44:52, 45:53, 46:54, 47:55, 48:56, 49:57, 50:58, 51:59};
        if (ammoMap[m.contoPdC]) {
          contropartitaCod = ammoMap[m.contoPdC];
          contropartitaNome = contiMap[contropartitaCod]?.nome || "FONDO AMM.TO";
        }
        scritture.push({
          data: m.data,
          descrizione: m.descrizione || `Scrittura non monetaria ${m.categoria || ''}`.trim(),
          righe: [
            { codice: m.contoPdC, nome: contiMap[m.contoPdC]?.nome || "?", dare: m.importo, avere: 0 },
            { codice: contropartitaCod, nome: contropartitaNome, dare: 0, avere: m.importo },
          ],
          auto: true, origine: m._id || "mov", movId: m._id, nonMonetario: true,
        });
      } else {
        const pdc = contiMap[m.contoPdC];
        scritture.push({
          data: m.data,
          descrizione: m.descrizione || `Uscita ${m.categoria || ''}`.trim(),
          righe: [
            { codice: m.contoPdC, nome: pdc?.nome || "?", dare: m.importo, avere: 0 },
            { codice: m.contoLiquidita, nome: liq.nome || "?", dare: 0, avere: m.importo },
          ],
          auto: true, origine: m._id || "mov", movId: m._id,
        });
      }
    } else if (m.tipo === "giroconto") {
      const dest = contiMap[m.contoLiquiditaDest];
      scritture.push({
        data: m.data,
        descrizione: m.descrizione || "Giroconto",
        righe: [
          { codice: m.contoLiquiditaDest, nome: dest?.nome || "?", dare: m.importo, avere: 0 },
          { codice: m.contoLiquidita, nome: liq?.nome || "?", dare: 0, avere: m.importo },
        ],
        auto: true, origine: m._id || "mov", movId: m._id,
      });
    }
  });

  // Ordina per data
  scritture.sort((a, b) => (a.data || "").localeCompare(b.data || ""));
  return scritture;
}

// Calcola mastrini (somma DARE/AVERE per conto)
function calcolaMastrini(scritture) {
  const m = {};
  scritture.forEach(s => {
    s.righe.forEach(r => {
      if (!m[r.codice]) m[r.codice] = { codice: r.codice, nome: r.nome, dare: 0, avere: 0 };
      m[r.codice].dare += r.dare || 0;
      m[r.codice].avere += r.avere || 0;
    });
  });
  return Object.values(m).map(x => ({...x, saldo: x.dare - x.avere}));
}

// ============================================================
// PAGINA: LIBRO GIORNALE (con tab Cronologico e Mastrini)
// ============================================================
function PageLibroGiornale({ conti, movimenti, saldiIniziali }) {
  const [tab, setTab] = useState("cron"); // cron | mastrino
  const [contoMastrino, setContoMastrino] = useState("");

  const contiMap = useMemo(() => {
    const m = {};
    conti.forEach(c => { m[c.codice] = c; });
    CONTI_LIQUIDITA.forEach(c => { if (!m[c.codice]) m[c.codice] = { codice: c.codice, nome: c.nome }; });
    return m;
  }, [conti]);

  const scritture = useMemo(
    () => generaLibroGiornale(movimenti, saldiIniziali, contiMap),
    [movimenti, saldiIniziali, contiMap]
  );

  const totD = scritture.reduce((s, sc) => s + sc.righe.reduce((sr, r) => sr + (r.dare || 0), 0), 0);
  const totA = scritture.reduce((s, sc) => s + sc.righe.reduce((sr, r) => sr + (r.avere || 0), 0), 0);
  const quadrato = Math.abs(totD - totA) < 0.01;

  // Conti che hanno movimenti, per popolare il dropdown
  const contiConMovimenti = useMemo(() => {
    const set = new Set();
    scritture.forEach(s => s.righe.forEach(r => set.add(r.codice)));
    return [...set].map(c => contiMap[c] || {codice: c, nome: `Conto ${c}`}).sort((a,b) => a.codice - b.codice);
  }, [scritture, contiMap]);

  // Mastrino del conto selezionato, raggruppato per mese
  const mastrinoPerMese = useMemo(() => {
    if (!contoMastrino) return null;
    const cod = Number(contoMastrino);
    const righe = []; // tutte le righe del conto, con data e descrizione
    scritture.forEach(s => {
      s.righe.forEach(r => {
        if (r.codice === cod) {
          righe.push({
            data: s.data,
            descrizione: s.descrizione,
            dare: r.dare || 0,
            avere: r.avere || 0,
            origine: s.origine,
            apertura: s.origine === "apertura",
          });
        }
      });
    });
    // Ordino per data
    righe.sort((a,b) => (a.data || "").localeCompare(b.data || ""));
    // Raggruppo per mese (uso MESI con anno settembre-dicembre 2025, gen-ago 2026)
    const gruppi = {};
    MESI.forEach((m, i) => {
      const anno = i <= 3 ? 2025 : 2026;
      const mNum = i <= 3 ? i + 9 : i - 3;
      const key = `${anno}-${String(mNum).padStart(2,"0")}`;
      gruppi[key] = { mese: m, anno, key, righe: [], totDare: 0, totAvere: 0 };
    });
    righe.forEach(r => {
      const key = r.data ? r.data.slice(0,7) : "?";
      if (!gruppi[key]) {
        // fuori range, lo aggiungo a parte
        gruppi[key] = { mese: "—", anno: "?", key, righe: [], totDare: 0, totAvere: 0 };
      }
      gruppi[key].righe.push(r);
      gruppi[key].totDare += r.dare;
      gruppi[key].totAvere += r.avere;
    });

    // Saldo progressivo
    let saldoProg = 0;
    const gruppiArr = Object.values(gruppi).sort((a,b) => a.key.localeCompare(b.key));
    gruppiArr.forEach(g => {
      g.righe.forEach(r => {
        saldoProg += (r.dare - r.avere);
        r.saldoProg = saldoProg;
      });
      g.saldoFineMese = saldoProg;
    });

    const totDare = gruppiArr.reduce((s,g) => s + g.totDare, 0);
    const totAvere = gruppiArr.reduce((s,g) => s + g.totAvere, 0);

    return { gruppi: gruppiArr, totDare, totAvere, saldoFinale: totDare - totAvere };
  }, [contoMastrino, scritture]);

  return (
    <div>
      <div className="page-head">
        <div>
          <h2>Libro Giornale</h2>
          <div className="sub">{scritture.length} scritture · vista cronologica o per conto (mastrino)</div>
        </div>
        <div style={{display:"flex", gap:8, alignItems:"baseline"}}>
          <span className="mono" style={{fontSize:12.5, color:"var(--ink-3)"}}>
            Σ DARE {fmt(totD)} · Σ AVERE {fmt(totA)}
          </span>
          <span className="pill" style={{background: quadrato ? "var(--accent-soft)" : "var(--danger-soft)", borderColor: quadrato ? "#c8d8ce" : "#f1d6d6", color: quadrato ? "var(--accent-ink)" : "var(--danger)"}}>
            {quadrato ? "✓ Quadrato" : "✗ Sbilanciato"}
          </span>
        </div>
      </div>

      <div className="tipo-switch" style={{maxWidth:420, marginBottom:18}}>
        <button type="button" className={tab === "cron" ? "active entrata" : ""} onClick={() => setTab("cron")}>▤ Cronologico</button>
        <button type="button" className={tab === "mastrino" ? "active entrata" : ""} onClick={() => setTab("mastrino")}>▦ Mastrini per conto</button>
      </div>

      {tab === "cron" && (
        <div className="tbl-wrap" style={{maxHeight:"calc(100vh - 280px)", overflowY:"auto"}}>
          <table className="tbl">
            <thead>
              <tr>
                <th style={{width:90}}>Data</th>
                <th style={{width:50}}>Cod.</th>
                <th>Conto</th>
                <th>Descrizione</th>
                <th className="num" style={{width:110}}>Dare</th>
                <th className="num" style={{width:110}}>Avere</th>
              </tr>
            </thead>
            <tbody>
              {scritture.map((s, idx) => (
                <React.Fragment key={idx}>
                  {s.righe.map((r, ri) => (
                    <tr key={`${idx}-${ri}`} style={ri === 0 ? {borderTop:"2px solid var(--rule-2)"} : {}}>
                      <td>{ri === 0 ? fmtDate(s.data) : ""}</td>
                      <td className="mono" style={{fontWeight:600}}>{String(r.codice).padStart(2,"0")}</td>
                      <td>{r.nome.trim()}</td>
                      <td>{ri === 0 ? s.descrizione : ""}</td>
                      <td className="num">{r.dare > 0 ? fmt(r.dare) : ""}</td>
                      <td className="num">{r.avere > 0 ? fmt(r.avere) : ""}</td>
                    </tr>
                  ))}
                </React.Fragment>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {tab === "mastrino" && (
        <div>
          <div className="filters">
            <span className="label">Conto:</span>
            <select value={contoMastrino} onChange={e => setContoMastrino(e.target.value)} style={{maxWidth:380}}>
              <option value="">— seleziona un conto —</option>
              {contiConMovimenti.map(c => (
                <option key={c.codice} value={c.codice}>
                  {String(c.codice).padStart(2,"0")} · {c.nome.trim()} {c.categoria ? `[${c.categoria}]` : ""}
                </option>
              ))}
            </select>
          </div>

          {!contoMastrino && (
            <div className="empty-state" style={{padding:60}}>
              Seleziona un conto dal menu sopra per visualizzare il mastrino mese per mese
            </div>
          )}

          {contoMastrino && mastrinoPerMese && (
            <>
              <div className="kpi-grid" style={{marginBottom:18}}>
                <div className="kpi">
                  <div className="label">Totale DARE</div>
                  <div className="value">{fmtEuro(mastrinoPerMese.totDare)}</div>
                </div>
                <div className="kpi">
                  <div className="label">Totale AVERE</div>
                  <div className="value">{fmtEuro(mastrinoPerMese.totAvere)}</div>
                </div>
                <div className="kpi accent">
                  <div className="label">Saldo finale</div>
                  <div className="value">{fmtEuro(Math.abs(mastrinoPerMese.saldoFinale))}</div>
                  <div className="hint">{mastrinoPerMese.saldoFinale > 0 ? "eccedenza DARE" : mastrinoPerMese.saldoFinale < 0 ? "eccedenza AVERE" : "in pareggio"}</div>
                </div>
              </div>

              {mastrinoPerMese.gruppi.filter(g => g.righe.length > 0).map((g, gi) => (
                <div key={g.key} style={{
                  marginBottom: 28,
                  background: gi % 2 === 0 ? "var(--panel)" : "var(--panel-2)",
                  border: "1px solid var(--rule)",
                  borderLeft: "4px solid var(--accent)",
                  borderRadius: "var(--radius-lg)",
                  padding: "18px 20px",
                  boxShadow: "var(--shadow-sm)",
                }}>
                  <div style={{display:"flex", alignItems:"baseline", justifyContent:"space-between", marginBottom:12, paddingBottom:10, borderBottom:"1px solid var(--rule-2)"}}>
                    <h3 className="serif" style={{fontWeight:500, fontSize:18, margin:0, textTransform:"capitalize", letterSpacing:"-0.01em"}}>
                      {g.mese} <span style={{color:"var(--ink-3)", fontWeight:400}}>{g.anno}</span>
                    </h3>
                    <div style={{display:"flex", gap:14, alignItems:"baseline", fontSize:12}}>
                      <span style={{color:"var(--ink-3)"}}>{g.righe.length} {g.righe.length === 1 ? "movimento" : "movimenti"}</span>
                      <span className="mono" style={{color:"var(--ink-2)"}}>D {fmt(g.totDare)}</span>
                      <span className="mono" style={{color:"var(--ink-2)"}}>A {fmt(g.totAvere)}</span>
                      <span className="pill" style={{
                        fontWeight:600,
                        background: g.saldoFineMese < 0 ? "var(--danger-soft)" : "var(--accent-soft)",
                        borderColor: g.saldoFineMese < 0 ? "#f1d6d6" : "#c8d8ce",
                        color: g.saldoFineMese < 0 ? "var(--danger)" : "var(--accent-ink)",
                      }}>
                        Saldo {fmt(Math.abs(g.saldoFineMese))} {g.saldoFineMese < 0 ? "A" : "D"}
                      </span>
                    </div>
                  </div>
                  <table className="tbl" style={{background:"transparent"}}>
                    <thead>
                      <tr>
                        <th style={{width:90, background:"transparent"}}>Data</th>
                        <th style={{background:"transparent"}}>Descrizione</th>
                        <th className="num" style={{width:110, background:"transparent"}}>Dare</th>
                        <th className="num" style={{width:110, background:"transparent"}}>Avere</th>
                        <th className="num" style={{width:110, background:"transparent"}}>Saldo prog.</th>
                      </tr>
                    </thead>
                    <tbody>
                      {g.righe.map((r, i) => (
                        <tr key={i} style={r.apertura ? {background:"#fdf8e6"} : {}}>
                          <td>{fmtDate(r.data)}</td>
                          <td>{r.descrizione}{r.apertura && <span className="pill" style={{marginLeft:8, fontSize:10, background:"#f4ebd7", borderColor:"#e6d5a8", color:"#7a5a1d"}}>apertura</span>}</td>
                          <td className="num">{r.dare > 0 ? fmt(r.dare) : ""}</td>
                          <td className="num">{r.avere > 0 ? fmt(r.avere) : ""}</td>
                          <td className={"num " + (r.saldoProg < 0 ? "neg" : r.saldoProg > 0 ? "pos" : "")} style={{fontWeight:500}}>
                            {fmt(Math.abs(r.saldoProg))} {r.saldoProg < 0 ? "A" : r.saldoProg > 0 ? "D" : ""}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              ))}
            </>
          )}
        </div>
      )}
    </div>
  );
}

// PAGINA: SNAPSHOT MENSILI (chiusure)
// ============================================================
function PageSnapshot({ conti, movimenti, saldiIniziali, stagione, onToast }) {
  const [snapshots, setSnapshots] = useState([]);
  const [viewing, setViewing] = useState(null);

  const contiMap = useMemo(() => {
    const m = {};
    conti.forEach(c => { m[c.codice] = c; });
    CONTI_LIQUIDITA.forEach(c => { if (!m[c.codice]) m[c.codice] = { codice: c.codice, nome: c.nome }; });
    return m;
  }, [conti]);

  // Carica snapshot da Firebase
  useEffect(() => {
    if (!firebaseReady) return;
    const ref = db.ref(`stagioni/${stagione}/snapshots`);
    const cb = ref.on("value", snap => {
      const v = snap.val();
      setSnapshots(v ? Object.entries(v).map(([k,s]) => ({...s, _key: k})).sort((a,b) => (b.key || "").localeCompare(a.key || "")) : []);
    });
    return () => ref.off("value", cb);
  }, [stagione]);

  // Lista dei mesi con movimenti
  const mesiDisponibili = useMemo(() => {
    const set = new Set();
    movimenti.forEach(m => { if (m.data) set.add(m.data.slice(0,7)); });
    return [...set].sort();
  }, [movimenti]);

  const giaChiusi = useMemo(() => new Set(snapshots.map(s => s.key)), [snapshots]);
  const daChiudere = mesiDisponibili.filter(m => !giaChiusi.has(m));

  const calcolaSaldiAlla = (yearMonth) => {
    // Movimenti fino e incluso il mese yearMonth (YYYY-MM)
    const movsFiltered = movimenti.filter(m => m.data && m.data.slice(0,7) <= yearMonth);
    const scritture = generaLibroGiornale(movsFiltered, saldiIniziali, contiMap);

    const liq = {};
    CONTI_LIQUIDITA.forEach(c => { liq[c.codice] = saldiIniziali[c.codice] || 0; });
    movsFiltered.forEach(m => {
      if (m.tipo === "entrata" && liq[m.contoLiquidita] !== undefined) liq[m.contoLiquidita] += m.importo;
      else if (m.tipo === "uscita" && liq[m.contoLiquidita] !== undefined) liq[m.contoLiquidita] -= m.importo;
      else if (m.tipo === "giroconto") {
        if (liq[m.contoLiquidita] !== undefined) liq[m.contoLiquidita] -= m.importo;
        if (liq[m.contoLiquiditaDest] !== undefined) liq[m.contoLiquiditaDest] += m.importo;
      }
    });

    // mastrini di tutti i conti
    const mastrini = calcolaMastrini(scritture).filter(m => m.dare > 0 || m.avere > 0);

    // KPI CE
    const ricavi = mastrini.filter(m => contiMap[m.codice]?.categoria === "RICAVI").reduce((s,m) => s + m.avere - m.dare, 0);
    const costi = mastrini.filter(m => ["COSTI","COSTI/RICAVI"].includes(contiMap[m.codice]?.categoria)).reduce((s,m) => s + m.dare - m.avere, 0);

    return {
      liquidita: liq,
      totaleLiquidita: Object.values(liq).reduce((s,v) => s + v, 0),
      ricavi, costi, utile: ricavi - costi,
      nMovimenti: movsFiltered.length,
      mastrini: mastrini.map(m => ({ codice: m.codice, nome: m.nome, dare: m.dare, avere: m.avere, saldo: m.dare - m.avere })),
    };
  };

  const creaSnapshot = async (yearMonth) => {
    if (!confirm(`Creare lo snapshot al ${yearMonth}? Verranno salvati i saldi correnti come fotografia.`)) return;
    try {
      const dati = calcolaSaldiAlla(yearMonth);
      const snapshot = {
        key: yearMonth,
        anno: Number(yearMonth.slice(0,4)),
        mese: Number(yearMonth.slice(5,7)),
        creatoIl: new Date().toISOString(),
        ...dati,
      };
      await db.ref(`stagioni/${stagione}/snapshots/snap_${yearMonth}`).set(snapshot);
      onToast(`Snapshot ${yearMonth} creato`);
    } catch(e) { alert("Errore: " + e.message); }
  };

  const ricreaSnapshot = async (snap) => {
    if (!confirm(`Ricalcolare lo snapshot ${snap.key} con i dati attuali? Verrà sovrascritto.`)) return;
    try {
      const dati = calcolaSaldiAlla(snap.key);
      const updated = { ...snap, ...dati, creatoIl: new Date().toISOString() };
      delete updated._key;
      await db.ref(`stagioni/${stagione}/snapshots/${snap._key}`).set(updated);
      onToast(`Snapshot ${snap.key} aggiornato`);
    } catch(e) { alert("Errore: " + e.message); }
  };

  const eliminaSnapshot = async (snap) => {
    if (!confirm(`Eliminare lo snapshot ${snap.key}?`)) return;
    await db.ref(`stagioni/${stagione}/snapshots/${snap._key}`).remove();
    onToast("Snapshot eliminato");
  };

  const fmtYM = (ym) => {
    if (!ym) return "—";
    const [y,m] = ym.split("-");
    const mesi = ["gen","feb","mar","apr","mag","giu","lug","ago","set","ott","nov","dic"];
    return `${mesi[Number(m)-1]} ${y}`;
  };

  return (
    <div>
      <div className="page-head">
        <div>
          <h2>Snapshot mensili</h2>
          <div className="sub">Fotografia dei saldi a fine mese · {snapshots.length} chiusure salvate</div>
        </div>
      </div>

      {daChiudere.length > 0 && (
        <div className="card" style={{marginBottom:20}}>
          <h3 className="card-title">📸 Crea nuovo snapshot</h3>
          <p style={{fontSize:13, color:"var(--ink-2)", margin:"0 0 12px"}}>Mesi con movimenti ma non ancora chiusi:</p>
          <div style={{display:"flex", flexWrap:"wrap", gap:8}}>
            {daChiudere.map(ym => (
              <button key={ym} className="btn ghost sm" onClick={() => creaSnapshot(ym)}>
                + {fmtYM(ym)}
              </button>
            ))}
          </div>
        </div>
      )}

      {snapshots.length === 0 ? (
        <div className="empty-state" style={{padding:60}}>
          Nessuno snapshot ancora salvato. Crea il primo selezionando un mese qui sopra.
        </div>
      ) : (
        <>
          <h3 className="serif" style={{fontWeight:500, fontSize:18, margin:"0 0 12px"}}>Storico chiusure</h3>
          <div className="tbl-wrap">
            <table className="tbl">
              <thead>
                <tr>
                  <th>Mese</th>
                  <th className="num">Liquidità tot.</th>
                  {CONTI_LIQUIDITA.map(c => <th key={c.codice} className="num" style={{fontSize:9.5}}>{c.nome.trim().slice(0,10)}</th>)}
                  <th className="num">Ricavi</th>
                  <th className="num">Costi</th>
                  <th className="num">Utile</th>
                  <th>Creato</th>
                  <th style={{width:120}}></th>
                </tr>
              </thead>
              <tbody>
                {snapshots.map(s => (
                  <tr key={s._key}>
                    <td style={{fontWeight:600, textTransform:"capitalize"}}>{fmtYM(s.key)}</td>
                    <td className="num" style={{fontWeight:600}}>{fmt(s.totaleLiquidita)}</td>
                    {CONTI_LIQUIDITA.map(c => (
                      <td key={c.codice} className="num">{s.liquidita?.[c.codice] ? fmt(s.liquidita[c.codice]) : "—"}</td>
                    ))}
                    <td className="num pos">{fmt(s.ricavi)}</td>
                    <td className="num neg">{fmt(s.costi)}</td>
                    <td className={"num " + (s.utile < 0 ? "neg" : "pos")} style={{fontWeight:600}}>{fmt(s.utile)}</td>
                    <td style={{fontSize:11, color:"var(--ink-3)"}}>{s.creatoIl ? new Date(s.creatoIl).toLocaleDateString("it-IT") : "—"}</td>
                    <td>
                      <div style={{display:"flex", gap:4}}>
                        <button className="btn ghost sm" onClick={() => setViewing(s)} title="Vedi dettaglio">👁</button>
                        <button className="btn ghost sm" onClick={() => ricreaSnapshot(s)} title="Ricalcola">↻</button>
                        <button className="btn danger sm" onClick={() => eliminaSnapshot(s)} title="Elimina">🗑</button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </>
      )}

      <div style={{marginTop:18, padding:"12px 16px", background:"var(--panel-2)", border:"1px solid var(--rule)", borderRadius:8, fontSize:12, color:"var(--ink-2)"}}>
        <strong>💡 Cosa fa lo snapshot.</strong> Cattura una fotografia di tutti i saldi (liquidità, mastrini, ricavi/costi/utile) al termine di un dato mese. Non blocca i movimenti: se modifichi qualcosa, puoi premere ↻ per ricalcolare lo snapshot con i nuovi dati. Utile per confronti mese-su-mese e per allineare la contabilità ai bilanci ufficiali.
      </div>

      {viewing && (() => {
        // calcolo SP/CE sintetico
        const mastrini = viewing.mastrini || [];
        const spVoci = mastrini.filter(m => {
          const cat = contiMap[m.codice]?.categoria || "";
          const pros = contiMap[m.codice]?.prospetto || "";
          return pros === "SP" || pros === "SP/CE";
        });
        const ceVoci = mastrini.filter(m => {
          const pros = contiMap[m.codice]?.prospetto || "";
          return pros === "CE" || pros === "SP/CE";
        });
        const attivo = spVoci.filter(m => m.saldo > 0).reduce((s,m) => s+m.saldo, 0);
        const passivo = spVoci.filter(m => m.saldo < 0).reduce((s,m) => s-m.saldo, 0); // positivo
        const totD = mastrini.reduce((s,m) => s + m.dare, 0);

                        <td>{contiMap[m.codice]?.prospetto || "—"}</td>

                        <tr style={{borderTop:"2px solid var(--ink)", fontWeight:600, background:"var(--panel-2)"}}>

                        </tr>
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>

            </div>
          </div>
        </div>
        );
      })()}
    </div>
  );
}
