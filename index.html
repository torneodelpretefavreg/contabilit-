/* ============================================================
   PAGINA: SNAPSHOT MENSILE  (saldo conti liquidi a fine mese)
   ============================================================ */
function PageSnapshot({scritture}){
  const snap = useMemo(()=>{
    const mset=new Set();
    scritture.forEach(s=>{ const k=rfMonthKey(s.data); if(k) mset.add(k); });
    const mesi=[...mset].sort();
    const perConto={};
    LIQ_CODES.forEach(cod=>{
      const delta={};
      scritture.forEach(s=>{ const k=rfMonthKey(s.data); if(!k) return;
        const d=s.righe.filter(r=>r.c===cod).reduce((x,r)=>x+(r.d||0)-(r.a||0),0);
        if(d) delta[k]=r2((delta[k]||0)+d);
      });
      let cum=0; const bal={}, varz={};
      mesi.forEach(k=>{ const prev=cum; cum=r2(cum+(delta[k]||0)); bal[k]=cum; varz[k]=r2(cum-prev); });
      perConto[cod]={bal,varz};
    });
    const totBal={}, totVar={};
    mesi.forEach(k=>{ totBal[k]=r2(LIQ_CODES.reduce((s,c)=>s+(perConto[c].bal[k]||0),0)); totVar[k]=r2(LIQ_CODES.reduce((s,c)=>s+(perConto[c].varz[k]||0),0)); });
    return {mesi,perConto,totBal,totVar};
  },[scritture]);

  const [mostraVar,setMostraVar]=useState(false);
  const {mesi,perConto,totBal,totVar}=snap;
  const ultimo = mesi[mesi.length-1];

  return (
    <div>
      <PageHead title="Snapshot mensile" sub="Situazione dei conti liquidi alla fine di ogni mese">
        <button className={'btn '+(mostraVar?'accent':'ghost')} onClick={()=>setMostraVar(v=>!v)}>{mostraVar?'Mostra saldi':'Mostra variazioni'}</button>
      </PageHead>

      {ultimo &&
        <div className="kpi-grid">
          {LIQ_CODES.map(cod=>(
            <Kpi key={cod} label={contoByCode[cod].nome} value={eur(perConto[cod].bal[ultimo]||0)} hint={`a fine ${rfMonthLabel(ultimo)}`}/>
          ))}
          <Kpi accent label="Totale liquidità" value={eur(totBal[ultimo]||0)} hint={`a fine ${rfMonthLabel(ultimo)}`}/>
        </div>}

      <div className="tbl-wrap">
        <table className="tbl rf-matrix">
          <thead><tr><th className="rf-voce">Conto</th>{mesi.map(k=><th key={k} className="num">{rfMonthLabel(k)}</th>)}</tr></thead>
          <tbody>
            {LIQ_CODES.map(cod=>(
              <tr key={cod} className="rf-row">
                <td className="rf-voce">{contoByCode[cod].nome}</td>
                {mesi.map(k=>{ const v=mostraVar?perConto[cod].varz[k]:perConto[cod].bal[k];
                  return <td key={k} className={'num '+(mostraVar&&v<0?'neg':mostraVar&&v>0?'pos':'')}>{mostraVar&&v>0?'+':''}{num2(v||0)}</td>; })}
              </tr>
            ))}
            <tr className="rf-tot strong">
              <td className="rf-voce">Totale liquidità</td>
              {mesi.map(k=>{ const v=mostraVar?totVar[k]:totBal[k];
                return <td key={k} className={'num '+(mostraVar&&v<0?'neg':mostraVar&&v>0?'pos':'')}>{mostraVar&&v>0?'+':''}{num2(v||0)}</td>; })}
            </tr>
          </tbody>
        </table>
      </div>
      <div style={{fontSize:12,color:'var(--ink-3)',marginTop:10,fontStyle:'italic'}}>
        Saldi contabili di fine mese ricavati dal libro giornale (cumulati). “Mostra variazioni” evidenzia la differenza rispetto al mese precedente.
      </div>
    </div>
  );
}

/* ============================================================
   PAGINA: CHIUSURA MENSILE  (report, sola lettura)
   ============================================================ */
function naturaCE(c){
  const e=(c.eccedenza||'').toUpperCase().trim();
  if(e==='DARE/AVERE') return null;
  if(e.indexOf('AVERE')===0) return 'R';
  if(e.indexOf('DARE')===0) return 'C';
  return null;
}

/* Motore di calcolo della chiusura: liquidità, conto economico, stato
   patrimoniale e rendiconto finanziario per il mese `mk`, in modalità
   'mensile' (solo il mese) o 'progressivo' (da inizio anno fino a `mk`).
   È usato sia per il rendering a video sia per gli export, così restano
   sempre allineati. */
function buildChiusura(scritture, categorie, mk, mode){
  if(!mk) return null;
  const year = mk.slice(0,4);
  const yearStart = year+'-01';
  const isProg = mode==='progressivo';
  const inFlow = k => isProg ? (k>=yearStart && k<=mk) : (k===mk);
  const before = k => isProg ? (k<yearStart) : (k<mk);

  /* 1) Liquidità — roll-forward (apertura + entrate − uscite = saldo finale) */
  const liq = LIQ_CODES.map(cod=>{
    let opening=0, entrate=0, uscite=0;
    scritture.forEach(s=>{ const k=rfMonthKey(s.data); if(!k) return;
      s.righe.forEach(r=>{ if(r.c!==cod) return;
        if(before(k)) opening += (r.d||0)-(r.a||0);
        else if(inFlow(k)){ entrate += (r.d||0); uscite += (r.a||0); }
      });
    });
    opening=r2(opening); entrate=r2(entrate); uscite=r2(uscite);
    return {cod, nome:contoByCode[cod].nome, opening, entrate, uscite, closing:r2(opening+entrate-uscite)};
  });
  const liqTot={
    opening:r2(liq.reduce((s,x)=>s+x.opening,0)),
    entrate:r2(liq.reduce((s,x)=>s+x.entrate,0)),
    uscite:r2(liq.reduce((s,x)=>s+x.uscite,0)),
    closing:r2(liq.reduce((s,x)=>s+x.closing,0)),
  };

  /* movimenti del periodo aggregati per conto (per il conto economico) */
  const movByCod={};
  scritture.forEach(s=>{ if(!inFlow(rfMonthKey(s.data))) return;
    s.righe.forEach(r=>{ if(!movByCod[r.c]) movByCod[r.c]={dare:0,avere:0}; movByCod[r.c].dare+=(r.d||0); movByCod[r.c].avere+=(r.a||0); });
  });

  /* 2) Conto economico del periodo */
  const ricavi=[], costi=[];
  CONTI.forEach(c=>{ if(c.prospetto!=='CE') return; const m=movByCod[c.codice]; if(!m) return;
    const dare=r2(m.dare), avere=r2(m.avere); if(!dare && !avere) return;
    let nat=naturaCE(c), imp;
    if(nat==='R') imp=r2(avere-dare);
    else if(nat==='C') imp=r2(dare-avere);
    else { const net=r2(avere-dare); if(net>=0){nat='R'; imp=net;} else {nat='C'; imp=r2(-net);} }
    if(Math.abs(imp)<0.005) return;
    (nat==='R'?ricavi:costi).push({cod:c.codice,nome:c.nome,imp});
  });
  ricavi.sort((a,b)=>b.imp-a.imp); costi.sort((a,b)=>b.imp-a.imp);
  const totRicavi=r2(ricavi.reduce((s,x)=>s+x.imp,0));
  const totCosti=r2(costi.reduce((s,x)=>s+x.imp,0));
  const risultato=r2(totRicavi-totCosti);

  /* 3) Stato patrimoniale — fotografia a fine mese (saldi cumulati k<=mk).
     Il patrimonio è uno stock: NON dipende da mensile/progressivo. */
  const sal={}; CONTI.forEach(c=>{ sal[c.codice]={dare:0,avere:0}; });
  scritture.forEach(s=>{ const k=rfMonthKey(s.data); if(!k || k>mk) return;
    s.righe.forEach(r=>{ if(!sal[r.c]) sal[r.c]={dare:0,avere:0}; sal[r.c].dare+=(r.d||0); sal[r.c].avere+=(r.a||0); });
  });
  const saldoOf=cod=>{ const s=sal[cod]||{dare:0,avere:0}; return r2((s.dare||0)-(s.avere||0)); };
  const rowsCat=cat=>CONTI.filter(c=>c.categoria===cat).map(c=>({cod:c.codice,nome:c.nome,saldo:saldoOf(c.codice)})).filter(r=>Math.abs(r.saldo)>0.005);
  const sumCat=cat=>r2(CONTI.filter(c=>c.categoria===cat).reduce((s,c)=>s+saldoOf(c.codice),0));
  const immMat=sumCat('IMM. MATERIALI'), immFin=sumCat('IMM. FINANZIARIE'), disp=sumCat('DISP. LIQUIDE'), fondi=sumCat('RETTIFICA ATTIVO');
  const attivo=r2(immMat+immFin+disp+fondi);
  const pnSaldo=sumCat('PATRIMONIO NETTO');
  const ricaviCum=r2(CONTI.filter(c=>c.categoria==='RICAVI').reduce((s,c)=>s-saldoOf(c.codice),0));
  const costiCum=r2(CONTI.filter(c=>c.categoria==='COSTI').reduce((s,c)=>s+saldoOf(c.codice),0));
  const risEserc=r2(ricaviCum-costiCum);
  const pn=r2(-pnSaldo);
  const totPassivoNetto=r2(pn+risEserc);
  const sp={
    immMat:rowsCat('IMM. MATERIALI'), immFin:rowsCat('IMM. FINANZIARIE'),
    fondi:rowsCat('RETTIFICA ATTIVO'), disp:rowsCat('DISP. LIQUIDE'),
    totImmMat:immMat, totImmFin:immFin, totFondi:fondi, totDisp:disp, attivo,
    pnRows:rowsCat('PATRIMONIO NETTO').map(r=>({...r,saldo:r2(-r.saldo)})),
    pn, risEserc, totPassivoNetto,
    sbilancio:r2(attivo-totPassivoNetto)
  };

  /* 4) Rendiconto finanziario del periodo (riconciliato con la cassa) */
  const rfFull=buildRendiconto(scritture,categorie);
  const periodMonths=rfFull.mesi.filter(inFlow);
  const sumRows=rows=>rows.map(r=>({nome:r.nome,imp:r2(periodMonths.reduce((s,k)=>s+(r.perMese[k]||0),0))})).filter(r=>Math.abs(r.imp)>0.005).sort((a,b)=>b.imp-a.imp);
  const rfEnt=sumRows(rfFull.rows.entrata);
  const rfUsc=sumRows(rfFull.rows.uscita);
  const rfInv=sumRows(rfFull.rows.investimento);
  const totEnt=r2(rfEnt.reduce((s,x)=>s+x.imp,0));
  const totUsc=r2(rfUsc.reduce((s,x)=>s+x.imp,0));
  const totInv=r2(rfInv.reduce((s,x)=>s+x.imp,0));
  const flussoOper=r2(totEnt-totUsc-totInv);
  const rfIni=liqTot.opening;
  const rfFin=liqTot.closing;
  const altri=r2(rfFin-rfIni-flussoOper);   // giroconti / apertura / movimenti non operativi
  const rf={ini:rfIni, ent:rfEnt, usc:rfUsc, inv:rfInv, totEnt, totUsc, totInv, flussoOper, altri, fin:rfFin};

  return {mk, year, mode, isProg, liq, liqTot, ricavi, costi, totRicavi, totCosti, risultato, sp, rf};
}

/* ============================================================
   PAGINA: CHIUSURA MENSILE  (report, sola lettura)
   ============================================================ */
function PageChiusura({scritture, categorie, toast}){
  const mesi = useMemo(()=>{
    const set=new Set();
    scritture.forEach(s=>{ const k=rfMonthKey(s.data); if(k) set.add(k); });
    return [...set].sort();
  },[scritture]);
  const [mese,setMese]=useState('');
  const [mode,setMode]=useState('mensile');
  const mk = mese || mesi[mesi.length-1] || '';
  const meseNome = k => k ? rfMonthLabel(k)+' '+k.slice(0,4) : '';
  const periodoLabel = mode==='progressivo'
    ? (mk ? 'Gen–'+rfMonthLabel(mk)+' '+mk.slice(0,4) : '')
    : meseNome(mk);

  const rep = useMemo(()=>buildChiusura(scritture,categorie,mk,mode),[scritture,categorie,mk,mode]);

  /* ---------- EXPORT ---------- */
  function slug(){ return (mode==='progressivo'?'Progressivo':'Mensile')+'_'+(mk||''); }

  function liqAoA(){
    const o=[['LIQUIDITÀ — '+periodoLabel,'','','',''],['Conto','Saldo iniziale','Entrate','Uscite','Saldo finale']];
    rep.liq.forEach(x=>o.push([x.nome,x.opening,x.entrate,x.uscite,x.closing]));
    o.push(['TOTALE LIQUIDITÀ',rep.liqTot.opening,rep.liqTot.entrate,rep.liqTot.uscite,rep.liqTot.closing]);
    return o;
  }
  function ceAoA(){
    const o=[['CONTO ECONOMICO — '+periodoLabel,''],['Voce','€']];
    o.push(['RICAVI','']); rep.ricavi.forEach(x=>o.push(['   '+x.nome,x.imp]));
    o.push(['Totale ricavi',rep.totRicavi]);
    o.push(['COSTI','']); rep.costi.forEach(x=>o.push(['   '+x.nome,x.imp]));
    o.push(['Totale costi',rep.totCosti]);
    o.push(['RISULTATO DEL PERIODO',rep.risultato]);
    return o;
  }
  function spAoA(){
    const d=rep.sp; const o=[['STATO PATRIMONIALE — al '+meseNome(mk),''],['Voce','€']];
    o.push(['ATTIVO','']);
    o.push(['Immobilizzazioni materiali','']); d.immMat.forEach(r=>o.push(['   '+r.nome,r.saldo]));
    o.push(['Immobilizzazioni finanziarie','']); d.immFin.forEach(r=>o.push(['   '+r.nome,r.saldo]));
    o.push(['Fondi ammortamento (−)','']); d.fondi.forEach(r=>o.push(['   '+r.nome,r.saldo]));
    o.push(['Disponibilità liquide','']); d.disp.forEach(r=>o.push(['   '+r.nome,r.saldo]));
    o.push(['TOTALE ATTIVO',d.attivo]);
    o.push(['PASSIVO E NETTO','']);
    o.push(['Patrimonio netto','']); d.pnRows.forEach(r=>o.push(['   '+r.nome,r.saldo]));
    o.push(["Risultato d'esercizio (progressivo)",d.risEserc]);
    o.push(['TOTALE PASSIVO E NETTO',d.totPassivoNetto]);
    if(Math.abs(d.sbilancio)>0.005) o.push(['Sbilancio da verificare',d.sbilancio]);
    return o;
  }
  function rfAoA(){
    const d=rep.rf; const o=[['RENDICONTO FINANZIARIO — '+periodoLabel,''],['Voce','€']];
    o.push(['Disponibilità iniziali',d.ini]);
    o.push(['ENTRATE OPERATIVE',d.totEnt]); d.ent.forEach(r=>o.push(['   '+r.nome,r.imp]));
    o.push(['USCITE OPERATIVE',d.totUsc]); d.usc.forEach(r=>o.push(['   '+r.nome,r.imp]));
    if(d.inv.length){ o.push(['INVESTIMENTI',d.totInv]); d.inv.forEach(r=>o.push(['   '+r.nome,r.imp])); }
    o.push(['Flusso operativo / investimenti',d.flussoOper]);
    if(Math.abs(d.altri)>0.005) o.push(['Giroconti e movimenti non operativi',d.altri]);
    o.push(['DISPONIBILITÀ FINALI',d.fin]);
    return o;
  }

  function exportExcel(){
    if(!window.XLSX){ toast('Libreria Excel non caricata','error'); return; }
    const wb=XLSX.utils.book_new();
    const add=(name,aoa)=>XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(aoa),name);
    const riep=[
      ['CHIUSURA — '+(mode==='progressivo'?'progressivo (da inizio anno)':'mensile')],
      ['Periodo',periodoLabel],
      ['Generato il',new Date().toLocaleDateString('it-IT')],
      [],
      ['Indicatore','€'],
      ['Entrate liquidità',rep.liqTot.entrate],
      ['Uscite liquidità',rep.liqTot.uscite],
      ['Δ Liquidità',r2(rep.liqTot.closing-rep.liqTot.opening)],
      ['Liquidità a fine periodo',rep.liqTot.closing],
      ['Risultato economico del periodo',rep.risultato],
      ['Totale attivo (a fine mese)',rep.sp.attivo],
    ];
    add('Riepilogo',riep);
    add('Liquidità',liqAoA());
    add('Conto Economico',ceAoA());
    add('Stato Patrimoniale',spAoA());
    add('Rendiconto',rfAoA());
    XLSX.writeFile(wb,'Chiusura_'+slug()+'.xlsx');
    toast('Export Excel completato','success');
  }

  function exportPDF(){
    if(!window.jspdf){ toast('Libreria PDF non caricata','error'); return; }
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const cx=doc.internal.pageSize.getWidth()/2;
    doc.setFont('helvetica','bold'); doc.setFontSize(16);
    doc.text('CHIUSURA CONTABILE',cx,18,{align:'center'});
    doc.setFontSize(11); doc.setFont('helvetica','normal');
    doc.text((mode==='progressivo'?'Progressivo da inizio anno — ':'Mensile — ')+periodoLabel,cx,25,{align:'center'});
    doc.setFontSize(9); doc.setTextColor(120);
    doc.text('Generato il '+new Date().toLocaleDateString('it-IT'),cx,31,{align:'center'});
    doc.setTextColor(0);

    const HEAD=[31,79,143], TOT=[225,233,228], SUB=[240,238,233];
    const isBold=t=>/^(TOTALE|RISULTATO|DISPONIBILITÀ FINALI|ATTIVO|PASSIVO E NETTO|ENTRATE|USCITE|INVESTIMENTI)/.test(t)||/Flusso operativo/.test(t);
    const isSub=t=>/^(RICAVI|COSTI|Immobilizzazioni|Fondi|Disponibilità liquide|Patrimonio netto)$/.test(t);

    // Liquidità (5 colonne)
    const liqBody=rep.liq.map(x=>[x.nome,num2(x.opening),x.entrate?'+'+num2(x.entrate):num2(0),x.uscite?'−'+num2(x.uscite):num2(0),num2(x.closing)]);
    liqBody.push([{content:'TOTALE LIQUIDITÀ',styles:{fontStyle:'bold'}},{content:num2(rep.liqTot.opening),styles:{fontStyle:'bold'}},{content:'+'+num2(rep.liqTot.entrate),styles:{fontStyle:'bold'}},{content:'−'+num2(rep.liqTot.uscite),styles:{fontStyle:'bold'}},{content:num2(rep.liqTot.closing),styles:{fontStyle:'bold'}}]);
    doc.autoTable({startY:37,head:[['Liquidità — '+periodoLabel,'Saldo iniz.','Entrate','Uscite','Saldo fin.']],body:liqBody,
      styles:{fontSize:8,cellPadding:1.5},headStyles:{fillColor:HEAD},columnStyles:{1:{halign:'right'},2:{halign:'right'},3:{halign:'right'},4:{halign:'right'}}});

    // helper per i prospetti a 2 colonne
    const finTable=(aoa,startY)=>{
      const body=aoa.slice(2).map(r=>{
        const label=r[0], val=r[1], hasVal=(typeof val==='number');
        const st = isBold(label)?{fontStyle:'bold',fillColor:TOT}:(isSub(label)?{fontStyle:'bold',fillColor:SUB}:{});
        return [{content:label,styles:st},{content:hasVal?num2(val):'',styles:{...st,halign:'right'}}];
      });
      doc.autoTable({startY,head:[[aoa[0][0],'€']],body,styles:{fontSize:8.5,cellPadding:1.6},headStyles:{fillColor:HEAD},columnStyles:{1:{halign:'right',cellWidth:38}}});
      return doc.lastAutoTable.finalY;
    };

    let y=doc.lastAutoTable.finalY+8;
    y=finTable(ceAoA(),y)+8;
    if(y>250){ doc.addPage(); y=20; }
    y=finTable(spAoA(),y)+8;
    if(y>250){ doc.addPage(); y=20; }
    finTable(rfAoA(),y);

    doc.save('Chiusura_'+slug()+'.pdf');
    toast('PDF generato','success');
  }

  if(!mk) return (<div><PageHead title="Chiusura mensile" sub="Fotografia contabile del mese"/><div className="empty-state">Nessun dato disponibile.</div></div>);

  const {liq,liqTot,ricavi,costi,totRicavi,totCosti,risultato,sp,rf}=rep;
  const deltaLiq=r2(liqTot.closing-liqTot.opening);

  return (
    <div>
      <PageHead title="Chiusura mensile" sub={`Fotografia contabile — ${periodoLabel}`}>
        <div className="tipo-switch" style={{gridTemplateColumns:'1fr 1fr',width:210}}>
          <button className={mode==='mensile'?'active entrata':''} onClick={()=>setMode('mensile')}>Mensile</button>
          <button className={mode==='progressivo'?'active entrata':''} onClick={()=>setMode('progressivo')}>Progressivo</button>
        </div>
        <select value={mk} onChange={e=>setMese(e.target.value)} style={{padding:'8px 12px',borderRadius:'var(--radius)',border:'1px solid var(--rule-2)',background:'var(--panel)',color:'var(--ink)',fontWeight:500}}>
          {[...mesi].reverse().map(k=><option key={k} value={k}>{meseNome(k)}</option>)}
        </select>
        <button className="btn ghost" onClick={exportPDF}>↓ PDF</button>
        <button className="btn accent" onClick={exportExcel}>↓ Excel</button>
      </PageHead>

      <div className="kpi-grid">
        <Kpi label="Entrate liquidità" value={eur(liqTot.entrate)} hint={periodoLabel}/>
        <Kpi label="Uscite liquidità" value={eur(liqTot.uscite)} hint={periodoLabel}/>
        <Kpi label="Δ Liquidità" value={eur(deltaLiq)} neg={deltaLiq<0} hint={mode==='progressivo'?'rispetto a inizio anno':'rispetto a fine mese prec.'}/>
        <Kpi accent label="Risultato economico" value={eur(risultato)} neg={risultato<0} hint={risultato>=0?'utile del periodo':'perdita del periodo'}/>
      </div>

      <div className="serif" style={{fontSize:18,margin:'26px 0 10px'}}>Liquidità — {mode==='progressivo'?'movimenti da inizio anno':'movimenti del mese'}</div>
      <div className="tbl-wrap">
        <table className="tbl">
          <thead><tr><th>Conto</th><th className="num">Saldo iniziale</th><th className="num">Entrate</th><th className="num">Uscite</th><th className="num">Saldo finale</th></tr></thead>
          <tbody>
            {liq.map(x=>(
              <tr key={x.cod}>
                <td>{x.nome}</td>
                <td className="num">{num2(x.opening)}</td>
                <td className="num pos">{x.entrate?'+'+num2(x.entrate):num2(0)}</td>
                <td className="num neg">{x.uscite?'−'+num2(x.uscite):num2(0)}</td>
                <td className="num"><b>{num2(x.closing)}</b></td>
              </tr>
            ))}
          </tbody>
          <tfoot><tr className="rf-tot strong">
            <td>Totale liquidità</td>
            <td className="num">{num2(liqTot.opening)}</td>
            <td className="num pos">{liqTot.entrate?'+'+num2(liqTot.entrate):num2(0)}</td>
            <td className="num neg">{liqTot.uscite?'−'+num2(liqTot.uscite):num2(0)}</td>
            <td className="num">{num2(liqTot.closing)}</td>
          </tr></tfoot>
        </table>
      </div>

      <div className="serif" style={{fontSize:18,margin:'26px 0 10px'}}>Conto economico — {mode==='progressivo'?'progressivo':'del mese'}</div>
      <div className="tbl-wrap">
        <table className="tbl">
          <thead><tr><th>Voce</th><th className="num">Importo</th></tr></thead>
          <tbody>
            <tr><td style={{fontWeight:700,paddingTop:10}}>Ricavi</td><td></td></tr>
            {ricavi.length===0 && <tr><td colSpan="2" style={{color:'var(--ink-3)',fontStyle:'italic',paddingLeft:22}}>Nessun ricavo nel periodo</td></tr>}
            {ricavi.map(x=><tr key={x.cod}><td style={{paddingLeft:22}}>{x.nome}</td><td className="num pos">{num2(x.imp)}</td></tr>)}
            <tr className="rf-tot strong"><td>Totale ricavi</td><td className="num pos">{num2(totRicavi)}</td></tr>
            <tr><td style={{fontWeight:700,paddingTop:10}}>Costi</td><td></td></tr>
            {costi.length===0 && <tr><td colSpan="2" style={{color:'var(--ink-3)',fontStyle:'italic',paddingLeft:22}}>Nessun costo nel periodo</td></tr>}
            {costi.map(x=><tr key={x.cod}><td style={{paddingLeft:22}}>{x.nome}</td><td className="num neg">{num2(x.imp)}</td></tr>)}
            <tr className="rf-tot strong"><td>Totale costi</td><td className="num neg">{num2(totCosti)}</td></tr>
          </tbody>
          <tfoot><tr className="rf-tot strong">
            <td>Risultato del periodo</td>
            <td className={'num '+(risultato<0?'neg':'pos')}>{risultato>=0?'+':'−'}{num2(Math.abs(risultato))}</td>
          </tr></tfoot>
        </table>
      </div>

/* ============================================================
   PAGINA: CESPITI
   ============================================================ */
function PageCespiti({cespiti,setCespiti,toast}){
  const [edit,setEdit]=useState(null); // oggetto in editing o 'new'
  const blank={nome:'',classe:'II. IMMOBILIZZAZIONI MATERIALI',annoIni:new Date().getFullYear(),costoStorico:0,aliquota:0.2,quotaEs:0,fondo:0,note:''};
  const [form,setForm]=useState(blank);

  const vn = c => r2((c.costoStorico||0)-(c.fondo||0));
  const totCS=r2(cespiti.reduce((s,c)=>s+(c.costoStorico||0),0));
  const totFondo=r2(cespiti.reduce((s,c)=>s+(c.fondo||0),0));
  const totVN=r2(cespiti.reduce((s,c)=>s+vn(c),0));

  function openNew(){ setForm(blank); setEdit('new'); }
  function openEdit(c){ setForm({...c}); setEdit(c.id); }
  function save(){
    if(!form.nome){toast('Nome obbligatorio','error');return;}
    const f={...form,costoStorico:parseFloat(form.costoStorico)||0,aliquota:parseFloat(form.aliquota)||0,quotaEs:parseFloat(form.quotaEs)||0,fondo:parseFloat(form.fondo)||0,annoIni:parseInt(form.annoIni)||null};
    if(edit==='new') setCespiti([...cespiti,{...f,id:uid()}]);
    else setCespiti(cespiti.map(c=>c.id===edit?{...f,id:edit}:c));
    setEdit(null); toast('Cespite salvato','success');
  }
  function del(id){ if(window.confirm('Eliminare il cespite?')){ setCespiti(cespiti.filter(c=>c.id!==id)); toast('Cespite eliminato','success'); } }

  return (
    <div>
      <PageHead title="Cespiti" sub="Libro dei beni ammortizzabili">
        <button className="btn accent" onClick={openNew}>+ Nuovo cespite</button>
      </PageHead>
      <div className="kpi-grid">
        <Kpi label="Costo storico totale" value={eur(totCS)}/>
        <Kpi label="Fondo ammortamento" value={eur(totFondo)}/>
        <Kpi accent label="Valore netto contabile" value={eur(totVN)}/>
      </div>
      <div className="tbl-wrap">
        <table className="tbl">
          <thead><tr><th>Cespite</th><th>Classe</th><th className="num">Anno</th><th className="num">Costo storico</th><th className="num">Aliquota</th><th className="num">Quota es.</th><th className="num">Fondo</th><th className="num">Valore netto</th><th></th></tr></thead>
          <tbody>
            {cespiti.map(c=>(
              <tr key={c.id}>
                <td><b>{c.nome}</b>{c.note&&<div style={{fontSize:11,color:'var(--ink-3)'}}>{c.note}</div>}</td>
                <td style={{fontSize:11}}>{c.classe}</td>
                <td className="num">{c.annoIni}</td>
                <td className="num">{num2(c.costoStorico)}</td>
                <td className="num">{((c.aliquota||0)*100).toFixed(0)}%</td>
                <td className="num">{num2(c.quotaEs)}</td>
                <td className="num">{num2(c.fondo)}</td>
                <td className="num">{num2(vn(c))}</td>
                <td><div style={{display:'flex',gap:4}}><button className="btn ghost sm" onClick={()=>openEdit(c)}>✎</button><button className="btn danger sm" onClick={()=>del(c.id)}>✕</button></div></td>
              </tr>
            ))}
          </tbody>
          <tfoot><tr><td colSpan="3" style={{fontWeight:600}}>Totali</td><td className="num" style={{fontWeight:600}}>{num2(totCS)}</td><td colSpan="2"></td><td className="num" style={{fontWeight:600}}>{num2(totFondo)}</td><td className="num" style={{fontWeight:600}}>{num2(totVN)}</td><td></td></tr></tfoot>
        </table>
      </div>

      {edit!==null && <div className="modal-bg" onClick={e=>{if(e.target.className==='modal-bg')setEdit(null);}}>
        <div className="modal">
          <div className="modal-head"><h3>{edit==='new'?'Nuovo cespite':'Modifica cespite'}</h3><button className="btn ghost sm" onClick={()=>setEdit(null)}>✕</button></div>
          <div className="modal-body"><div className="form-grid">
            <div className="form-row"><label>Nome</label><input type="text" value={form.nome} onChange={e=>setForm({...form,nome:e.target.value})}/></div>
            <div className="form-row"><label>Classe</label><input type="text" value={form.classe} onChange={e=>setForm({...form,classe:e.target.value})}/></div>
            <div className="form-row"><label>Anno inizio</label><input type="number" value={form.annoIni} onChange={e=>setForm({...form,annoIni:e.target.value})}/></div>
            <div className="form-row"><label>Costo storico</label><input type="number" step="0.01" value={form.costoStorico} onChange={e=>setForm({...form,costoStorico:e.target.value})}/></div>
            <div className="form-row"><label>Aliquota (es. 0,20)</label><input type="number" step="0.01" value={form.aliquota} onChange={e=>setForm({...form,aliquota:e.target.value})}/></div>
            <div className="form-row"><label>Quota esercizio</label><input type="number" step="0.01" value={form.quotaEs} onChange={e=>setForm({...form,quotaEs:e.target.value})}/></div>
            <div className="form-row"><label>Fondo ammortamento</label><input type="number" step="0.01" value={form.fondo} onChange={e=>setForm({...form,fondo:e.target.value})}/></div>
            <div className="form-row"><label>Note</label><input type="text" value={form.note} onChange={e=>setForm({...form,note:e.target.value})}/></div>
          </div></div>
          <div className="modal-foot"><button className="btn ghost" onClick={()=>setEdit(null)}>Annulla</button><button className="btn accent" onClick={save}>Salva</button></div>
        </div>
      </div>}
    </div>
  );
}
